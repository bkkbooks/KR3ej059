body:
  text: 卷九麻疹金鏡賦麻雖胎毒多帶時行氣候寒溫過當男女傳染而成其發也與痘相似其變也比痘匪輕愚夫每多玩忽烏知系乎死生毒起於胃熱流於心始終之變腎則無症臟腑之傷肺則尤甚初時發熱儼似傷寒目出淚而不止鼻流涕而不幹咳嗽大急煩躁難安以火照之隱隱皮膚之下以手摸之磊磊肌肉之間其形如疥其色若丹隨出隨沒乍隱乍現根窠若腫兮麻而兼癮皮膚若赤兮麻且雜斑似錦而明兮十有九吉如煤而黑兮百無一痊麻毒最重治法不同微汗常出熱勢越而不留清便自調毒氣行而不壅腠理拂鬱兮即當發散腸胃祕結兮急與疏通苟視大而若細恐變吉而為凶故衄血不必憂邪從衄解利瀉不必止毒以利松所喜者身中清涼可畏者咽中腫痛飲水不休法在生津養血飲食若減方須清胃和中又如出之太遲或為風寒所束急宜發表出之過甚猶慮積熱恆多更須解毒毋伐天和常視歲氣寒威凜凜毒勢鬱而不行火熱炎炎毒氣乘而作癘或施溫補勿助其邪若用寒涼休犯其胃制其過但取其平驅其邪勿傷其正或寒或熱藥性之陰陽自異為虛為實人生之強弱不齊人品固宜詳觀藥味亦當深究防風荊芥散腠理之留邪升麻葛根開榮衛之蘊熱點子未現之初乃先行之要藥人參養氣生地涼血氣虛血熱非此難安黃連入心而瀉火黃芩入肺以清金熱留心肺非此莫除元參石膏治邪火之浮遊梔子連翹開惡毒之鬱結此疹家之要藥解毒方中必用瓜蔞潤肺止渴須合麥冬知母降火生津必同黃柏當煩渴在所必加芍藥住乎腹痛白朮止乎脾泄小便澀兮芩通咽喉痛兮甘桔心神悸兮鎮以辰砂大便祕兮利以大黃牙齒生疳文蛤配乎溺白喉痹咽痛射干助以牛蒡五味杏仁治喘氣之噓噓薄荷竹葉解膚熱之煬煬火燒人屎蜜炒麻黃發癍毒之出現令邪氣之舒張枳殼山楂消脾積而化毒兜鈴地骨解肺熱以回瘡麻疹既出將息尤難坐臥宜暖飲食宜淡風寒若受兮為腫為熱鹹酸不禁兮為咳為喘穢若觸兮發癢嚴寒搏兮消沒調理失宜輕而變重飲食不節安者反危便多膿血兮腸胃夾熱咳多痰涎兮華蓋傷寒口爛唇瘡心脾之火未退毛焦發稿榮衛之液將枯治此變症各有奇方身熱不退柴胡乾葛四物口瘡若甚甘桔對乎三黃消腫各定喘兮葶藶有效化痰止咳兮順氣為良氣血果虛八珍增損而可用水穀不納二陳斟酌以相當痢血兮香連丸去蔻而加地榆芩柏咳血兮五拗湯去麻而加茅根地黃此疹家之治法繼痘科而再詳麻疹西江月胎毒現為麻疹蓋因毒火薰蒸遍身點似硃砂形發自胃經一定切忌黑癍死症最宜赤似朱櫻大都治法喜清涼不許辛甘犯禁麻疹因何咳嗽只緣心肺相連肺金毒火苦熬煎以致咳嗽氣喘治宜清金降火不可誤用辛甜譬如疱子蒸籠煙只要氣松火遍初熱狀似傷寒其間如何分辨症多咳嗽有紅斑噴嚏眼中水現或見腹中疼痛或時吐泄相兼麻疹吐瀉不須嫌毒因嘔泄而宜麻與痘瘡異治二家不可同方痘宜溫補麻宜涼只要現形為上風寒閉而不出其間凶險難當急宜發散保安康最怕神昏腹脹凡遇麻疹出現詳看時令如何假如日暖又風和敗毒荊防方可若是時行疫熱芩連消毒宜多用心調理救沉疴坐井觀天莫學且論荊防敗毒真為發散仙方荊防生地要相當酒炒芩連二樣桔梗甘草人參連翹牛蒡無雙元參黃柏制更良竹葉升麻停當又有芩連消毒散火解毒尤佳芩連梔子及升麻桔梗元參多把石膏甘草知母連翹牛子紅花引用淡竹要多加此個方兒無價發散仍前不出真個令人憂疑麻黃酒蜜煉如煤芩連梔柏當施更著大黃酒炒連翹牛蒡相宜石膏蟬蛻紫紅歸不效命離塵世如見出時紫黑此痘自古多凶急求人糞路朝東火煅成灰取用細研酒調吞下須臾黑色轉紅若還依舊黑朦朧管取黃梁一夢麻已現形發熱化斑湯是真傳石膏甘草及元參桔梗連翹靈驗若是毒多熱甚芩連消毒為先大便祕結大黃添務使微溏數遍麻疹類多咽痛火邪薰灼無他連翹甘桔要多加牛蒡射干同下外用十宣妙散吹喉休要吁嗟假如藥後有爭差消毒芩連妙也麻疹更兼瀉痢預先用藥調醫瀉時減桂五芩宜加上甘草滑石如是痢兼赤白香連丸子相隨大端痢止便為奇不效令人疑忌麻咳聲聲氣促只消降火清金赤苓梔子並黃芩枳梗石膏靈應知母人參地骨瓜蔞杏仁元參麥冬牛蒡妙如神竹葉將來作引麻後切防四症因循多致誤人遍身久熱欠清寧咳嗽連聲牽引牙齒疳生走馬痢下赤白難禁各求方法貴精純始稱醫中絶品為甚身中壯熱只因餘毒連綿金花丸子用芩連豬膽梔仁堪羡鬱金雄黃解毒燈心地骨湯煎若還脾弱熱長延集聖胃芩任選咳嗽頻頻不止或因不忌酸鹹又加火毒肺家延尤恐胸高氣喘體實兼行葶藶神虛清肺為先如斯調理保安痊莫向風波弄險口舌生瘡臭爛此名走馬𠒋疳金花丸子好求安外用除疳妙散先取尿缸白垢火煅白色如鹽再將五構銅緑添砒棗燒灰靈驗赤痢下時鮮血黃連柏葉槐花枳殼荊芥穗同加痢止血除方罷白痢吳萸滑石樗根枳殼升麻烏梅取肉作丸佳赤白香連可下四疾更防死症臨門休要錯差兒多體熱瘦如麻咳嗽面青聲啞走馬唇穿齒落痢多噤口吁嗟此般即是死冤家任是神仙也怕四方疹名各別京師內外呼為溫疹河南呼為麩瘡陝西山西呼為䐃瘡山左呼為疹子浙江呼為痧疹湖廣江西呼為麻疹福建兩廣雲貴四川呼為疹子名雖不同實皆正疹也調治之法不殊避忌之説無二麻家四忌一忌葷腥煎炒疹初出時以至出齊之日俱忌食葷腥即素菜亦忌煎炒以其能助胃火故也古云葷痘素麻信哉一忌生冷湯粥糖食酸鹹疹初出時以至出透之日未免口渴煩躁喜食生冷然果生則難克化物冷則能冰伏故忌之至粥及米湯糖餅麵食枝圓之類食之恐助毒火酸鹹則引咳嗽俱宜禁止一忌風寒出疹之時風寒閉塞毛竅不開毒何由出即已出又恐收回要其再出其為難矣慎之慎之一忌房帷厭穢出疹之時內外俱宜潔淨勿使汙穢氣息觸犯出疹男女致生變症慎之治麻三忌一忌驟用寒涼麻雖熱痘固不宜用辛熱之劑然初熱之時虛實之症未形驟以苦寒之藥峻攻之幾何不冰伏其毒而不得出反至內攻乎故善治者惟宣毒而不郁毒止解毒而不冰毒也一忌誤用辛熱麻水熱症復投辛熱之物是猶火上覆加薪也其毒不愈橫乎故疹初出時即有四肢厥冷者亦熱極似寒切不可誤以為虛而妄投以熱藥也即遇天時大寒止宜置諸溫室亦不可投以辛熱之物以助腹中之火也一忌誤用補澀毒火之發貴疏通而嫌補滯蓋疏通則毒得外泄而解補滯則毒必內伏為殃故初發之時即吐瀉不止切不可誤用參朮訶蔻補澀之藥以啓內攻之禍麻疹辨論麻痘皆胎元之毒而有陰陽之分痘為陰毒麻為陽毒毒藏陰分者貴陽氣之壯熱乃得上升而起灌故治痘必用參耆朮桂以陽藥而化陰伏之邪毒在陽分者貴陰血之活動始不黑焦而內攻故治麻多用歸芍地芎以滋陰而降燥烈之火況陰主閉藏故痘毒深而難解陽主發散故麻毒淺而易消且臟陰多虛寒故治痘之法雖解毒亦要溫中腑陽多實熱故治麻之道宜發表而尚清涼矧痘毒必須外化化盡方可無虞是以遷延時日治始貴慮其終麻毒但要發出出盡則無後患是以時日無多治此止須解表然麻毒雖藏於腑而陽毒之激烈一發即蒸於肺肺主皮毛實受其毒故發熱之初鼻流清涕咳嗽噴嚏音啞咽痛而肺經見症獨多其異於傷寒者止有眼胞略腫眼淚汪汪面浮腮赤是以知為麻症耳其初發也最忌風寒尤嫌穢濁宜置之潔淨之所處於溫暖之室辛熱之物恐郁毒火萬勿與嘗生冷之果恐冰毒氣切莫與食室內宜有香薰而使穢不能觸用藥必須發散以開肌表之膚蓋腠理開張而毒不內郁馨香時接而毒得外升此初熱之調理再觀症而察形若潮熱甚微二便不祕飲食如常精神清爽身潤澤而有汗唇不紫而自榮舌無黃白之苔口無穢臭之氣此其內毒最輕知其症之必順不須用藥費辛勤自可安然平定若或鼻衄吐血請君不必驚惶血從衄解有何妨此症從不危亡嘔吐毒攻胃管泄瀉莫作虛看腹痛多為內熱驚譫心經火旺初以發熱為是終以清解為良發熱三日以後麻疹已現皮膚以火照之如霞如錦以手摸之如粟如麻一日而出三遍三日而出九回至於五六日間麻毒盡出其熱漸退熱退人安其症方平當其現形之際不畏瘡之稠密惟喜色之紅活故色之明潤雖一片成氈吾亦知其堪救若瘡來紫黑中稀疏不密吾亦謂其難醫是以紅色者輕紫色者險青黑色者則為不治之症矣蓋血以載毒血活則毒必清毒壅則血必熱紫而轉黑則毒凝而血已死矣又安得活乎治此之法如點來焦黑必以清毒為主尤以活血為先凡芩連梔柏翹蒡石膏元參知母甘桔荊防一切清肺解毒之藥此時不容緩進至於紅花歸尾紫草地黃丹皮赤芍荊芎川芎一切滋陰活血之藥當此急進其方雖人有強弱不可因體弱而妄進補劑以致助毒為虐在怯弱之兒不過於解毒劑中用人參而略扶元氣第麻雖熱症亦不可因症熱而過用苦寒以致耗其元氣當熱清毒解之餘即宜調其脾胃而思固其本原若熱盛而藥微則杯水固難救車薪倘毒輕而藥重是驅盜自傷其門壁均非所云善治也總之未出之先宜發為主發毒盡出自不內攻雖紅腫之甚狀若漆瘡亦不足慮既出之日概以解毒為良毒清血活方能化於皮膚以免餘毒之禍調理得宜十有十全苟失其宜殺人亦如反掌可不慎乎麻疹順症或熱或退無他症者輕發熱三日見點者輕頭面先見次兩頤透出乃至於足形若芥子色若桃花作二三番齊透者輕紅活潤澤頭面勻淨而多者輕出透三日而後漸收者輕麻疹險症頭面兩頤難透者重兩頤如紫雲成片者重紅紫慘暗乾焦不潤者重疹中夾斑氣逆者重咽喉腫痛不食者重移熱大腸變痢者重麻疹逆症發熱五六日不見標者逆黑暗乾枯一出即沒者不治鼻青糞黑者不治鼻扇口張目無神光者不治胸高氣喘心前扇動者不治頭面不出者不治麻前治法痘為陰毒其勢稍緩或死或生尚判於成漿之日麻為陽毒其勢甚烈為存為亡早定於方出之時故發熱三日麻當現於皮膚若腠理緊閉不能出現則毒作內攻須臾告變故痘則慮難成漿麻則懼其不出此麻前痘後最為緊要古今之通義也宣毒發表湯加減法麻與傷寒究竟殊妄施汗下反多虞過用寒涼亦冰毒惟有發表湯相符釋麻初發熱與傷寒相似但麻疹則面頰赤咳嗽噴嚏鼻流清涕目淚汪汪呵欠喜睡或兼吐瀉為不同耳若以傷寒治而妄施汗下則增其熱則咳血煩躁目疼咽痛之症生矣下則虛其里而滑泄滯下之症起矣更有慮其毒盛而過用寒涼則毒必冰伏多致內攻喘悶而斃矣故此時治法以宣毒發表湯為主縱有雜症照本方加減可也宣毒發表湯方歌宣毒發表升葛前荊防枳桔薄牛連木通竹葉隨甘草寒熱芩麻著意權録方前胡淡竹葉各一錢乾葛八分木通七分防風桔梗連翹去心荊芥用穗牛蒡各六分炒研枳殼五分麩炒升麻薄荷甘草各三分生去皮引加芫荽無芫荽用蔥白水煎服天氣大寒加麻黃三分天氣大熱加酒炒黃芩五分食滯加山楂肉五分風寒閉塞麻當初出感風寒身熱無汗頭疼難升麻葛根湯對病蘇芎牛蒡服自安釋麻疹只怕不能出透出透毒便解矣若發熱之時為風寒所傷必身熱無汗頭疼惡寒而出不快矣宜用升麻葛根湯加蘇葉川芎牛蒡以治之升麻葛根湯方歌升麻葛根湯四味赤芍甘草麻葛是再加蘇葉芎牛子麻感風寒斯藥治録方升麻葛根赤芍甘草蘇葉川芎牛蒡毒熱壅滯麻子因何出甚遲毒熱壅滯勢誠危梔仁解毒藥難緩隨症加減服之宜釋麻當出時有毒熱壅滯而出不快者必大熱薰蒸面赤唇紫煩躁不寧宜用梔仁解毒湯隨症加減治之梔仁解毒湯方歌梔仁解毒芩連膏翹牛麻母計分毫紫防赤草佐梔子此外減加細推敲録方黃芩黃連石膏連翹牛子升麻知母柴胡防風赤芍甘草梔仁煩渴加麥冬嗽甚加杏仁桔梗花粉無汗加麻黃大便祕加酒製大黃氣虛不出正氣虛弱毒難宣面白神疲不樂言扶元詎敢用峻補人參敗毒毋更翻釋麻當出時有正氣虛弱不能送毒出外者其人身止微熱面白唇淡精神倦怠然不敢用峻補之劑以人參敗毒治之可以扶元亦可以宣毒人參敗毒散方歌疹初欲出奈氣虛人參敗毒保無虞枳桔赤芎參甘草二活之外有二胡録方枳殼桔梗赤茯苓川芎人參甘草羌活獨活柴胡前胡生薑引水煎服煩渴麻初煩渴毒上燎津液頻枯胃脘焦加味麻葛治未出已出白虎湯可療釋麻症煩渴純是毒火上炎肺焦胃干心火內亢故也麻未出宜用升麻葛根湯加天花粉麥冬麻已出宜用白虎湯或人參白虎湯合黃連解毒湯加味升麻葛根湯録方升麻葛根赤芍甘草天花粉麥冬白虎湯録方石膏煅知母生甘草生引用粳米水煎服人參白虎湯合黃連解毒湯人參知母生石膏煅甘草生黃連黃柏黃芩梔仁炒糯米一撮為引水煎熱服壯旺實熱者去人參大熱不退渴甚者加竹葉麥冬譫妄麻初譫妄豈無根只因毒盛心神昏未出已出須分治三黃解毒方並存釋麻疹初發狂言妄語人事不清此由毒火大盛熱乘於心故也麻未出以三黃石膏湯治之麻已出以黃連解毒湯治之三黃石膏湯録方麻黃淡豆豉石膏梔仁黃連黃芩黃柏水煎服黃連解毒湯録方黃連黃芩黃柏梔仁加丹皮生地連翹甘草金銀花引加燈心水煎服咳嗽麻初咳嗽有兩端或因毒盛或風寒毒盛瀉心湯可治風寒麻葛湯自安已出咳嗽火傷肺清金寧嗽非等間釋麻疹初發咳嗽有因毒盛者有因風寒者毒盛則唇紅目赤煩渴不寧以瀉心湯治之風寒則鼻塞聲重噴嚏惡寒以加味升麻葛根湯治之若麻已出咳嗽此火毒內蒸肺葉焦舉以清金寧嗽湯治之瀉心湯録方桑白皮蜜炙地骨皮淡竹葉連翹元參天花粉川貝母黃連燈心甘草加味升麻葛根湯録方升麻葛根赤芍甘草前胡桔梗蘇葉杏仁去皮尖炒清金寧嗽湯録方橘紅前胡杏仁去皮尖炒桑白皮蜜炙黃連栝蔞仁桔梗浙貝母去心引用生薑紅棗水煎服喘急咳嗽連聲氣喘急麻家遇此最為凶杏仁湯宜未出日出用化痰丸自松釋麻疹初發熱時未見出現咳嗽不止無汗而氣喘此由表實毒不得出故也以黃連杏仁湯發之自愈若麻已出猶咳嗽氣喘此火毒內蒸肺受煎熬故也以化痰清火丸清之自愈黃連杏仁湯録方黃連酒炒陳皮去白桔仁去皮尖炒麻黃去節枳殼炒乾葛生薑引化痰清火丸録方犀角連翹丹皮各一兩生地二兩赤芍六錢當歸尾八錢黃連四錢牛蒡五錢共為細末煉蜜為丸如彈子大淡竹葉湯下咽痛毒火薰蒸氣上騰咽喉自此痛頻增甘桔湯通前後用加減停當效自宏釋麻疹咽痛本為常候乃為毒薰蒸而痛也勿與喉痹同論妄用針刺只以甘桔湯為主按其前後表裡加減用之甘桔湯録方甘草生桔梗牛蒡燈心十莖為引水煎服表實加防風荊芥升麻元參裡熱加黃芩連翹元參腹痛麻前腹痛辨宜真毒壅食滯是其因毒壅敗毒散甚妙食滯平胃散如神釋麻前腹痛有由毒壅者有由食滯者毒壅則面赤唇紅煩渴不寧以荊防敗毒散治之食滯則精神倦怠腹中作膨以加味平胃散治之荊防敗毒散録方荊芥防風升麻生地黃芩酒炒黃連酒炒桔梗連翹牛蒡元參黃柏酒炒人參淡竹葉甘草燈心十莖水煎服加味平胃散録方蒼朮炒厚朴薑炒陳皮甘草生防風升麻葛根枳殼麩炒麥芽山楂去核引用生薑燈心水煎服汗衄麻前汗衄無容止毒從此解症自輕汗多白虎湯合用衄甚地黃湯可清釋麻初發熱有遍身自汗者有鼻中出血者俱不可遽止蓋毒從汗衄而解其麻易出其症自輕也但不可太過如汗出太多則恐津液耗散表虛過甚致生他症宜用人參白虎湯合黃連解毒湯清之血出不止則恐陰血耗甚不能生津降火宜用元參地黃湯涼之人參白虎湯合黃連解毒湯見卷內煩渴門元參地黃湯録方元參生地丹皮梔仁炒升麻白芍蒲黃甘草生絲茅根七莖為引水煎熱服吐瀉麻初吐瀉症非寒誤用補滯起禍端乾嘔始用解毒治竹葉石膏亦可餐瀉甚傷脾四苓散實熱芍藥湯始安釋痘初吐瀉純是熱症不可作寒論吐者毒逆上行攻於胃管因吐而毒乃解瀉者毒趨下降注於大腸因瀉而毒乃泄故大吐大瀉不必驚惶止澀俟升麻出而吐瀉自寧倘誤用暖胃補脾溫滯之藥恐滯毒於內反成壞症矣惟是欲吐不吐時時張口而作乾嘔此毒壅於胃而不能出誠險症也宜用元參解毒湯治之而竹葉石膏湯亦治嘔吐通方欲泄不泄裡急後重此實熱滯於大腸將成痼痢矣宜用黃芩芍藥湯治之而加味四芩散亦治水瀉要劑元參解毒湯録方元參黃芩梔仁桔梗生地乾葛荊芥甘草淡竹葉三十片燈心三十根為引水煎服或加木通車前滑石竹葉石膏湯録方淡竹葉石膏陳皮半夏茯苓甘草水煎服黃芩芍藥湯録方黃芩赤芍升麻生地木通枳殼當歸尾黃連人參甘草加酒製大黃以利之加味四苓散録方白朮赤茯苓豬苓澤瀉木通車前牛蒡黃芩紅腫太甚麻發於心色喜紅紅腫太甚毒薰烘化毒清表方固穩或用大青湯亦通釋麻喜稠密稠密不堪麻喜通紅或紅腫太甚者皆毒盛熱熾之故但已出於外不留於內必不至於傷生須清火解毒自獲平安不必過為驚惶也化毒清表湯方歌化毒清