body:
  text: 卷六結痂辨症賦痘至十三四日漿行飽滿已宜次第收功若遇身發大熱停漿不易結痂此則陽亢陰虛引以清涼收斂漿足而或氣喘此症恐為痰壅痂成而忽爾發驚必因小便祕澀若或氣虛而陷塌倒靨而黑焦一則溫補而或興一則攻發而或活泄瀉安寧大虛少毒內潰則下膿黏臟毒必然便血挫喉聲啞漿行飽滿亦無妨癢塌咬牙便實聲清猶可活靨來痂硬變症終無痂脫如麩須愁餘毒蒸發或致太過潰爛難為收拾身熱若致燎人泡發燎漿可畏空遺痘殼不成痂只為漿清熱重腹脹喘虛而塌靨皆由毒入內攻痘雖未見黃膿痂瘡卻如血赤若曾解毒於先此症斷知美極胃氣絶則口唇硬腫肝熱盛則目睛吊白喘急發於瀉後總是氣虛而斷泄瀉繼以煩渴豈為實熱而然瀉泄而煩渴不止理必可以升提好飲而發渴愈甚勢必難以援救氣虛寒戰痘瘡無恙即神經漿足難收便實熱蒸須解利進寒涼以助結痂叱補法而防過益此非灌膿之候何須純用補劑至此宜防餘毒縱用清解何疑餘熱倘或薰蒸痂瘡依然難結小便必須滑利漿汁乃始易收斟酌盡善因時制宜方為得法結痂調治總論痘至十一二日其漿已飽宜濃十二三日漿行至足面上漸宜收靨其膿已熟則漿如黃蠟而腳漸爾不紅頂心稍瀑黃漿已具收結之勢於是其膿漸干其痂漸結總要痂厚赤黃最忌瘡薄灰白既於面部先出當於面上先收準頭先靨是脾胃氣充日後總無變症兩頰先收是肺肝氣足必能次第收功諸部未靨而地角先焦此為腎水早枯見之且休歡喜滿面方漿而天庭先靨此是元陽劇萎此症甚是堪虞蓋額頭是為純陽之所足膝乃為純陰之地面部中庭乃陰陽和會之區從此先靨則陰陽和暢氣血調勻下漸收至於足上方靨至頭顱此順候之常數如是乃可無虞莫謂痘至此已成功可以不必調治更慮臟腑空虛此際反多變症陽氣不充則身軀必冷而漿行何能飽滿脾胃不實則肌竅必空慮瘡漿倒入者攻當此時而用藥宜以健脾利水為主蓋脾胃強利則肌燥而膿易結小便清利則濕去而汁易干又當扶陽固本為先蓋陽氣盛則毒在外而痂厚貞元固則毒不倒靨以為殃是以人參黃耆為收成之要藥理中桂附乃結局之良方此日罕聞血熱之症故紅花生地紫草丹皮一切涼血之藥皆退處屏藩非急用之上將惟茯苓白朮苡仁淮山一切助脾之品皆置之左右為應用之將軍澤瀉豬苓當用木通車前得宜附子乾薑可使砂仁丁桂堪施身軀微熱有可疑靨時水火既濟名為燒盤之症熱乃煉就痂皮膿干身熱自過不須用藥維其收靨過半大熱則為餘毒將興須用調元化毒熱退餘毒乃清凡是接性之處餘毒在此現形或是為疽為癤此等安能傷命故任他紅腫莫驚慌毒出外攻人不喪若或陰囊脹腫腎毒外泄膀胱若至倒流入里此兒頃刻云亡倘有痰涎咳嗽同底半夏相當若還聲啞最宜詳急看痘瘡何樣漿濃痂厚則無妨此是氣虛痰壅生止用開痰補氣管教聲氣自揚若漿清而痘爛或倒靨而瘙癢此等若還聲啞不日即赴泉鄉手足時常牽引恐其筋內生風僵蟲白附芍歸芎補血祛風可用若是拘攣難轉動血不榮筋氣不送只要行其氣血自可運用流通倘來泄瀉是何因虛實原分兩症白青滑溜是脾虛治此法當用補若還黃赤射漂行此為餘毒下奔不必急為止澀毒因泄瀉外行咬牙寒戰無害理中桂附堪寧譫妄不須驚怪寧心補血為宗便下血膿可治臟毒不致內攻吐瀉蛔蟲必死臟敗此症難醫腹痛而兼膨脹此為餘毒積陳且用消導解毒痛定而脹亦除止怕痘形倒靨毒流入里堪虞牙齒生癢則毒流於胃腑將成走馬牙疳急清胃熱乃為良此時若不急救數日之後為殃則見齦崩齒落月餘齒盡淪亡頭目疼痛則熱犯於太陽吾知目病將作勿令珠突青盲急退上魚之火清肝解毒相當此時如驗生死總看痂瘡何樣痘靨必要成痂痂厚赤黃可愛知其十無一死遍身俱結厚痂斷其百有百生收結若至於膝此其大功已成足下雖取瘡薄然亦不致傷生飲食多進二便如常精神清爽體安康更喜瞳人朗朗雜症全無真可賀請君藥餌且收藏若或昏昏好睡此非目閉神亡血氣泄之已極精神豈得如常止須調養溫補元神反自安康前看膿漿為主今觀痂瘡為憑有痂則生無痂則死痂厚則毒盡散痂薄尚有餘殃雖面部結痂而遍身如薄紙此症猶云難救上身痂結腿臁下如竹衣此等必留餘毒況面目抓破遍體無痂其毒豈不內攻濕爛流膿其症必險連皮脫去此症定凶一日之間遍體一齊黑靨俗云鐵甲焦瘡見此斷然不治靨後總無痂瘡此是倒靨無疑遇此何須施治至於飲食不進泄瀉無休喘急氣噓瞳人已失目少神光足冷過膝肌盡焦黑唇不蓋齒舌縮痰鳴死期已至醫人若逢此候萬勿輕投藥餌恐致旁人之訕招其父母之尤結痂順症痘至十三四日血盡毒解其膿漸干色如瘡蠟或如葡萄色從目鼻兩旁人中上下左右二顴收靨起乃至地角頸項胸腹腰背逐漸收下然後上級額顱下至於足逐次收結痂厚瘡圓或黃或赤雜症全無者吉痘自人中先收者吉自元壽先靨者任凶不凶蓋人中為陰陽交會之所從此先收必陰陽和暢氣血均行元壽乃脾胃中土之區自此先靨則脾胃氣旺自能滋養乎百骸故二處收起必無凶兆若額顱地角及手足心先收則凶此邪火入於心腎故也髮際以上陽中之陽謂之孤陽足膝以下陰中之陰謂之孤陰孤陰則氣難充孤陽則血難周痘至二處所以遲留而緩靨也必收至足下而後頭顱乃靨耳不必施治痘漿已足色如蒼蠟而身發熱者此回水之候真陽運化其漿乃干其痂乃結古謂燒盤之症不必施治倘誤用寒涼以退其熱則由輕而變重矣結痂險症痘當收靨之時漿雖充足色不蒼老或過期而不靨結或作癢抓傷而痘顆潰爛或結痂而不即脫落或痂落而瘢痕紫黑皆屬險症然二便俱調飲食如常者猶可治也結痂落痂逆症遍身未見黃漿而口唇上下先黃熟忽而焦者凶見此速宜剔破痘不待收靨而皮若剝去者不治未靨將靨時口唇腐爛唇白至舌者不治面部胸腹俱未收而腳先靨者不治遍身發癢抓破不見膿水皮卷如豆殼者不治收靨時痰壅喘急聲啞目閉者不治收靨時目閉腹脹足冷過膝者不治收靨至頸項或至胸而不靨下服藥不效者不治痘痂若麩之薄若煤之黑者及痂色淡白無光者凶痂結日久不脫及脫而乾枯不潤者凶結痂落痂治法陽虛不靨陽氣虛弱收靨遲身涼肢冷症可推回漿飲固能助結溫表調中用亦宜釋痘當收靨之時真陽運化身體宜溫乃能回水干膿倘元氣不足必身涼而手足冷不能回水結痂矣須大補氣血助之收結回漿飲溫表調中湯皆可用也回漿飲見卷五漏漿門溫表調中湯見卷五潰爛門毒盛不靨毒盛未解熱蒸蒸焮赤潰臭變將興解毒須用連翹飲清表敗毒用亦靈釋痘當收靨之時有毒盛未解大熱蒸蒸而當靨不靨者若不急治其痘必至焮腫而赤潰爛而臭矣宜用大連翹飲或清表敗毒湯以解之大連翹飲方歌大連翹飲炒梔芩柴滑荊防赤芍勻通牛蟬蛻歸車草便祕蒸黃耆意尋録方連翹一錢去心柴胡當歸木通車前各八分炒牛蒡炒研赤芍防風荊芥黃芩各七分酒炒滑石梔子各五分酒炒蟬蛻十二隻去頭足甘草三分生去皮生薑一片同煎大便祕加酒炒大黃一錢清表敗毒湯見卷五潰爛門濕盛不靨痘當靨時忽外潰膿水淋漓濕為殃敷宜草麥松花粉內治須用除濕湯釋痘當收靨之時有外潰而膿水淋漓者謂之水靨乃濕盛為患也用屋上多年敗草末手豔上即結痂蕎麥粉鋪上亦好松花粉最妙若在邊外即以多年黃牛糞燒灰手豔上亦好內須用除濕湯以利之除濕湯方歌除濕湯中用二苓羌防澤桂二術靈去羌或加干苡木引無過於薑燈心録方赤茯苓豬苓羌活防風澤瀉官桂蒼朮白朮一方去羌活加乾薑苡仁木通引用生薑燈心同煎傷寒不靨痘當收靨忽感寒鼻塞頭疼勢難安祛寒方可期漿靨桂枝解毒湯非謾釋痘當收靨之時有為寒氣所傷而不能靨者現症頭疼鼻塞且流清涕宜用桂枝解毒湯治之桂枝解毒湯録方桂枝麻黃炒赤芍防風桔梗牛蒡子川芎人參黃耆甘草炙傷暑不靨痘當收靨忽傷暑口渴心煩目倦開祛暑方可期漿靨須啜甘露湯數杯釋痘當收靨之時有因暑氣薰蒸而不能靨者現症口渴心煩而目倦開宜用甘露解毒湯治之甘露解毒湯録方白朮豬苓茯苓木通麥冬生地連翹官桂香薷澤瀉痘爛不靨過服熱藥痘潰爛加味回漿飲可醫輕粉黃連調搽好芒硝膽汁敷之宜釋痘當收靨之時有因前過服熱藥致痘潰爛不靨者用回漿飲加前胡牛蒡連翹麥冬車前木通與服外用輕粉黃連為末調油搽之或以芒硝為末調豬膽汁敷之亦效回漿飲見卷五漏漿門靨速痘未及期忽齊靨熱蒸口渴煩不寧此是毒火內焚熾急須清毒莫少停釋痘未及收靨之時忽而一時齊靨周身顆粒乾燥熱蒸口渴煩急不寧此毒火壅盛之故也宜以清毒散主之清毒散録方當歸赤芍黃連丹皮連翹金銀花牛蒡木通生地甘草水煎服倒靨倒靨之症雖不同氣虛毒盛入內攻良工至此無奇技參耆大補或奏功釋痘至七八日間腳漸闊頂愈陷其色純白形如豆殼者名倒靨也又有其痘和皮連片脫去者有先前起頂有清水一旦水收痘靨全無痘瘡者世人誤認為收靨豈知好痘收靨必有痂瘡且緩緩而收若收速無瘡皆倒靨也痘至倒靨則毒入內攻實難療矣宜用參耆大補湯治之參耆大補湯録方人參黃耆當歸川芎各一錢官桂山楂紅花白朮各八錢薑棗引中脘痛中脘即心之上下四圍也釋痘歸收靨之時忽然腹痛其痛著在中脘此熱毒凝滯瘀血而作痛也宜用消毒散血湯主之消毒散血湯方歌靨時腹痛著中脘消毒散血湯莫緩炒過桃仁熟大黃紅花沒乳芍牛伴録方牛蒡炒研桃仁去皮尖炒研大黃各一錢酒炒白芍六分酒洗乳香箸上烘去油抖碎為末紅花各五分酒洗沒藥制同乳香三分水煎溫服瘡破流膿痘瘡損破口難合膿血流兮傷骨筋敷用生肌綿繭散飲須大補湯為君釋痘瘡損破不能合口膿血常流名疳蝕瘡因循失治必致潰筋傷骨用生肌散或棉繭散敷之飲以大補湯為主生肌散録方地骨皮黃連炒黃柏炒五倍子枯明礬甘草各等分共為末摻之綿繭散録方出蛾繭不拘多少每繭用生明礬五分填在內用火煅過共礬一兩則加陀僧五錢白芷二錢為末以蜜調敷大補湯録方人參黃耆當歸官桂牛蒡子連翹茯苓甘草渴瀉痘已回水渴飲瀉加味四苓湯可啜隨用知膏湯葛草芩連通粉翹牛麥釋痘當結痂之時餘毒未盡或大渴大瀉須用加味四苓散瀉止隨用加味知膏湯其渴亦減加味四苓散見卷二泄瀉門加味知膏湯録方知母炒石膏煅麥冬各一錢去心豬苓連翹去心牛蒡澤瀉茯苓乾葛花粉各八分木通黃芩各七分酒炒黃連酒炒甘草各三分生引加燈心五十寸水煎服汗漿足汗不止外症見身涼表虛宜何藥加味歸耆湯釋症當結痂之時有身涼而汗不止者此表虛也宜用加味歸耆湯加味歸耆湯方歌漿足身涼汗不止歸耆酸棗對症方加以術苓與麥草表虛服之始安康録方黃耆三錢炙當歸酸棗仁各錢五分炒研白朮土炒茯苓麩麥各八分甘草四分炙白水煎服痂結不落痘痂不落症各殊宜分毒熱與元虛毒用解毒茶膏治虛用參耆雞茶塗釋痘當收靨之後痂結不落其症各殊有痂黑唇紅舌有苔而身有熱者此毒熱鬱於血分故不落也宜用涼血解毒湯與服外用細茶豬膏共擂以絹盛之印於痂上茶以解其熱膏以潤其燥而痂自落矣有痂薄唇白而舌無苔者此元虛而血不潤故不落也宜用參耆四味湯加蟬蛻與服外用雞膏細茶共擂以絹盛之印於痂上而自落也涼血解毒湯録方當歸生地紫草紅花連翹川黃連白芷桔梗甘草引加燈心水煎服參耆四味湯録方人參黃耆當歸甘草炙蟬蛻痘瘢赤腫痘瘢赤腫是何因血有餘熱復感風解毒防風湯十味引加生薑妙無窮釋痘痂落後瘢痕赤而且腫此血有餘熱也復感風寒而發熱作癢宜以解毒防風湯治之解毒防風湯録方黃芩生地黃連翹牛蒡荊芥防風金銀花赤芍升麻甘草引加生薑水煎湯痘瘢自陷痘瘢自陷何須疑氣血虛兮只用補八珍增添桂與耆對症之藥病自愈釋痘落痂後氣血虛者痘瘢必白且陷以十全大補湯治之自愈十全大補湯見卷三怪痘門
