然後以末藥敷之雄黃散録方雄黃三錢黃柏二錢蛇床子一錢共為末先以艾葉煎湯洗淨後以末藥敷之有加莧菜燒灰者更妙救苦散録方人中白火煅過五錢寒水石水飛過三錢黃柏冰片白殭蠶各錢半炒真牛黃二分共為末先以清茶洗淨後以末藥搽之馬鳴散録方人中白火煅如鹽五錢馬鳴蛻即殭蠶火煅過二錢五分五倍子二錢白明礬二錢將礬打成塊裝入五倍子內火煅以礬枯為度為末共為末以米泔水洗口然後敷藥麻後煩渴麻後煩渴留餘熱清解只宜竹石湯參麥母草從膏葉滌煩消渴勝清涼釋麻後煩渴亦屬餘熱鬱於心胃但不必遽用苦寒猛劑以傷肺腑只以竹葉石膏湯飲之餘熱必解便勝一服清涼散矣竹葉石膏湯録方淡竹葉石膏煅人參麥冬去心知母生甘草生水煎服麻後發搐麻後發搐不須驚只因餘熱上薰心安神丸子導赤送一切風藥可勿尋釋麻後發搐乃餘熱上攻乎心故有是症不可指為驚風而誤用風藥宜以導赤散加人參麥冬煎湯送安神丸治之導赤散録方生地木通甘草生人參麥冬去心淡竹葉為引水煎送安神丸安神丸録方黃連當歸麥冬茯苓甘草各五錢炙辰砂一錢梅花片二分半共為細末以膹豬心血抖和煉蜜為丸麻後痢疾麻疹熱毒留腸胃未經清解凝成痢二丸治法分虛實總以導滯湯為最釋麻出之時曾作泄瀉未經清解以致熱毒留於腸胃及麻收之後變為休息痢或赤或白裡急後重此餘熱滯於大腸也須辨虛實而治之實熱用三黃丸利之虛者用香連丸解之然清熱解毒導滯行氣總以清熱導滯湯為最誠治痢之良方也三黃丸録方黃芩酒蒸黃連酒炒大黃酒製九次三味等分共為細末米糊為丸如梧桐子大每服二三十丸空心白水送下香連丸録方木香三兩黃連一兩外用吳茱萸五兩浸水同炒去吳茱不用共為末以醋糊為丸如梧桐子大米湯送下清熱導滯湯方歌清熱導滯皆良藥芩連楂草青陳殼地榆牛子翹檳紅祕甚應加須急著録方當歸山楂各一錢去核連翹牛子各八分炒研陳皮白芍生厚朴薑炒黃芩酒炒枳殼各七分麩炒地榆黃連酒炒檳榔桃仁各五分去皮炒青皮紅花各三分祕甚者加酒製大黃八分淡竹葉一錢燈心五十寸為引水煎服麻後腹痛麻後時常腹作痛身熱食少毒內留大黃化毒湯下泄毒退熱除痛即療釋麻後身熱不退飲食不進常常腹痛者此餘毒內留而作痛也須用大黃化毒湯令其不泄則毒退熱除而痛定矣大黃化毒湯録方白芍二錢厚朴錢半大黃枳殼各一錢陳皮七分甘草三分麻後昏亂神昏志亂如見鬼陰衰邪毒入心肝當歸養血湯須用更有黃連安神丸釋麻後時發壯熱神昏志亂如見鬼神者此陰血衰耗致毒邪入肝而傳於心故也治宜安榮養血定志寧神須用當歸養血湯與黃連安神丸主之當歸養血湯尋方當歸川芎生地麥冬木通淡竹葉棗仁梔仁甘草燈心引大便祕加酒製大黃黃連安神丸録方黃連膽草石菖蒲茯神各二錢當歸一錢全蠍七個去刺共為末湯浸蒸餅和豬心血為丸燈心湯下麻後元虛從來麻疹喜清涼不欲溫補致毒狂果系氣血兩衰敗止用調元健脾湯釋麻後雜症多系餘毒未盡故有清解之方絶少溫補之劑果其面青唇白精神困倦的系氣血兩虛止用調元健脾湯調元健脾湯録方人參黃耆當歸茯苓百合薏苡仁白芍沙參丹皮麥冬甘草如有泄瀉白色者加木香白朮黃色者加黃芩車前麻後內熱不清夜臥不寧或生瘡疥大真膏録方生地麥冬去心元參沙參黃耆生白朮薏米各四兩生知母炒桑皮各三兩茯苓茯神棗仁去殼炒當歸丹皮紫菀橘紅各二兩以上各味按法炮製入砂鍋內用長流水浸以桑柴文武火煮兩個時辰去渣澄清加蜜再熬成膏盛淨器中服三五匙滾白水調服麻後餘毒發癰肢節疼痛羌活散録方羌活穿山甲各一兩大黃全蠍白芷各五錢甘草節三錢乳香沒藥各一錢一葉金三條去頭足或加皂角刺一錢共為末酒調服取汗為度附録麻發癢用酒遍身擦之癢即止中惡麻後虛弱失調理外雖無病內實虧偶然中惡多暴死人參湯或可支持釋麻後元氣虛弱失於調理外雖無病內實空虛卒然心腹絞痛汗出如雨朝發而夕死者謂之中惡用人參湯研蘇合香丸救之感風寒而起者用升消平胃散加木香治之蘇合香丸録方沉香麝香研訶子煨去核丁香蓽茇白朮青木香香附炒去毛檀香薰陸香烏犀角安息香另為末用無灰酒熬膏硃砂龍腦蘇合香油入安息香膏內將藥末研勻煉蜜和丸人參湯下升消平胃散録方香附一錢炒研麥芽八分炒紫蘇川芎山楂各七分厚朴薑炒陳皮去白白芷各六分藿香蒼朮砂仁各五分炒研甘草三分炙加木香七分煨薑三片同煎熱服麻後禁忌麻收禁忌切須防鹽醋雞魚慎勿嘗欲莫從心終是福物多爽口定為殃釋麻後內臟空虛鹽醋雞宜慎誤食煎炒則成痢疾誤食生冷則成痞塊食肉太早則每歲逢出疹之月多致下痢膿血誤食雞魚則終身皮膚粟起如雞皮之狀遇時行疹疫又復重出誤食鹽醋致令咳嗽誤食五辛則主驚熱須過四十九日或百日之後方無禁忌欲免後患須宜節之孕婦出麻孕婦出麻治法殊安胎清熱費工夫四物湯固為主劑倍加芩艾信非迂釋孕婦出麻以安胎清熱為主胎不動則麻亦易出矣然古人徒知清熱以安胎不思麻未出而即以清熱為事則麻難出而內熱愈深是欲保胎反以傷胎也宜輕揚表托則麻出而熱自清繼以滋陰清解庶於麻於胎兩無妨礙不安胎而胎自安矣四物湯録方當歸川芎生地白芍黃芩艾葉奶麻子嬰稚初離胎殼中遍身斑駁似珠紅胎中熱毒於今現莫作時行麻疹攻釋小兒初生尚未滿月忽遍身現紅點者俗呼奶麻子是也此由胎中受熱又染時行故生下即發然臟腑嬌嫩不勝湯丸只少與蔥白湯使皮竅中微汗潤澤毒得盡解即要用藥宜以溯源解毒湯與乳母食之乳母亦須食淡茹齋謹避風寒禁忌生冷酸鹹之物溯源解毒湯録方當歸生地川芎白芍沙參黃連陳皮人參木通連翹甘草水煎乳母服之不可令兒服蓋痘疹痘瘡方愈麻隨發蓋痘解毒名義別餘熱須清無多方連翹飲加石粉葉釋痘至回水結痂之際復又身熱遍身上下通紅名蓋痘疹又名解毒疹曰蓋痘者痘之上蓋一層疹也曰解毒者此疹一出可以解痘後之毒也此等症候蓋因灌漿之時痘必稠密極力用藥催漿過於溫補熱滯脾肺故出是疹治以清解餘熱為主大連翹飲録方連翹一錢去心柴胡當歸木通車前各八分炒牛子炒研赤芍防風荊芥黃芩各七分酒炒梔仁酒炒滑石各五分蟬蛻十二隻去頭足甘草三分生去皮生薑一片同煎服加煅石膏花粉淡竹葉各一錢痧疹癮疹痧癮非疹亦名疹內因火灼外風濕本非胎毒病常輕清熱疏風即安輯釋痧癮二疹不在正疹之列亦不由於胎毒而致乃心火灼於肺經又外受風濕而成也小兒居多大人亦時有之此皮膚小疾常見出一次又出一次及有連出不已者無關利害微用疏風清熱之劑即愈以荊防敗毒散主之荊防敗毒散録方荊芥防風枳殼桔梗茯苓川芎柴胡前胡薄荷羌活獨活甘草生薑一片同煎服補論西河柳西河柳又名觀音柳乃透麻疹之聖藥也冬月用枝梗春夏用枝葉若在窮鄉僻壤醫藥不及可用數錢煎湯服之麻即出現秀菜秀菜又名芫荽亦透麻疹之聖藥也生取來連根帶葉搗爛約三四錢入磁碗內用滾白水半鍾滾白酒半鍾同入碗內泡少頃其味自出服之疹出更快若無芫荽苗葉其子研碎服之亦可再加芝麻同研服更妙窮鄉僻壤用此可當良醫
