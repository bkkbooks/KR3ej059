body:
  text: 卷一業醫三要一要靈變蓋藥以治病方隨症立切不可膠柱鼓瑟信其書而不泥於書用其方而不執成方隨機觀變加減得宜方為良醫一要小心蓋小兒不能言語又無六脈可憑其腹中之事全在醫者觀形察色審聲問症細細體察方知其詳若心粗氣浮一望即決鮮不誤人一要輕財醫為仁術當以救人為急而時醫偏以獲利為先一到人家乘人慌亂愈出危言其意以為醫之而愈則顯其能可以索其厚謝醫之不愈則堪辭責亦不至於敗名孰知延醫之際父母早已心虛復加恐嚇於心忍乎且索利而後與藥貧人未及應允小兒已生變症豈不誤人性命哉學者切宜戒之闢藥室誤人病因經絡傳變藥有君臣佐使毫釐不差然後可以驅病無如世之藥室惟貪蠅頭之利往往不依分兩貴者必少與賤者必多施君臣倒置佐使不分及藥不效只咎醫者醫者亦莫能決反欲更方豈知前方對症乃因為藥室誤哉更可惡者以無為有以假為真戕賊人命甚於盜賊雖獲厚利神必殛之奉勸藥室思藥為救命之需必地道得所炒製得法分兩不差雖重索藥價亦不為過也闢主家怨咎醫人夫行術之家一經其手無限警心將發熱時夜臥不安惟恐症來不順及痘出人皆順症不覺喜出眉端稍有險逆則已驚心動魄所以然者蓋以既任其責勢難推解將直言道險恐受主人之誶欲隱而不言又致傍人之誚食不甘寢不寐悉為他人之厄愁難釋口難言猶如自己之危如是而猶責之則醫者之方寸愈亂又安有奇術乎蓋識由膽張智從勇決心無恐懼則識見自開奇方自出症不可救之中亦或可救矣況生死數定宜安於命嘵嘵致怨夫何益乎闢預解胎毒論胎毒藏於命門藥之氣味無從而入譬之火石火藏於石中不見其吐焰若以鐵敲之其火星勃然四出世人不究胎毒之理刊刻稀痘丹方謂重者可使之輕密者可使之疏稀者可使之不出此皆無稽之言切不可聽論痘宜種世俗道及痘症其難其慎每欲避之以免其厄不知此本胎元之毒無人不有即無人能逃若遇天行疫氣傳染浸淫毒氣必增況發熱之初不知是痘或為風寒穢氣所觸既使痘毒遏抑又恐誤投藥劑則輕者重而順者逆害有不可言者矣若既種苗凡飲食衣被預知謹慎既可無冒風觸穢之虞醫者時常省視亦自無誤投藥劑之弊痘出有不吉者乎辨苗吉凶夫種痘之家全恃乎苗之吉苗之吉者毒發必由經絡次第傳宣故無一齊湧出之弊達之皮膚泄於毛孔各分道路尋竅而出又無鋪氈蠶種之虞且毒不遏抑則血不滯於氣道氣血榮暢痘必光潤起脹灌膿總無灰白紫黑之患若苗之凶者痘必凶一切逆症旋踵至矣是以種痘宜取吉苗慎勿妄取凶苗以致誤人而自誤也戒之戒之擇苗祕訣夫苗者痘之痂瘡也大凡取苗要訪出痘之鄉吉多凶少逆症全無乃往取之又要看其顆粒分明無矇頭鎖頸之弊頭面胸背稀疏出齊熱退漿足痂厚潤澤光明乃佳苗也痘雖多亦是美種只要厚實光彩往取之時須囑其父母俟兒睡起即將睡衣數抖令痂落於席上撿取包固置於身傍勿令泄氣若瘡薄面白者苗路雖好究亦無力種多不發若出齊猶熱者乃是險症痂色帶黑者熱毒必盛其苗俱不可用惟赤色者上黃者次之切宜緊記不可濫取以致後悔無及藏苗法既取苗來用紙包固再納小竹筒中閉塞其中勿令泄氣不可曬於日中亦不可焙於火上須帶在身邊令其自干且苗包須寫取苗月日蓋冬月之苗留三四十日種之猶發大半夏月之苗過二十餘日即少發矣故人衆而新苗或少若兼用舊苗吹苗時須多放些種之方能盡發論苗貴新痘本胎毒藏於背骨第七骨節之中無以觸之則終身不發必因外面痘毒之氣衝到命門引之即動新苗氣旺一吹入鼻直抵臟腑故所種必發發亦必輕蓋苗毒不致逗留止為招毒之使而非助伊作惡也痘安有不順乎故放苗之後七八日間發者其症必輕若舊苗氣弱非特種而不發尤恐外毒容留臟腑反增內毒之邪故放苗之後遲至十餘日乃發者重俟加苗後發者亦重此皆用舊苗之過也學者可不審乎放苗法昔人種痘以棉團蘸其漿膿塞於小兒鼻孔之內謂之漿苗後因出痘之家不肯與人剔破痘瘡故取其痘痂研為細末以銀管或小竹管乘苗男左女右對上鼻孔不歪不斜輕吹入內未吹之先令去鼻漿使無阻滯吹入之時即將手閉其鼻竅片刻令痘毒達入氣道方妙造銀管法以紋銀命銀匠造成約五寸長其端上曲其管之孔合鼻之孔可以入得鼻內方可凡種痘必其門內無天行惡痘方可與之放苗若門內正在出痘而請人種痘必其症多險逆苟不訪察而妄與下苗痘發不順醫難解辨悔何及乎先觀小兒形色然後施苗祕訣人之內毒雖不可以逆睹而小兒之氣血觀形察色自可立知未放苗時須察其顏色之榮枯榮則血盛枯則血衰觀其毛髮之焦黑焦則血枯黑則血盛且發疏而嫩者氣多不足發稠而粗者氣必有餘既詳毛髮再看囟門囟門闊者胎元未足腦骨故爾難收囟門小者胎氣甚充陽會所以易合且五臟之精華皆著於兩目神光炯炯內精自足無疑瞳子昏沉元神知其未足山根青者痰多體弱慣驚風面色青者質怯元虧多吐瀉發開路而直豎斷有疳積唇淡白而倦怠定作虛看聲亮而長丹田知其氣足音啞而促氣海自是多虧指有紫紋而浮起蓄熱將宣腹有青筋而硬脹食積已現是以壯實無病之人方可與之下種元虧有病之輩切勿輕與投苗外此兒未滿周須慮根基未穩奶娘鮮乳亦深缺養之虞女子若過十四天癸已動即防痘發而行經男子若到十五欲火或張更慮房勞而泄損有孕之婦恐痘出而胎動難安孤只之孩慮風雪而偏凌弱草腰不挺者其腎必虧膝常軟者其髓必薄偶見令人心怯即此便是凶機父母或出危言究竟終非吉兆過慎之家不宜妄種趑趄之戶切莫輕施謹囑後賢宜從吾論論宜敬神鬼神皆天地山川之正氣或忠孝節義之英靈安可不敬況司痘之神尤為顯應故起壇必要敬謹謝神須要虔誠晨昏必要香燭茶果禱祝化財壇上務宜清潔肅靜如是則神之格思必獲默佑矣論宜遵避忌痘瘡之毒乃男女欲火之所凝其勢甚熾不動則已動則炎炎莫遏但清氣引之固有外泄之勢穢氣觸之不無內攻之時種痘之家可勿慎乎避穢氣腋下狐臭氣房中淫液氣行遠勞汗氣溝糞濁惡氣婦人經候氣諸瘡腥臭氣砒硫蚊煙氣誤燒頭髮氣吹滅燈燭氣柴煙魚骨氣蔥蒜韭薤氣煎炒油煙氣醉酒葷腥氣麝香燥穢氣守禁忌生人往來詈罵呼怒對梳頭對搔癢對掃地對謊言使僧道師巫入房對飲酒歌樂調理法冬月宜避風寒必須置於密室令其溫暖然衣被亦不宜太厚炭火亦不宜太烈恐炎熱之氣反助火邪而包裹太厚則毒氣難泄又不可不知也夏月宜取清涼然亦不可置諸風中對之動扇恐腠理開張風邪一入即能閉毒又不可不知也初熱之時毒火方張凡荔枝龍眼橘餅冰糖一切辛熱之物不可與食且雞助肝火魚則生痰豬肉滯氣而清利麥面積滯而生膨生冷恐其冰毒總宜戒之止可與稀粥淡飯素菜而已乳母俱同此例若至八九日後則辛熱補物可以漸進寒涼之類又宜禁矣腐之為言朽也敗也以豆為末用石膏凝之其寒涼之味乎世人於五六日內用腐及香菌椿葉伴煮佐食其意以為淡而能發耳不知以寒涼供朝夕之需脾胃壯實者猶能勝之倘中州虛弱不虞其益敗乎試細察之冬筍不上林之筍也供淆饌則美用於痘疹殊屬無益醫者藉以催漿又以筍尖作引雖亦方書所傳識者毋為所惑雞肉梟毒魚肉腥膻古人垂戒至嚴種痘者動用魚以起水雞以催漿其殺人於冥冥者不少矣此由方書所載或者以一時一證見效遂傳以誣世用之者可不慎與小兒進藥法小兒多不肯服藥強之亦不能多進然病勢猖獗非藥力不能驅逐況痘症限時剋日當清則宜急清當補則要速補用藥斷不可緩也故藥宜重劑濃煎止用頭服則藥雖少進亦有力矣乳母服藥凡小兒不能服藥須隨症立方用大劑令乳母服之其乳汁自有藥力亦效天元賦痘本胎毒號曰天瘡傳染雖由外感輕重實本內傷初起太陽壬水克乎丙火次歸陽明血水化作膿漿所喜者紅活鮮潤可畏者紫黑焦黃勢若燃眉變如反掌皮膚臭爛血氣虛尪若救焚兮徙薪勝於焦額似拯溺兮落井不暇褰裳原夫一元肇化二氣成祥欲火積為痘種胎毒發為痘瘡命門養虎穢毒深藏遇天行之疫癘觸胎毒以為殃毒之輕者發則微貴善調養毒之重者發則密急要堤防先事解散兮十全九八臨時區處兮算為尋常大抵氣運先藏痘疹屬陽春夏為順兮藥其生長秋冬為逆兮惡其收藏暴寒兮恐邪毒之郁遏暴熱兮慮腠理之開張水泡春而莫治黑陷夏而為殃秋斑慮惡冬疹非祥此逆四時之令休誇三世之方知其凶而治之自求怨謗明其吉而往也得號賢良且如諸症殊形六腑異樣肝主淚而水泡肺主涕而膿漿心斑紅豔脾疹赤黃惟腎經之症險若變黑即危亡所以觀其外症即可知其內臟呵欠煩悶兮肝木之困咳嗽噴嚏兮肺金之相手足冷而昏睡兮脾土困於中央面目赤而驚悸兮心火炎於膈上耳尻屬腎溫暖如常二處爍熱水枯火炎而必斃四肢厥冷中州土敗而傾亡先分部位次察災祥陽明布於面中太陽行於頭上心肺居胸膈之要肝膽主脅腋之旁手足司乎脾胃腰背統於膀胱泄瀉者邪赴於下嘔吐者毒逆於上氣逆而腹痛隱隱毒深而腰痛惶惶心熱甚而驚搐肝邪盛而顛狂口燥咽乾肺受火邪而液竭屎鞭尿澀腎因火旺而精亡氣弱少食者難勝其毒神強能食者不失其常欲決輕重但觀發熱若占順逆須認成瘡身如炎火必然毒甚微微潮熱休試清涼若寒熱之往來定為吉兆熱一日而即止實為不詳數番旋止兮春回陽谷一齊湧出兮火烈昆岡蚤嚼蚊咬刻期而為鬼録蛇皮蠶殼指日而反黃泉不喜珠紅更嫌灰白最宜蒼蠟切忌紫黃色要明潤又恐嫩薄之易破瘡怕乾枯更畏搔癢之難當面頰稀而磊落清安可保胸膈密而連串吉凶難量頂要尖圓最忌平陷漿宜飽滿切忌虛空顏色喜老而愁嫩皮膚要糙而怕光焰起根窠終防癢塌丹浮皮肉必主夭殤頭面預腫兮三陽亢甚手足厥冷兮五臟摧傷瘡堆喉舌毒纏頸項咽喉痛而呼吸維艱飲食少而吞吐不易此天命之安排豈人力之可仗煩躁悶亂兮七神離散譫妄眩潰兮五毒猖狂鼓項戰栗兮肺敗咬牙噤齒兮胃涼渴不住兮焦膈泄不止兮滑腸失聲兮咽爛吼氣兮腹脹晝夜搔癢兮將榮氣之外脫飲食斷絶兮必胃氣之內傷忽腫消而毒入內攻色變黑而疔起將亡食谷則噦兮斯人懼其將喪飲食則噴兮醫者難展其長輕重旋而反復由調理之乖張輕變重而可畏重變輕而莫慌風寒素謹飲食如常出入禁乎男女覆蓋適其溫涼內無妄動治不乖方此則變輕之候實為保命良方若常犯乎禁忌或誤服其丸湯徒自失其防衛不知順其陰陽外感不正之氣內傷不時之糧平人且病思者奚當無怪順則險而險則逆宜乎輕者重而重者而亡發自肺經相傳脾臟氣熱味辛燥金受克形寒飲冷華蓋先傷浩飲則水來侮土而或瀉痢過食則脾不受谷而作痞脹皮毛虛毋肌肉羸傷起發遲而不能胖壯收靨緩而反作爛瘡輕則延綿乎時日重則泣送乎郊荒何愚夫之不曉致生命之早亡不信醫而禱諸鬼神只殺牲而號乎穹蒼藥貴中病醫不執方喜行溫補者動稱乎文中專行清解者祖述乎仲陽孰知因人而治毋虛虛毋實實相時而行必遠熱必遠涼正氣為本戒開門而延盜解毒為急休視虎而如狼首尾不可汗下法之固執緩急各有權宜治之經常拘其繩墨者如守株而待兔惑於方書者似多岐之亡羊且如紅紫厥腫兮涼血為上灰白平陷兮補氣為良出不快兮責表實而發散可用便或祕兮責里實而疏利何妨毒不可以速解毒甚者令微汗之發越熱不可以盡除熱劇者使小便之清長三陰盛而多寒兮必投辛熱三陽盛而多熱兮無過苦涼安可惡寒而喜熱莫執貴陰而賤陽是故補氣者參耆白朮養血者歸芍地黃發散表邪輕葛根而重官桂疏通里實微枳殼而重大黃解毒兮苓連梔子快斑兮牛蒡荊芥連翹瘡中之要藥甘草藥中之君王咽痛求諸甘桔頭痛取乎芎防木通利其小水人屎攻其黑瘡氣逆兮青皮陳皮胃寒兮丁香藿香澀瀉莫如訶蔻嘔吐無過乾薑麥冬乾葛以止渴厚朴腹皮而治脹五味杏仁傷風者以之定喘山楂枳實傷食者用之消糧凡諸藥品各有主張春夏桂枝而少服秋冬芩連而莫嘗瘡若干枯白朮為其所忌色若紅豔黃耆非其所長裡虛少食勿投枳實表虛多毒休使生薑汗自出兮用乾葛重虛其表水自利兮如木通再虧其陽泄瀉黃臭訶蔻不宜輕用嘔吐清冷連梔安得作湯凡用芩連必須炒制如加丁桂必症寒涼應制伏始不為過得和平乃是良方大勢若平餘邪須講熱毒流肝雙睛生翳火邪入脾四肢成瘍口內生瘡爛齦破舌腹中作痢腐胃敗傷皮膚嫩而洗浴太早因以添熱臟腑虛而甘肥太過遂致內傷若中風寒多為咳嗽無時撏掐復灌膿漿既多異症亦有奇方望月砂能退目翳穿山甲排毒無雙枳實山楂消食出積柴葛骨皮退熱清涼咳嗽以款冬杏仁痢疾以黃連木香藥難悉舉因病設方但拘於日數者不知輕重之病執其偏見者未察虛實之詳本溫再熱已寒又涼徒自膠而不變是醫治反以增殃今也泄骨髓之真言寧子孫而始示授肺腑之祕訣牢記誦而勿忘指南賦人參補氣炙草和中用黃耆而實腠理得蟬蛻而善開提紅花有活血養血之功生地有涼血行血之效痘若干紅便宜加入紫草滑肌開竅毒壅堪行熱症賴之有益虛症切莫輕投山楂善逼瘡痍能消食積兼理滯氣於補益方中且解鬱結於透肌湯內輕其表而涼其里功在荊翹疏其肌而發其壅莫如蟬木利咽喉而清氣道能發散而善開提功必資於桔柏分清濁而利小便消痘毒而去龐膨效莫大於通澤川芎引清陽而達表勿缺於未滿之前芍藥斂陰氣以濟陽可施於行漿之日牡丹皮去血中之毒壯熱煩紅為聖藥地骨皮去氣中之毒毛焦熱甚是良功官桂有鼓動陽氣之能神倦而不振者用之以收實效丁香有贊助元陽之力內虛而不起者得之以奏奇功木香順氣而理脾寒泄瀉湯中必用乾葛松肌而退胃熱渴煩之症宜加白朮茯苓健脾胃佐參耆且能益氣當歸生地補陰虛君枳殼而能滋腎解蘊毒莫如犀角黃連惟熱甚乃前後堪用定心煩莫如門冬五味有渴症則終始宜加大附子返本回陽能理虛寒而定戰栗天花粉消痰清胃且收肺氣而發聲音白芷排膿痘毒憑之而運化紫蘇發表責邪賴是以驅除羌活有攻毒走表之功防風有散邪逐毒之妙殭蠶利於肝筋止風定癢如神枳殼快乎胸膈下氣寬胸快速開腠定喘力莫大於麻黃壅遏憑之而發散平胃溫中功則歸於厚朴腹脹藉是以消磨龍骨枯礬暫為澀瀉之用泄止則不宜施澤瀉豬苓有分利水穀之妙灌膿時當慎用乾薑溫中氣而止嘔吐胃寒虛泄者當用則用大黃蕩腸胃而通祕結熱壅便閉者宜加略加牛蒡利咽而善解毒升麻發毒而善升提柴胡前胡解肌而能退熱黃芩黃柏清火而可消斑止嗽消痰用貝母清便降火在山梔牛中黃化風痰而療癲癇有扶危救急之功龍腦片涼心血而起黑陷具撥亂反正之才麝香通竅入五臟亦能發汗雄黃解毒於六腑兼可定驚神砂寧心定志而有養血涼血之能珍珠透里入堅能解骨髓之毒訶子斂肺氣而澀腸豆蔻溫脾胃而止泄人齒但能發鬆肌肉過用則肉裂皮崩藥味不求於異人取效每存乎常品明此一篇思維過半節制賦夫病深而藥淺終是無功病淺而藥深反增他劇勢緩而投急劑急則拂亂其經病劇須用劫藥非劫難解其危以本藥而治病本病去即當行別議防變症而用變藥變症難逆乎將來故偏行補法未必盡為怯弱專用辛溫豈應概是虛寒宜用則用宜去即去藥隨病更方非可執故升麻進於未點之先非其時而莫投身無壯熱休加乾葛柴胡臉不煩紅勿進芩連翹芥壅遏只許疏通投補劑則胸膨減食內熱須宜清利過發汗則表爛瘡疼熱鬱心煩用丁桂須防患目便溏胃弱投芩連恐致陽亡傷食吐酸先宜消導不食嘔吐須與和中糞焦熱泄溫補豈其所宜便溏糞白涼藥總為不合胃虛弱而滋陰恐增泄瀉三焦擁而益陽慮發顛狂喘滿便清是虛煩而可補氣粗腹脹加便祕而可通咳嗽有痰切勿妄投半夏胃熱作嘔且教慢入乾薑氣虛不振則參耆易於奏捷脾胃虛寒則桂附乃可成功設令煩渴喘祕誤投辛熱勢必反生跋扈芩連解熱毒於未胖之前荊翹清血熱於方脹之始若還勢在行漿此輩皆為所叱故六七日內不起內托保元無禁八九日外變生木香異功何疑補法不宜早施溫藥必須在後發散乃作先鋒溫補是為截陳遵此遺制鮮致誤人識透元機方為妙用權宜賦痘有緩急治宜權宜且如紅紫焮腫兮涼血為上灰白平陷兮補氣最良出不快兮為表實而發散可用二便祕者為裡實而疏利何妨毒不能以速散毒甚者令微汗之發越熱不可以盡除熱劇者使小便之清長三陰甚而多寒藥必投乎辛熱三陽數而多熱治無外乎清涼是故補元氣參耆白朮養榮血歸芍地黃發表散邪重柴葛而輕桂枝疏通實熱微枳殼而甚大黃解熱毒芩連梔子快斑疹紫草荊防牛蒡連翹是痘中之要藥川芎甘草乃藥內之君王元參桔梗能除咽熱木通車前善利膀胱氣逆兮陳皮青皮胃寒兮丁香木香治泄瀉兮訶子豆蔻止嘔吐兮砂仁藿香祛風熱兮蟬蛻白附定驚搐兮琥珀牛黃麥冬乾葛清心熱而止煩渴腹皮厚朴療水腫而消腹脹五味杏仁潤肺止嗽而定喘山楂枳實消食行滯而偏長半夏南星貝母悉是消痰之藥麻黃紫蘇羌活皆為發散之劑紅花丹皮可解血熱鹿茸山甲能起痘漿消食積神麯麥芽草果理後重枳殼檳榔木香犀角羚羊解乎心肺之熱秦艽香附除乎面目之黃乳香沒藥止痛乾薑附片回陽甘草黃連清血熱而止風嗽豬苓澤瀉堪止瀉而利小腸此藥味之加減在醫者之權宜而病症之輕重又因人而立主方慎勿膠柱而鼓乃云醫道之良金鏡賦痘毒未出之初宜開和解之門既出之後當塞走泄之路壯熱腮紅宜服升麻乾葛面青唇白急進和表參蘇氣粗熱壅心煩悶便祕須當解利升甘芍葛枳前薑防芷紫芩各樣喘呼脹滿眼中紅肌燥急服疏解羌活幹葛芍升麻甘桔牛蒡堪誇發痘之門不閉則熱蒸之毒必解未見點前惟茲一法既敷瘡後又有奇方稀疏而氣血和平須知安表和中之理歸芎芍藥木芩甘且用益元飲子稠密而毒氣大盛當識內外分消之妙荊翹歸地芍紅芎通用小連翹飲瘡來赤色熱焦枯急進清涼而解毒紅斑赤紫芩連犀柏當施身熱療人乾葛前胡並用氣虛而腹膨脹蟬蛻枳殼木通若遇色來紅潤便宜徹去荊翹如見二便清泄即是地歸俱免宜加白朮茯苓精神倦而飲食少進以人參出不快而痘不振兼用楂蛻初覺繁紅稠密紫草用之無疑如見毒盛形焦牛子進之何害是故三日以前固宜清解四日以後須要權宜瘡頭放白勢在行漿此際最為緊要必參看內外虛實之異酌以溫平表里之宜若神壯而氣盛能食而不泄者痘雖稠密止用和中表發防甘楂芎桔歸耆催膿而已若神倦而氣衰減食而痘陷者毒若繁壅必用重劑補益參耆甘桔桂歸芎托裡宜用設此二方乃作釀膿之具膿泡未滿不可輕易其方痘或變遷不一另設便宜妙用至於漿成充足毒已盡行外化法當漸進於清涼氣血回元復位不可重用乎表補參耆切勿多食胖甚恐難收拾若便實而能食壯熱而不退者便宜疏利為先升麻乾葛四順清涼倘便溏而減食壯熱而不渴者則以健脾為貴木苓通歸防風芍芷假如內外症平不必過服藥餌直至結痂以後再觀餘毒有無當疏利則宜疏利當調補則宜調補餘毒若攻用連翹飲風熱未剝進益氣湯治法固自多方總宜對症而治若無險逆則安養氣血如和飲食則調胃健脾痘疹脈法左心小腸肝膽腎右肺大腸脾胃命分寸關尺三步以定經絡部位總不外於浮沉遲數四字決其寒熱虛實但痘自發熱至起脹時毒從內出陽之候也脈宜浮洪而數不宜沉細而遲自收靨以後毒從外解陰之候也脈宜和緩不宜洪數十二經絡手太陰為肺手少陰心經手厥陰心包手太陽小腸手少陽三焦手陽明大腸足太陰脾經足少陰腎經足厥陰肝經足太陽膀胱足少陽膽經足陽明胃經五臟見症肝主驚搐頭痛恚怒摸床尋衣眼澀心主睡驚煩躁譫語妄言喜笑見鬼脾主腹痛狂悶顛狂唇舌口渴口撮肺主噴嚏咳逆悲哭咽啞鼻涕氣喘腎主腰痛身疼寒戰竄視咬牙耳尻冷辨臟腑虛實寒熱醫不明臟腑虛實寒熱舉手即錯其戕賊人命者何異執梃刃以殺之乎業是科者當於此細心求之臟腑虛寒見症寒熱往來惡寒自汗盜汗面色青白唇舌淡白手足厥冷眼白帶青目閉無神糞色青白倦怠嗜臥二便清利吐瀉不渴口鼻氣冷飲食不進乳食不化聲音微弱精神困倦體靜昏睡哯乳便溏痘勢不振痘色淡白平陷色灰痘軟不硬舌無黃苔咬牙寒戰吐瀉蛔蟲痘不粗肥皮薄嬌紅脈浮細而速是表虛脈沉細而遲是裡虛臟腑實熱見症面赤腮紅大便閉結小便赤澀身體壯熱毛焦膚燥手足燔灼唇紅而紫舌苔黃黑心悶口渴驚悸狂譫口臭氣粗大便焦黃腹脹不食時作乾嘔目紅頭腫眼結淚漿胸膈痞滿咽燥喉痛咳嗽喘促上焦氣逆鼻塞牙戰狂叫不寧脈浮數而實大是表熱脈沉實而洪數者是裡熱虛症似實夫元氣不能送毒大熱因而不退亦有煩悶之虞而發驚譫之症且毒鬱於中亦能閉結元虛毒盛豈敢汗下清涼然此必痘色淡白隱隱皮膚之間唇白麵青而神不振急與扶元慎毋清解痘出而諸症自寧又或虛火上炎為喘為渴此必起於泄瀉之後津液乾枯故喘渴耳況灌膿之際作膿必然身熱起脹必致口乾瘡腫必然啼叫俱不可認為實熱其後漿足血虧心神不寧或有狂言譫語此症定為虛論亦或女子經産之餘男子房勞發痘陰虛火動大熱顛狂俱不可雲實熱且痘後陰虛發熱必出午未時後略舉數端宜詳悉推求庶不致有誤實症似虛夫熱盛內壅亦目閉昏沉不思飲食火伏中州亦四肢厥冷倦怠神迷然此必二便赤澀舌有黃苔治用清解升提毒出而精神始暢至於毒攻胃管必為嘔吐熱注大腸定來泄瀉此非脾胃之虛是乃毒火內擊以致吐瀉交加豈敢溫脾暖胃且毒壅則痘出不快血熱則痘不升提必解毒而痘乃出涼血而痘乃升又有毒凝血滯而痘不紅者誤投補藥而反焦枯必清毒活血而始紅潤況六日以前寒戰多屬肺熱四五日內咬牙非是胃寒要之實似虛者痘色多紫舌有苔而小便赤必在七日以前總以清解為主若至八九日來則臟腑空虛斷不敢雲實熱其後收靨之際亦不可謂純虛此際宜消餘毒因人而治慎勿差訛虛症變實氣虛痘症用藥對症調理得宜則元氣可回腠理可固脾胃可健飲食能進二便能調矣若補益太過恐有腹脹喘急之患只宜消導積滯行氣寬中而已便實而渴加麥門冬或有咽喉腫痛煩躁閉渴之症亦宜利咽解熱為主蓋喘急腹脹大便祕結煩渴咽痛皆實症然氣能變實者非原實也乃病釀而致此患深之失只宜補益不可疏通設若疾驟作則病實之氣又虞其復虛矣實症變虛實熱痘症只宜清涼發散不宜峻用苦寒若過用苦寒必致內傷脾胃外冰肌膚脾胃傷則飲食減而中氣損內臟遂變虛寒肌肉冰則血不行而痘不得成漿痘遂轉為陷伏此熱症之所以變虛也虛症既見當從虛治勿謂前之實熱而終不敢補也辨表裡虛實寒熱夫肌肉皮毛著於外身之表也腸胃臟腑藏於內身之裡也表者痘瘡所著現之處為運化成功之地不可以不調也里者痘瘡發端之所為根本滋潤之區又不可不治也然為表為里各有虛實之異寒熱之殊若不分而別之晰而明之恐紊亂倒置用藥不當以貽學者之誤故條陳而分晰於後表虛調治法夫表之虛者必畏寒畏風唇淡面青精神倦怠手足冰冷其痘出不快亦不起發灰白不紅摸過而不礙手痘與肉色不分其後皮薄而軟潰爛成坑或為水泡而難結痂皆表虛也蓋脾為肌肉之主肺為皮毛之樞治此之法在寧肺健脾宜用升陽補氣之藥內托是得其宜當此之症清涼發表最所忌也表實調治法夫表之實者痘瘡突綻肌肉疼痛舌有黃苔面赤唇燥毛髮直豎皮膚乾燥總無微汗如此之症皆表實也表實則腠理不通懼其壅毒治宜解表松肌升葛柴芩乃對症之藥若誤服耆術始慮其閉毒繼不能起發終難於收靨害可勝言哉表寒調治法夫表寒者痘不起頂肌肉不祕毛竅屢開自汗時淋戰栗時作咳嗽惡風常謂身寒皆表寒也此必肺氣有虧肌膚不緊氣血怯弱所至若置之不治漿清皮薄灰白水泡之患至矣宜速與以固表和中之劑倍加黃耆肉桂庶可無虞也表熱調治法夫表熱者腠理素祕熱氣鬱滯於肌肉故潮熱不清面青唇紅血紫而瘡焦乾枯黯無光彩者不治則紫黑乾焦鐵殼空瘡之弊至矣治此之法宜涼血解毒故柴芩升麻紅花紫草諸藥所以不容緩也裡虛調治法夫裡虛者脾氣既虧元陽不旺其見症也飲食少進大便頻泄小便清利精神困倦口鼻冷氣多好睡臥懶於應對此裡虛也裡虛則不能送毒痘必不能起發雖起發而頂必陷色必白瘡必軟而漿必稀其平塌倒陷之虞立至矣見此之症內托之劑在所必用凡參苓耆朮桂附諸品萬不可缺也裡實調治法夫里責於實而痘之根苗乃固其飲食如常大便堅小便利而精神清爽者此脾胃安寧裡氣充足痘必能起脹斯固不必慮也第恐裡實而有滯積以致毒鬱於中壯熱作渴咽乾舌燥煩悶不寧驚狂譫語痰壅氣促上下失血此實臟滯留毒火不可不急治也宜涼血解毒庶可免焦紫黑陷之危凡助脾補氣之藥萬勿試焉裡寒調治法痘以陽旺乃升氣溫乃化裡寒則五內空虛難升難化勢必下陷不亦危乎裡寒之症其氣必涼其便必泄面清唇白手足厥冷寒戰咬牙不思飲食痘色灰白伏陷不起見此之症急與溫中內托之劑而重加以桂附丁薑之藥庶可救其危也裡熱調治法里雖畏寒亦不宜熱熱者臟腑本多鬱火而毒火又且容留故煩渴腮紅腹熱騰騰不息小便為之赤澀大便祕結不通喘噓狂叫如見鬼神以致火熾陰枯火炎血紫其痘必紫黑焦枯不能灌汁矣治此之法急宜滋陰解毒蓋陰盛則火息毒解則熱除若熱結太甚則與通利之劑此翹蒡芩連歸芎赤芍紅花紫草所宜急進然裡熱而實猶可任意清涼若裡熱而虛則以扶元而兼化毒之方權衡輕重慎勿妄施總而論之里者表之體而治表亦要和中表者里之用而治內又當防外故外氣疏通則里邪得出內臟堅固則外寇難攻至於寒者虛之甚虛者寒之甚若虛寒結於胸臆然後用藥治之則為時已晚故里實固能滯毒火熱因實而益炎當實熱俱要清解至熱結宜加疏利然後乃能安枕隨症加減方謂良醫汗下論汗下之説不一有謂首尾不宜汗下者有謂首尾宜於汗下者皆各有所見也謂不宜汗下者謂汗以疏表下以傷里痘起之初用藥發汗恐表虛而痘必皮薄漿清而不堅硬發癢潰爛水泡灰白以貽日後之禍故首不宜汗也用藥下瀉恐裡虛而痘必伏陷不起咬牙寒戰吐瀉不食而有倒靨之虞故首不宜下也若結痂之後氣血已衰元神已損倘或汗下則變症立生危如纍卵此尾不宜汗下之意也謂宜於汗下者謂汗以松肌表下以瀉毒氣痘毒方張之際若腠理緊祕則毒氣不宣必至煩悶鬱結稠密不堪界地不明而鋪氈蠶種之禍於是作矣發汗則邪從汗解變症不生此首之所以宜汗也至於毒氣在裡祕結不通小便赤澀腹痛煩渴若不速下則實熱留滯於內臟其痘必致焦紫乾枯腹脹失血喘急痰鳴之患立至矣此首所宜下也若至於尾須防餘毒餘毒內留非下不除風寒外搏非汗不散此尾所以宜汗下也以愚論之痘性原欲外化非可在內而消當毒氣發越之時若腠理不祕身有微汗則毒氣得宣最為順痘原非表虛不可用黃耆斂汗之藥預固其表倘身熱燎人唇紅面赤毛髮焦豎而身無微汗則肌膚壅滯慮其遏抑不得不以升麻乾葛參蘇解表之劑急以疏其壅也但不可用麻黃羌活之湯猛以攻其表耳且既汗不宜復表復發則必傷元故見點忌用乾葛者亦恐過於發表耳若痘後元氣已削無故斷不敢汗縱有風寒潮熱只可溫中帶發補中益氣為宜至如痘前吐瀉俱是毒氣奔越此際不宜驟止痘出而吐瀉自寧若實熱容留臟腑必有祕結之弊須用解利之藥如酒製大黃蕩滌腸胃而已慎勿用破氣斬關之猛藥以圖一時之效而不顧其後也若小便順利腹不脹痛痘色不紫雖大便祕結亦不敢用大黃至痘後作泄其糞黃臭則餘毒因之而解亦不可以驟止如腹痛膨脹只宜消導亦不敢用下藥蓋誤設藥餌殺人而不見血醫者可不慎乎氣血論夫人之身氣血為主至發痘之時則血以載毒氣以送毒必氣血兩旺然後能逐毒盡出不留於臟腑及毒現於皮膚其高起者氣之充也紅暈者血之附也故痘之尖圓則氣盛痘之紅活則血足氣血充足乃能運化毒氣灌漿成膿若氣不充則痘必頂陷而癢皮薄而軟毒且內攻雜症由是作矣蓋自汗則元氣已敗寒戰則肺氣已寒咬牙吐瀉則脾胃之氣又虧若至平陷倒靨腹脹痰鳴其毒已攻臟腑雖補益亦自無功是以智者決機於先當痘發之初雖解毒亦恐傷元既出之後貴扶元而兼化毒此抑邪助正理所必然若毒已出外慮臟腑空虛固宜補其元氣且真元壯旺方能克化成漿至於血也者氣之臣也如灰白雖屬血虛然補血必須補氣頂起而痘乃紅腳闊是為血散然斂血又在扶元蓋氣旺乃能統血血陷雖是血盈然氣充而血自降此養血所以必須補氣也惟痘色淡白則為血虧宜以補血為君以補氣之藥為佐但六日以前恐血熱氣滯而毒不宣故溫滯之劑不容妄與第不可以損元神七日以後慮血弱氣虧而毒不化故補益之藥在所必投亦要看其虛實斟酌合宜庶無後悔馮氏楚瞻曰人之有生賴乎血氣然血為榮者融也如水之融周流灌溉而無所阻滯氣為衛者圍也如城之圍範護充固於身而無所屈撓即痘之一症始未俱賴乎榮衛氣陽也血陰也氣陽從於表血陰從於里氣以成痘之形氣充則頂起圓暈血以華痘之色血盛則根窠紅活然氣為之主血為之附必氣血相和於內則痘毒發揚於外若氣過盛則發為泡氣虛則為頂陷為癢塌為自汗為皮薄而軟為寒戰為吐瀉為灰白血過盛則為斑丹血失職則為滯為紫黑為倒靨或紫赤浮於肌表而不藏入於泡內血虛則為淡白為根窠無暈以手摸過而紅色不見是皆交會不足也若根焦紫黑者血熱也頂陷而紫黑者血熱而氣滯也此又不可作氣虛而誤用補劑但宜活血清熱解毒血活則導滯也頭面馮氏楚瞻曰痘瘡以正面為主蓋五臟之精華皆上著於面也故身上瘡癢而抓破者不為大害惟正面不可犯動一處苟於眉目鼻面之間抓破一處者此毒熱也急用甘桔牛蒡之類以解之其癢即止者乃佳兆也如癢不止則浸淫漸開其氣泄而其癢急甚必至滿面抓破而死更有起發養漿之時額上瘡如火燒湯澆之狀潰爛破壞無復完膚或兩頰之傍亦如是樣不待抓搔而自破爛者必漸漸潰開殼焦水去似靨非靨其沙崩之勢莫之能御必至陽氣脫而死更有痘瘡作漿之初未宜收靨面上諸瘡未盡成膿而忽鼻準頭瘡先干如橘子色者或眉心瘡自乾黑者或兩耳上瘡自收者或唇上瘡自焦黑者或兩頰瘡干陷如餅者此皆名為倒靨乃死之候不可認為正收也形色馮氏楚瞻曰看痘全憑形色觀形色即知順逆矣如始出之形頂尖根圓起脹之形發榮滋長成漿之形飽滿充足收靨之形斂束完固皆正形也順也若始出而如蚊咬如蠶種如熱痱如寒栗直脹而頂平不突板實不綻成漿而谷軟皮薄結痂而痂薄如麩潰爛黏聚皆形之變也即可知其逆矣如出之色鮮明潤澤起脹之色頂白根紅而復光潤成漿之色白而漸黃蒼而淳厚結痂之色蒼如粟谷疤痕之色紅潤凸起色之正也順也若初出而淡白乾紫晦而不亮起脹而頂色灰滯根血散漫或地腳深紅成漿而灰幹不潤或漿薄清稀結痂而痂色麩白落痂而疤痕淡白紫黑皆色之不正也即可知其逆矣善治痘者於此求之則思過半矣疏密馮氏楚瞻曰痘欲其疏疏則毒少不欲其密密則毒多然疏密之分尤有喜忌焉如頭面欲疏是元首不可犯也頸項欲疏是管籥不可塞也胸堂欲疏是神明之地不可觸也腹背欲疏是臟腑之所附也至於手足則不忌其密矣且謂之疏者非但稀少也即密而縱橫磊落大小勻淨亦可以言疏謂之密者非必盛多也但有數處錯聚黏連不分界地亦可以言密況疏固是順苟見點雖少而大熱不退唇舌燥裂大小便祕煩躁不寧此毒盛壅遏不能得出雖疏未必為吉密固是逆苟現點之後紅活滋潤日漸起脹神氣清爽飲食二便如常雖密未必為凶此不可執一論也榮枯馮氏楚瞻曰物濕則潤澤燥則乾枯痘之榮枯血實主之血者所以營陰陽濡皮毛流關節也若瘡本疏者則血不在多而自易充足惟瘡本稠密者貴乎血之有餘則經脈流行灌溉滋潤自然形色鮮明根窠紅活矣如血不足而經脈壅遏窠囊空虛自必黑燥而不鮮明枯萎而不潤澤皮膚皴揭而啓裂故經曰諸澀枯涸幹徑皴揭皆屬於燥蓋由其人血常不足加以毒火薰灼是以精血為之益竭治宜活血涼榮而散熱解毒滋金潤燥則乾涸漸可挽回矣老嫩馮氏楚瞻曰朝華之草夕而零落松柏之堅凌冬不凋蓋草木有堅脆不同之故也人之質有厚薄氣有強弱亦然痘瘡之毒喜老而惡嫩如蒼蠟嬌豔色之老嫩也緊實虛浮形之老嫩也濃濁稀清漿之老嫩也堅厚軟薄痂之老嫩也然老嫩之故衛氣主之衛氣強則能製毒故色蒼而蠟形緊而實漿濃而濁痂厚而堅自然易壯易靨雖有風邪穢毒不能害也如衛氣弱則不能勝毒乃色嫩而紅形虛而浮漿清而稀痂軟而薄易破易靨不待風邪穢氣已先敗壞矣故痘之老嫩氣之所致也至於紅者雖血之體然血因火動而呈其色無火雖紅必淡矣其以紅為血熱者指深紅而言若夫嬌者氣固不足連血亦虛無幾之血乘以無根之火遊行於皮膚因囊郭不厚故雖紅而嬌不若白而老也標本馮氏楚瞻曰病有標本治有先後故有從標者有從本者有先標後本者有先本後標者有標本兼治者並宜詳其緩急而辨其先後即如痘瘡自人身而言則氣血為本瘡疹為標自痘瘡而言則瘡疹為本別症為標如瘡子稠密是故在標之痘為禍其氣若不勻血若不周則當勻氣活血而兼行解毒利久不止漸成壞症者則救里發表兼而行之此二者所謂標本兼治者也若氣血充實但瘡毒壅遏而發不出者則單行托裡解毒為主瘡勢太甚咽喉殊極腫痛者則用清利咽喉為主瘡勢太甚自利頻數不止則單治自利為主大小便祕煩躁喘急則單以利下為主此四者所謂急則治其標也如瘡已起發但氣少虛者即補其氣血少虛者即補其血所謂緩則治其本也如瘡勢太甚煩渴不止則以解毒為主而兼治其渴所謂先本後標也如痘陷泄瀉則先救其里後攻其表所謂先標後本也明乎標本之理則治法之緩急先後自不紊矣始終馮氏楚瞻曰治痘之法貴乎謹之於始而慮其所終故曰上工治未病中工治將病下工治已病治未病者十全八九治將病者十全四五治已病者功莫能施是以發熱之初大熱煩渴而便祕結腹痛腰疼鼻乾唇燥驚悸譫妄者此毒氣鬱遏於內即當防其伏而不出矣若吐利不止即當防其中氣虛弱不能助瘡成漿或致倒陷矣故熱則解之便祕則利之驚則平之吐利則止之且如初出一點血此春之氣發生之令也至於起發此夏之氣長養之令也水化為漿此秋之氣成實之令也膿乾結就此冬之氣閉藏之令也若初出而便有水將發而便戴漿膿未成便收靨者此未至而至謂之太過須防必有陷伏倒靨宜急發表托裡解毒為主若應出不出應起不起應灌不灌應收不收者此至而不至謂之不及此必血衰氣微須即防其不出不起無漿斑爛之症急宜表暴起發補托回漿而兼與勻氣活血助膿解毒為主又如初出而色豔者則必皮嫩嫩則易破須即防其癢塌相聚成塊者不可謂疏須即防有內伏漿水清淡者雖已成痂須即防其後發癰疽頭面預腫者須即防其易消而倒陷咽痛者須即防其失音而嗆喉頻更衣者須即防其倒靨痘多水泡者須即防其自利目澀淚出者須即防其生翳杜微防漸治未病之良法論四時調治法夫天時之變遷既異則人身之感冒亦殊治痘者又不可不明時令也昔人謂春夏為生髮之時陽氣在外此時痘疹得其時令故多順症秋冬為肅殺之氣陰氣司令此時發痘氣不陽和故多惡候其説似也而實不然蓋疫氣流行莫之致而至者豈必俟時而舉乎況五行各有生殺之機四時悉有不平之氣如春傷於濕夏傷於暑暑濕之邪皆能遏抑毒氣故治之之法春必除寒而去濕夏宜解暑而滌煩且木旺剋土春又宜防嘔吐火炎土燥夏又恐生泄瀉況陽氣盡泄衣被不宜太厚恐鬱火毒於肌膚而有夾丹之症至於秋有金風之虞冬慮大寒之凍風寒所阻毒何由宣故秋宜解表慮中寒而生他症冬宜去寒恐臟冷而有他虞因時調治甚勿執一律以相施也治痘宜審各方水土夫各方之水土各殊故斯人之氣稟不一西北性強南方性弱北人多肥大南人多瘦小皆水土所致也故南屬火南人性亦畏熱北屬水北人性亦畏涼醫者至其境又宜觀風問俗因地制宜庶無差誤痘發日期痘毒藏於命門種痘者以外苗引其內毒吹苗之後其苗入腹一日傳過一經要六日方到命門外苗相感內毒乃動算至七日其毒乃發若八九日後始發者苗氣弱而傳送緩故稍遲耳痘症全期出痘計日有一十二日之期乃按天時十二個月令也其中有至理存焉發熱三日應天時正二三月也見苗以至出齊應四五六月也長漿以及足漿應七八月也回水結痂應十月十一月十二月也此一定陰陽造化之權衡也世人不明陰陽造化之理乃除去發熱三日不算卻於見苗之日算起曰出三日長三日灌漿三日回水結痂三日是將十五日作十二日也何其不明之甚也其曰出三日者猶無大關係可混得過去若曰長三日則長何物殊不知長者長漿也既云長漿又曰灌漿不亦重疊而言之乎庸醫執此當長漿三日之際總不言漿且曰長得症之顆粒好亦不用藥催漿及後面部轉褐色乃回水之候彼方用藥催漿痘不甚稠密尚可延捱若毒火內盛及氣血虛弱鮮有不誤事者此皆長三日之一言誤其時日不能催其長漿以致膿漿不成變症蜂生雖有明師難保其後矣或問之曰子言一十二日必連發熱三日而算以合天時正二三月也若痘出稠密倘為風寒所束出得遲滯三日不能出齊者有之子今乃曰見苗以至出齊應四五六月倘後之人遵子之説不待出齊而用藥催漿不失之太早乎豫應之曰出痘日期既應天時一十二個月令有春令發生夏令長養秋令成熟冬令收藏之義倘未出齊透一日以象閏月也推之長漿不能及時充滿亦可透一日以象閏月則痘漿未有不成者也豫故曰其中有至理存焉何前賢於此不深究也今特表而明之痘症傳變痘發自腎而傳肝傳脾傳心傳肺皆自內而出外也故一二日自腎傳肝傳脾自肝自脾傳於心肺因而出於肌肉三四日自肌肉而盡出於血脈四五日自血脈而盡出於皮毛五六日自皮毛而盡出於痘疹八九日而濃水漸干十日而結痂十一二日而痂落無留毒無變症矣若出於筋而少留於髓則渾身壯熱口乾悶亂出於肌肉而少留於筋則搐掣牽強紫黑潮熱出於血脈而少留於肌則痘不肥圓出於瘡疹而少留於皮毛則痂遲落而多麻瘢此痘傳五臟之説也痘疹將出五臟皆有病症惟腎無留邪者吉若初熱便作腰痛而見黑點者必死蓋毒氣壅盛一發端而腎即敗絶其毒安能發越乎五善七惡馮氏楚瞻曰痘有五善七惡治痘者宜熟諳也何謂五善一飲食如常二大小便調三色澤紅活堅實四脈靜身涼手足和暖五聲音響亮動止安寧五者不能畢具若得二三自然清吉七惡者何煩躁悶亂譫妄恍惚一也嘔吐泄瀉不能飲食二也青乾黑陷癢塌破爛三也頭面預腫鼻塞目閉唇裂四也寒戰咬牙聲啞色黯五也喉舌潰爛食入則嘔飲水則嗆六也四肢厥冷七也七惡之中但見一症即勢不可為入門看痘法凡小兒不能言語又無脈之可憑醫者往視當以望顏色審聲音問其飲食二便潮熱若何方可辨症下藥一到其家勿先飲酒須先淨手安坐寧其精神定其心志然後呼病者於明亮之處定睛先看其精神精神清爽者無事神昏目閉者非元虛則毒閉也再看其面部唇舌兩頰及目紅赤而眼有淚漿唇紅紫舌有白黃苔者熱重毒猛唇舌黑者不治面青者有風唇淡舌無苔者毒輕熱大者毒重熱緩者毒輕言語飲食二便如常者吉又看耳後筋紋淡紅色者吉紫者重青兼亂紋者凶又須條均直上耳尖而無分枝者吉若分枝纏繞或橫過髮際者凶又耳上屬脾熱者重涼者輕耳下屬腎涼者重熱者輕又耳蒼黑者屬腎熱黑色從太陽繞耳者死眼內黑珠起浮油者吉神光不明珠色轉緑或赤者危瞳子不明烏珠不亮者死目翻白者凶鼻青主吐乳鼻有黑氣者死鼻塞流涕者傷寒鼻燥氣粗者毒盛鼻尖紅直上印堂者心經熱盛肛門如竹筒者死魚目魚口青遮口角黑掩太陽者死痘疹傷寒辨痘疹發熱之初大抵與傷寒相似但傷寒從表入里只見一經之症痘疹從里達表而五臟之症俱見如呵欠煩悶肝症也乍寒乍熱手足稍冷多睡倦臥脾症也咳嗽喘嚏肺症也骩冷耳涼腎症也常形驚悸心症也又觀心窩有紅色耳後有紅紋或身熱而腹尤熱惟中指梢獨冷男左女右脈從底強眼有淚影是痘疹也以上五臟之症獨見多者必主其臟之毒尤甚治者又宜知也將捻照法痘初潮熱二三日尚在疑似之間將草紙作捻子飽醮清油乃於燈上往來熾熏令勿爆吒將病者房中窗門緊閉令其黑暗乃點捻子照之須一手執捻一手用掌抵其火光觀兩顴宜以捻子在耳邊及鼻邊平照觀中庭宜以捻子在兩目角平照則痘疹之在皮膚中者皆歷歷其可指矣但麻疹則浮於皮外而肉內無根痘疹則從肉底而出其根甚深此又所當辨也二十四頂方一腎經發痘初熱腰痛身如被杖背不能伸或連尾髓骨亦痛者用雄雞一隻剖開雞腹取出腸肝立將燒酒一盂噴雞腹內安放腰上用帶緊縛限一炷香為度其雞即青臭不可聞連用二三隻其痛自止其痘亦出二心經發痘忽然發搐症與急驚風同用桃樹皮蔥子燈心三樣抖爛敷囟門肚臍及腳手掌心限一炷香為度則驚自醒而痘自出又於手足合谷處用燈火各灸一壯以扯散風痰三小兒體性怯弱或因吐瀉之後其元愈虧不能勝毒汗出如珠四肢厥冷似睡非睡眼中露白症同慢驚此危候也急用大附子四錢乾薑四錢丁香三錢陳豆豉三錢小雄雞一隻一同搗爛再用燒酒略炒溫即敷臍上及二足底湧泉穴急換一二次其痘自出若有瀉加灶心土四後生輩或失陽之症方其發痘欲出不出狂言亂語此痘毒不出鬱火攻心既不敢用清涼之藥以解毒又恐驟用補劑以助火此最難措手之症急用雄雞一隻生剖開腹以燒酒噴之敷於臍上其痘自出其譫亦寧凡欲補而不敢補其痘不能出者俱用此方此從外托內奇方也切勿視為尋常或遍身發痛乃毒出腎經用黑豆一升煮熟擂敷腰上即止蓋黑豆能解腎經痘毒也五少年出痘或當色後誤為發散傳為陰症用新生雞蛋三個取白調乳服再灸煉臍火又扯起陽物離糞門各一半灸七壯其陽自回六女人天癸已至當出痘之際經水忽行一則懼其汙氣相沖二則慮其血衰不能化毒此最危之險候急取桃樹上寄生擂爛敷足底下湧泉穴三炷香為度經水自回痘亦萬全七孕婦出痘激動其胎又不得下或胎死腹中而不能出此至危之候宜取路上推車子及其所推泥丸一煎焙乾研為細末加威靈仙同研用酒調為丸納臍中將膏藥貼住三炷香為度其胎即下如經水不動亦可以通八孕婦出痘腹中作痛乃胎動也若不頂住一經臨産則氣血兩敗痘必不全急宜內服安胎散外用蓮蓬殼燒灰存性各三錢艾葉三錢共為末醋調敷臍中連換三次其胎自安九少年出痘吐血衄血不止此虛火上炎血不歸經故血妄肆於口鼻安能載毒出外乎宜取白果擂水服後將柏樹上寄生二兩山梔根去骨二兩共擂爛敷臍中連換三次其血自止若未止再用犀角地黃湯與服其症自愈十痘當起脹之時忽然便血血既下崩安能起脹最危急也宜用地榆生大黃紅花根共為末燒酒調勻敷尻骨三炷香為度連換三次其血自止又夾癍夾丹用土朱紫草共為末敷口即退十一肝經出痘大便下血眼紅氣粗丹痧滿面紫黑不起用白頸蚯蚓七條焙乾瓜蔞仁三十粒去油杏仁十五粒去皮尖藤茶調勻作餅貼臍一炷香為度連換數次各症俱退十二肺經出痘滑精夢遺咳嗽失音不省人事取新生雞蛋一個略開一孔去其黃白止用蛋殼將元參二兩取汁灌於蛋殼之中用紙封固再將熟黑豆擂爛包裹蛋殼置火中煨一炷香為度取出令退火氣乃將元參汁與服再用本經方藥止之十三小腸出痘遍身發癍片紅片紫如雲如霞無痘出見不省人事急以雪梨與食又將芙蓉花川椒胡椒共為末紙卷為條蘸麻油用燈盞盛之照於被內覆蓋一時其癍自退而痘自見矣十四胃經出痘咽喉閉塞或致失聲不思飲食上吐蛔蟲下瀉惡血急將緑豆為末以雞蛋白調之喉閉則敷於頸吐蛔則敷於臍上瀉血則敷於臍下其症自平十五命門出痘鎖眉刺心煩悶不寧大熱不退用生艾葉一兩黑豆一撮白芥子三錢醋煮一滾為度共擂爛作餅敷心前連換數次熱退心寧十六腎經出痘尻骨疼痛日夜不寧用芙蓉根馬鞠草共擂爛炒溫敷尻骨上其痛立止十七時值瘧疾而復出痘口吐白涎咳嗽失聲用生薑切片包大附子煨再取薑汁和當歸生地白芍共擂爛敷臍中二炷香為度白涎自止十八痘見脾經甚為美也然防禁不周穢汙相沖痘不起發狂言妄語遍身癢塌抓破出血聲啞氣急此輕症變重也急用石膏寒水石麝香鬱金甘草共透煮去甘草渣又煮乾為末用蜜調敷胸前其譫自止而痘亦起發矣十九痘出太陽舌心黑口氣臭大小便不利而痘紅紫者用青黛防風全蠍石膏酒製大黃合勻為末作餅敷臍中痘色自活諸症自退二十痘出太陰夾癍夾疹譫語無停又或誤服鹿血以致失聲用雪梨水磨象牙與服則譫定聲清癍疹亦退其痘自出矣二十一痘出而腆胸腰痛喚叫不寧用豆豉一碗胡椒一錢共擂爛又將生薑四兩抖汁調勻炒溫敷於胸腰二處其痛方止二十二痘出腎經腰腹絞痛吐瀉交作手足冰冷大汗如注此陰盛陽衰最危險也急用乳香沒藥人參各一錢為末作丸納臍中又將艾葉炒熱敷於丸上其症自平二十三痘出不快煩渴悶亂睡臥不寧咳嗽失聲將艾葉一碗胡椒三十粒擂爛調水落過取汁熬膏作餅敷臍中諸症自退又或痘如麻子一片成氈此為風毒非真痘也因風寒閉塞皮膚真痘不出故爾用菱藝子煮水洗浴再用描爪荔燒煙燻之則真痘出而癢自止矣二十四女人出痘經水忽至用老杉樹皮舊棕胎髮共燒灰調酒與服其經立止故名三灰散以上二十四頂方方書未載種痘之家各視為祕傳然亦用之而有效者故録之以備急用
