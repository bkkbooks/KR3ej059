body:
  text: 卷五灌漿辨症賦九日十日順候漿行半足若或稍為不順此時方作膿窠痘內之漿行否外觀便見分明毒重而壅遏者乾枯退縮氣盛而升發者充飽光榮頭面行漿四肢末起見之切莫慌張腿臁發泡而頰焦枯見之且休歡喜既已慮其發嗆且又慮其喘急飲食不多或因臟虛而內陷水漿頻進恐來泄瀉而復顛調理失宜倒戈反掌熱甚煩渴到此休依實論吐兼溏泄此時定作虛看紫黑乾枯急攻發而或可生氣虛塌陷重溫補而幸能活發嗆懼其失聲喘急恐其腹脹瘡或白而少神根雖紅而難治頂不起而軟弱腳雖赤亦難生淡白而闊塌此內必無漿汁皮薄而嬌紅有漿亦是清稀犯此數端八九日必然發癢若還壯熱燎人不癢定行乾燥紫黑乾枯不須著眼中凝血迹或可幸生漿既行而半足時則未宜收斂忽爾一時紫黑古名倒靨請君莫謂結痂攻發若得其宜此症猶堪復活旁生血點再行漿危症也當文治若見痰鳴而喘喘黃泉其邇失聲而悽悽陽數無幾論死生之決斷總看膿漿之有無有漿則生無漿則死漿有六分猶可活三分漿汁亦歸陰內托補劑速宜攻救遲延一日莫可誰何醫若救焚豈可緩乎灌漿調治總論凡痘至七日宜灌八日宜滿九日十日乃漿期也初出是血其後血化為水水化為膿至於成膿其毒方化然必漿滿毒乃出盡必漿濃毒乃化盡痘雖起脹若不成膿則毒雖出而末化勢必擾擾於皮膚倒流入里故在外則為癢塌在內則為內攻而痘瘡抓碎滿面無皮腹脹喘急音啞痰鳴不可救矣是以人之生死判於膿之有無有膿則生無膿則死理必然也此灌膿三日之中乃生死存亡之界此際可不慎乎然膿之所以不成者皆由五六日前失於解毒以致毒壅而熾血燥而凝氣滯而餒故不能運化以成漿也然至九日十日以來內臟空虛候當用補且正氣與毒氣相持已久至此元氣必衰斷以扶元為主況痘為臟中之毒即斬關破壁出於皮膚臟腑必為不固若不內托以衛元神則方出之寇恐復乘虛而入此倒陷倒靨之所自來也至於倒陷倒靨則毒返內攻雖有良醫莫能救矣故時至九日總宜溫補不敢清涼固肌內托是此時之要領健脾補氣為此日之綱常人參黃耆乃助氣行漿之要藥當歸善於補血欲行氣須用酒洗恐滑泄則土炒為宜鹿茸最善攻漿補血而又能助氣酒酥原是良方白芷排膿止痛行漿劑中必用川芎提氣行血起脹方內宜加欲斂血以行漿功莫勝於白芍欲滋陰而活血勢必用乎元枝攻毒排膿在川甲起漿灌汁喜淫羊丁香暖胃又攻漿肉桂扶陽而補氣木香行氣且行膿山楂健脾兼散毒白朮淮山乃除泡實漿之聖藥凡漿清皮薄者非此不能解其厄附子乾薑乃暖胃行陽之上品凡咬牙寒戰者非此孰可救其危泄瀉若來則朮苓訶蔻力健脾而不畏嘔吐或至則參砂丁藿宜溫胃以為良至此虛症若形任是辛熱之劑總恐之而不懼縱或稍形熱症亦不敢純用清涼石膏大黃慮傷脾故不用前通豬澤恐利水而干痘漿雖熱毒未清只用雄黃牛子凡芩連梔葉戒之切莫輕試恐臟寒而告變須臾即或偶中風寒用薑附桂枝而發汗凡羌獨柴荊升防蘇葛走表散氣之藥慎之切莫妄行慮表虛而變症旋生若咳嗽痰涎款冬白附桔梗陳皮可用而川貝膽星清痰之藥休行忽然驚譫狂言莫謂此為實熱妄行驚風施治而用清解之劑此是血耗神馳只宜養心補血歸脾湯實得其宜又有足攣手戰勿謂風生手足而用驅風峻藥此亦氣血有虧而不能榮四體必大補湯加續斷以滋筋血之榮腹痛多為不吉平胃散是良方任他腫脹總無妨只要痘瘡肥壯七孔流膿不怕此是內中有痘於今潰出膿漿大便或瀉膿血亦非腸胃有傷皆因腹中有痘痘潰不要驚慌調脾解毒最為濃五芩散加牛蒡他如口渴身熱是作漿之本症偏宜用補切勿投涼號啼叫痛是行漿之吉兆最喜作痛切忌發癢痛則其漿必成癢則其毒不化頂尖腳聚是氣血之調和知其漿之必滿便不滑利是脾土之堅剛勿慮膿之不成試觀痘形外明內暗則其行漿已實粗肥堅硬喜其中氣不虛由白而黃其漿已熟紅暈漸小其漿已行至腳不紅而痘蒼蠟此是成功之地見此喜出眉端其後總無變症面部漿充遍體之膿雖有三分未足吾知生氣已成頭面蒼黃四肢漿即清稀斷不至於死地若其痘也內外俱明其中必含清水起而不潤其內必是空瘡腳漸闊而暈漸散此為平塌頂漸平而中漸陷毒入內攻皮易破而癢愈甚豈能外化最忌灰白而伏尤兼紫黑為殃疔在舌上最難當人在其魂已往抓破並無膿血十兒九個必亡若還復堆膿汁結聚猶帶赤黃此症尚為可救急用內托之方汁結形如雞糞色灰枯而不光抓破大凶之兆十三日見閻王九日十日腫忽退此兒端的赴泉鄉十一日間聲忽啞丹田氣絶必傾亡喘噓而兼腹脹咳甚而且痰鳴更或泄瀉不留停藥物值下死症糞門如同竹管將來定赴幽冥吐瀉蛔蟲必死此其臟腑已傾遍身魚泡死堪憐皆是勿療之症若見如此之症何須罔用精神凡治痘之法須宜預慮莫待變症而始愴惶故發熱之初當為出痘之計見點之日宜思起脹之謀出齊起水即要立行漿之地蓋漿之不行多由毒之內滯毒之不滯必解於七日以前若以前失於解毒至九日以後不敢清涼明知毒入內攻而亦難於救藥故犯痘之家必於六日以前宜急請醫調治勿遷延以致自誤治痘之師當於七日之內速為力救危亡毋怠忽以致誤人若至九日十日以往而始慌忙求治則猶苗已稿即有甘注亦何益乎余所以痛心疾首而為天下告戒也灌漿順症九日十日為灌漿之期其痘圓滿光澤而有膿窠者其毒漸化而漿行也色如緑水而漸變蒼蠟將手按之其皮堅硬身全溫和二便如常飲食能進並無雜症者順候也不必服藥但節飲食謹風寒慎起居而已痘至九日面上即帶漿腳其漿漸升其暈漸小其初則如葡萄色其後則如黃蠟色而根腳漸收紅暈則漿熟矣頂射黃漿則漿滿氣充此順症也痘至起脹腹中作飽不思飲食是毒猶滯於內也若知飢餓貪慕飲食是毒不內留盡皆發出臟腑清快而又空虛乃吉兆也灌漿險症痘當起脹之後氣血虛弱者漿乃遲緩且皮薄而清稀毒氣盛者痘色紫赤且板硬而乾枯皆險症也然無他壞症故尚可治灌漿逆症痘色紫黑乾枯塌陷者不治諸痘有漿而天庭不起乾枯而陷者不治頭面甚腫瘡皆抓破臭不可聞者不治面腫早退瘡陷無膿目無神光者不治灰白無膿擦而即破者不治皮薄無膿純是清水形如水晶者不治二便閉結腹脹聲啞肌肉焦黑目閉無魂者不治痘頂不起腳漸散闊平塌乾燥此為倒靨不治灌頂之際面部諸處即有乾枯黑靨者亦為倒靨不治抓破之痘復與內托亦不生膿不補漿目開腫退是毒入內攻也不治痘頂有孔滿出膿水堆結乾枯而色灰白如天泡瘡及癩頭之形者不治起灌之時忽舌上有黑點此疔生舌上也不治灌漿治法毒盛漿滯痘至灌期漿不升只因毒盛氣血凝清毒活血湯為主壯實參耆何須增釋痘至九日十日為灌漿之期而痘暈紅紫或帶乾枯間有焦黑此毒火內盛傷其氣血必不成膿急宜用清毒活血湯治之湯內人參黃耆形氣壯實者去之清毒活血湯見卷三七暈門元虛漿清血虛氣弱漿難生雖生皮薄漿亦清內托參歸真妙劑七真實漿效並宏釋痘當灌漿之時氣血虛弱不能領載其毒則漿不生即灌得三四分而根無紅暈瘡不尖圓皮薄而易破漿清而色嫩此氣虛血縮變在須臾急宜以千金內托散及參歸鹿茸湯補之或先用七真湯後用實漿散亦可千金內托散參歸鹿茸湯二方並見三卷七暈門實漿散見三卷異痘門七真湯録方淫羊藿三錢黃耆二錢人參川芎當歸鹿茸各一錢穿山甲六分甘草五分木香三分糯米黃豆引水泡毒不成膿泛於脾故令水泡滿四肢通身若少治猶易內外兼理豈容遲釋痘之順症次第長漿決無水泡間雜惟險逆兩途元氣內虛不能送毒成膿以致毒伏於內水溢於外侵克脾經故四肢常多大約長漿之時三分之中有一分水泡猶可望生若通身全是水泡必變癢塌而死治以平肝健脾為主外以針刺去其水雖百餘顆亦盡刺之以除泡散敷之服藥敷方之後刺破者仍復灌膿則可望生倘遍身如魚泡則必死矣録方白朮山藥白芍各二錢黃耆茯苓白芷苡仁鹿茸當歸各一錢官桂八分半夏七分丁香九粒人參五分除泡散録方滑石二兩白朮白芷各五錢血泡元氣虛弱血熱橫僭居氣位痘通紅刺破敷用拔疔散內服參耆可奏功釋痘當起脹之時氣虛不能統血血熱泛上僭居氣位故痘紅紫而不成漿又有正痘之旁忽有小泡夾痘而起漸漸長大其色紫赤皆謂之血泡見此急宜刺破令出惡血以拔疔散敷之有刺去而旋生者旋覆刺之若不刺去則遍身之痘俱變泡泡與水泡同矣然紫者猶可救黑者則不治也內服宜參耆湯及扶元活血湯參耆湯方歌血泡通紅不作漿惟有參耆四味湯制草一錢官桂五管教服藥得安康録方黃耆三錢人參甘草各一錢官桂五分生薑一片同煎溫服扶元活血湯録方人參黃耆白芍茯苓紅花元枝白芷蟬蛻牛子慈菰穿山甲空倉倉內無粟曰空倉痘泡無漿名相當血虛千金內托散血滯加味四物湯釋痘名空倉由泡內無漿止有外面一層空殼加倉內無粟非空倉乎當別虛實治之如痘色淡白此血虛不能化毒成漿也宜千金內托散痘色紫赤此氣行血滯毒熱伏於血分而不能成漿也宜加味四物湯治之雖至日數之多猶可望生若少遲延則變症蜂起業是科者當以手指次第按其痘頂其中空與不空一目瞭然倘疑心未決再以銀針挑破痘頂二三顆則俱空可知又何疑乎千金內托散見卷三七暈門加味四物湯録方生地一錢酒洗當歸酒洗紫草各八分酒洗川芎白芍各七分酒洗連翹六分專心水煎服癢漿行作痛方為吉漿行作癢定是凶氣虛實表毋遲緩血熱清毒莫從容釋諸痛為實諸癢屬虛內經言之詳矣漿行作痛非頭痛腹痛腰痛口舌咽喉痛之謂也乃膿漿充滿內實而作痛也此吉兆也用生白芍末一錢調酒服之立止若當長漿之際及漿未充滿之時以至回水之候作癢異常皆屬內虛急宜大補氣血助其足漿暈若淡白既用參耆實表湯或千金內托散皆倍加參耆暈若紅紫即用清毒活血湯亦倍加參耆助其足漿漿足而癢自止外用荊芥穗末將棉紙卷穗於內緊捲成筒火上點灼按滅火焰隔一二層紙於癢處焠之其癢亦止有穢氣觸犯而癢者急燒蒼朮紅棗黃茶葉以解之再服平和湯自然癢止和平湯見卷三應出不出門參耆實表湯方歌參耆實表保元湯官桂芎防芷朴當甘桔木香薑作引氣虛作癢賴安康録方黃耆錢半炙人參一錢川芎防風白芷當歸各七分厚朴薑汁炒桔梗各五分官桂木香甘草各三分炙生薑一片同煎溫服吐瀉行漿吐瀉憂痘陷溫胃健脾毋少停吐用參砂瀉參朮七味之外有四苓釋痘之行漿全要脾胃堅固吐則胃弱瀉則脾虛痘不虞其落陷乎急宜溫胃健脾吐用參砂和胃散治之瀉用參朮散及七味豆蔻治之若以知失於密解毒賢於內而泄瀉者異加味四苓散可也參砂和胃散見卷二嘔吐門參朮散見卷二吐瀉門七味豆蔻丸見卷四泄瀉門加味四苓散見卷二泄瀉門口瘡臭爛痘當長漿火內攻牙齦糜爛臭氣衝始用清毒終至翹二方加減各不同釋痘出稠密口舌必多破爛但不宜作臭穢氣若在長漿之際極力攻漿不必憂口舌之破爛或毒火內盛以清毒活血湯加煅熟石膏服一二劑臭穢之氣自除如值回水之候急用大連翹飲去木通車前滑石加酒炒黃連煅熟石膏薄荷麥冬花粉桔梗連進一二劑可免牙疳之患若漿不足服此臭穢不除愈見破爛串開是牙疳已成再加胡黃連又用蘆薈煅過取末入前方調服奏功如神清毒活血湯見卷三七暈門加減大連翹飲録方連翹牛蒡柴胡當歸赤芍山梔子防風荊芥黃芩蟬蛻石膏川黃連薄荷麥冬花粉桔梗甘草咽喉腫痛長漿咽痛毒上炎催漿利咽治相兼外用玉鎖匙吹法咽自清平得安恬釋痘出稠密長漿之際毒火上炎咽必奇痛以利咽解毒湯與攻漿藥相間服之外用玉鎖匙末吹入咽喉自然奏效利咽解毒湯玉鎖匙二方俱見卷二喉痛門嗆水嗆水出於長漿時毋因嗆水亂紛馳就中惟有催漿法漿足咽清飲自宜釋痘當長漿之際飲水而嗆不必治其嗆水惟有催漿一法催足其漿漿足自不嗆水矣失聲長漿聲忽啞多因氣道塞漿足始無虞不足補宜亟釋痘當長漿之際忽然失聲因肺管有痘阻塞氣道故聲不響亮又或兒小痘多啼哭失聲總以漿足為吉若漿不充滿又失其聲則是毒陷內攻肺氣將絶其危甚矣急用內託大補元氣氣旺痘升其聲復完方保無虞五陷總論痘出齊後當治不治則漿不行而五陷之症作矣五陷者紫陷黑陷白陷灰陷與血陷也紫黑二陷其症屬熱白灰二陷其症屬虛惟血陷乃是氣虛不能領血毒而外化故紫黑宜清白灰宜補血陷則專補氣此調治之大要又當詳分其目也紫陷黑陷紫黑二陷由毒盛清毒活血第一方更有紫黃無價散小靈丹及化毒湯釋痘出稠密暈紅紫而頂陷下者紫陷也甚則轉而暈腳乾枯中有黑臍而成黑陷此乃毒火內盛榮血燥焦故也宜用清毒活血湯不加生黃耆黃芩黃連紫草茸以治之然當紫陷時不過一二劑而痘立起及至黑陷則毒火亢極雖用此方十之中止能救活一二至於紫黃飲無價散絲瓜化毒湯小靈丹諸方及水柳草煎水外浴法用之亦有效者清毒活血湯見卷三七暈門紫黃飲録方紫草茸人中黃人參無價散録方無病小兒糞陰乾火煅存性為末加冰片研入以紫草煎水調服弱者加人參絲瓜化毒湯録方絲瓜干取近蒂五寸以此為君赤芍紅花當歸紫草川芎牛蒡連翹升麻赤小豆黑豆等分水煎磨犀角調服氣弱者加人參小靈丹録方大蟾酥取心肝焙乾五錢人中黃四錢乳沒各一錢五分硃砂雄黃各一錢麝香共為末取豬心血雞冠血和勻為丸以紫草湯煎送下水楊柳浴法釋古方書所載水楊柳是木今所用水柳是草生於溪澗水邊其葉如柳其莖春時青夏末秋初則赤條條直上不分枝丫至秋略含赤花凡痘焦紫乾枯者以此洗之立見光亮漿水即行其效如神已洗之後若往視之則已洗未洗之處其明潤焦暗形色判然取水行漿之效孰有速於此者但須用巾醮其藥水頻頻與拭必水足而後已也若秋冬葉落取根用之白陷灰陷血虧氣弱痘白灰補養氣血毋遲徊內托參歸皆妙劑隨症加藥死可回釋痘出稠密其色淡白根無紅暈而頂陷者白陷也甚則痘色如灰而陷矣此皆氣血兩虛之症必大補氣血為主宜用千金內托散及參歸鹿茸湯再添隨症藥味泄瀉加豆蔻訶子寒戰加附子泡薑丁香但陷伏之症其病已深如巨寇入關非良將重兵不能與敵且非一戰可以成功故藥必重劑人參鹿茸至少必用一錢更不於一二服遽期其效必連進數劑乃可見功血陷血陷通紅不帶紫紫陷屬熱血屬虛治法無他惟補氣保元湯與參耆符釋血陷之症與紫陷相似須要詳辨血陷透頂通紅不帶紫色紫陷屬血熱必氣粗身熱口渴煩躁治宜涼血為主血陷屬氣虛氣弱不能統血故血潛居氣位痘乃紅而陷也現症必氣緩身涼不煩不渴治以補氣為主斷不可投涼血之劑加味保元湯與參耆湯對症藥也加味保元湯録方人參黃耆甘草炙肉桂附子川芎泄瀉加白米肉豆蔻參耆湯見卷內血泡門紫浮萍紛紛小粒連成片擬以浮萍名不差清毒湯中生耆倍胭脂汁調明雄搽色若淡白虛弱論內托參歸次第加釋痘名浮萍如浮萍之叢聚也名之以紫因其色而名之也此症時氣出痘十之中必有二三紫浮萍者或二三十顆湊合一處其萍之顆粒獨小周圍之正痘獨大紫浮萍黏連一片止見有小小顆粒俱皆紫色而根腳亦紫色一片不分顆粒其症有三五處者有七八處者有十幾處者治此等症當長漿之期內服清毒活血湯倍加生黃耆倘受得補即用人參外治用真明雄研細末用滾白水泡細胭脂取濃汁調明雄末搽上日搽三次則毒氣盡行拔出正痘長漿彼亦長漿打成一片不論三五七八處之多俱皆成漿按期亦如正痘回水至於擦破膿水淋漓外用松花粉手豔上可以收功若清毒活血湯不能足漿則用參歸鹿茸湯以補之倘元氣虛弱亦有浮萍幾片其色淡紅或淡白當用千金內托散以催漿如漿不滿即用參歸鹿茸湯大補氣血漿成而毒解矣切不可用清毒活血湯外仍用綿胭脂汁調明雄末搽之清毒活血湯千金內托散參歸鹿茸湯三方俱見卷三七暈門漏漿痘未成膿水先漏元氣虛弱肺亦虧外須松花粉手豔上內治回漿飲甚宜釋歌曰繞試漿來未滿囊瘡頭有孔漏膿漿依然團聚封瘡孔泄去真津毒氣藏故痘作膿窠之時最要皮厚包裹完固如膿未成而瘡頭有孔其水漏出結聚成團堆於孔外或水去囊空而乾黑此名漏瘡乃元氣虛弱而肺氣不固也其症甚險急用松花粉手豔上堵其小孔結其厚痂內治須用回漿飲若膿熟之後囊皮亦熟漿水沸出因而結靨者此頭額正面之間屢多有之俗謂之堆屎收不可以漏瘡論也蓋漏瘡則膿未成堆屎收則因膿過熟其間分辨正在毫釐之間回漿飲方歌回漿飲內參苓朮芍草黃耆及首烏漏漿須用此調服補塞何憂氣弱虛録方人參二錢黃耆錢半炙茯苓白朮首烏各一錢白芍八分甘草五分煨薑一片水煎服潰爛痘出稠密藥力攻漿足潰爛臭流膿毒解止用敷治法清表溫表症不同釋膿漿充滿而潰爛作臭穢氣多因痘出稠密藥力攻其長漿漿足而潰爛流膿喜其潰爛也喜其流膿也更喜其多臭穢氣也蓋膿成則毒解止宜用松花粉除泡散敷之或茶葉方亦可不必妄加調治若身熱不結痂清表敗毒湯主之若身不熱不渴唇淡食少手足冷不能依時結痂須大補氣血助其收結宜用溫表調中湯除泡散見卷內水泡門茶葉方録方多取茶葉揀取粔梗入水一煎取茶葉鋪於床上用草紙隔一層令兒睡其上二夜膿水盡干清表敗毒湯方歌清表敗毒地骨冬牛蒡花粉草翹宗炒芩澤瀉豬苓共歸與同煎用木通録方麥冬一錢五分去心地骨皮花粉各一錢酒炒牛蒡子炒研當歸各八分連翹去心豬苓澤瀉黃芩各七分酒炒甘草三分生水煎溫服溫表調中湯方歌溫表調中參朮耆丁香熟附桂當歸茯苓甘草乾薑共白芷防芎一處施録方黃耆一錢五分蜜炙人參茯苓白朮各一錢土炒川芎當歸各七分防風白芷乾薑各五分官桂丁香附子各三分甘草一分炙生薑一片同煎溫服痘爛生蛆痘爛生蛆真可畏毒盛元虛治異方床鋪柳葉令兒睡無名蛆藥手豔之良釋痘爛臭穢蠅蚋逐臭而至凡有膿水之處蛆乃生焉見之令人可畏然亦不必驚惶毒火盛者用清表敗毒湯元氣虛者用溫表調中湯催其回水結痂外用柳條連葉鋪於床上令兒睡臥其蛆自出或用蛆藥搽之其效更神清表敗毒湯溫表調中湯二方俱見卷內潰爛門蛆藥朱氏純嘏曰蛆藥原無藥名豫家濱大河每春夏間鮮魚廣出居民買來剖而醃之不過三五日蠅蚋叢集蛆生魚上採此生葉以押之其蛆即死人因呼為蛆藥不知他處亦有此苗否其苗在地高不過尺許葉長寸余而尖有似於緑豆苗凡後學於各處見之以魚肉生蛆試之蛆見即死苗真無疑摘來以瓦鍋焙乾研為細末凡痘內有蛆者手豔上立刻蛆死邊外有一種開翠花約長寸余杆有尺余直挺小葉其根槌碎可以殺蛆其花似金銀花心與花瓣俱一樣但花之顏色不同極青翠可愛封倉痘出稠密貴封倉兩目炯然難成漿封倉止有攻漿法毒化腫消自安康釋痘出稀疏何必以封倉為順候若稠密必須封閉兩目元氣內固名曰封倉若兩目炯然決難成漿如五陷之症仍照治五陷之藥極力攻漿兩目自然封固倉不期封而自封矣封倉之後必要至十二三日痘毒已化乃開目消腫則為毒化腫消者吉若九日十日即開目消腫者則毒陷內攻必凶寒戰咬牙咬牙寒戰灌漿時氣血虛弱又何疑建中湯固為主劑參歸鹿茸用亦宜釋長漿之時有氣血虛弱而寒戰咬牙者必身涼不渴大便溏小便長而膿色清稀也宜用建中湯或加味參歸鹿茸湯至回靨時寒戰咬牙者亦宜用此湯治之建中湯方歌咬牙寒戰建中湯參朮黃耆熟附當肉桂炮薑須炙草川芎薑引用丁香録方黃耆三錢蜜炙白朮錢半土炒人參當歸各一錢川芎乾薑肉桂公丁香附子各五分制熟炙草三分生薑一片溫服譫語膿血淋漓心計虛舍空神亂若邪居睡中妄語難蘇省養血安神病自除釋凡痘稠密成漿之時或昏昏而睡呼之不醒口中喃喃妄語如被邪祟之狀時人不知多生驚怪殊不知此由膿血出多心臟空虛神無所依而然若養血安神病當自退宜寧神化毒湯與安神丸相間服之安神丸見卷七昏迷門寧神化毒湯録方人參當歸生地麥冬木通石菖蒲赤芍梔仁燈心引水煎服腹痛瘡成腹痛果何因便祕腸中火煉津又恐誤傷生冷食消詳補瀉貴情真釋痘出之初腹痛乃為毒氣若漿足膿成而腹痛未可以為毒也當審其大便飲食何如耳如久未得大便此燥屎在裡而痛用膽導法或大黃化毒湯微利之不可拘於首尾不可下之説坐以待變也若因誤傷生冷或飲冷而痛宜溫中化毒湯暖之方效膽導法用豬膽汁醋和以竹管插入肛門中將汁灌入即便大黃化毒湯録方升麻當歸生地桃仁紅花火麻仁枳殼大黃檳榔生薑為引空心熱服溫中化毒湯録方人參木香白朮肉桂白芍公丁香砂仁枳實陳皮甘草炮薑灰大棗生薑引水煎服不食內臟空虛宜嗜食猶作飽脹毒滯留急暖胃脾無少待痘起能食始無憂釋八九日前毒未出盡不思飲食固其宜也至此毒宜盡出內臟空虛當大進飲食矣而猶作飽脹者必毒留內滯脾胃已敗不亦危乎急用加味參耆湯大暖脾胃若痘起有膿飲食稍進方可無虞加味參耆湯録方人參黃耆山楂白朮肉桂公丁香煨薑引水煎服便血便下膿血不須疑腸胃痘潰故如斯莫將痢疾調方藥只用術苓散得宜術苓導滯湯録方白朮茯苓豬苓澤瀉牛蒡子肉桂發灰諸竅出膿忽爾諸竅盡出膿令人難測其吉凶豈知內痘方潰散不服藥餌也從容釋行漿之際有眼耳出膿鼻竅流膿口吐臭膿者皆其內中有痘不能結痂潰而出膿不必施治自可無虞
