body:
  text: 跋余自舞勺時從余兄遊耳提面命垂十餘年凡一字之識一得之解皆自兄來者也兄勤於經史而淡於功名壬午乙酉兩赴秋闈即棄舉子業而留心軒岐謂學期濟世醫可濟人可無負所學矣其於醫也博覽方書而自加抉擇故其治病無不應手而愈有非時俗所能望其項背者晚尤注意痘疹謂錢劉陳王既失之偏張朱師仰聶氏雖得其宗惜其書皆散漫而不便記誦爰是按痘疹先後之期與調治正變之法編為歌詩加以注釋使人一見了然誠痘疹之龜鑑也猶以諸症未備無暇詳編為恨囑余增訂余承命再三因循未果而兄已旋逝覽其遺書潸然泣下謹將平日兄所巳訂者而深思之並所未載者而旁及之兩閲寒暑始克成書轉其原本雖增十之有七然不敢以增訂自居蓋餘生平一字之識一得之解皆自兄來且以未得兄校正恐幽冥之中無以愜兄意也四方君子有匡余所未逮者余所深幸也夫亦兄所厚望也時嘉慶十年仲春月朔八日同懷弟冕南循氏敬跋於石峰之慎獨軒
