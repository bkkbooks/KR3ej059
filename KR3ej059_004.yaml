body:
  text: 卷四起脹辨症賦五六日間痘出齊矣點至足心勢方安定猶有陸續不出之狀或隱隱於皮膚之間而不見其起發者古名不快若非風寒壅遏之因必有氣虛不振之過是故五六日間痘已出齊身表宜涼八九日後痘欲釀膿身表宜溫涼則痘之毒氣盡出皮膚而內不留鬱熱溫則人之血氣自爾流通在外易於運化至此而身不微熱雖未至於冰伏而痘瘡斷乎弗長六七日來痘顆已成瘡宜肥大而粗頂要發光而白方有行漿之勢若還赤色過頭雖見嬌紅有可愛延綿八日依然到頭空殼虛花其內並無漿影若皮薄而光亮如燈內含是水雖頭尖而根腳不紅行漿弗實如熱毒盛而未解則為紫為黑壅而不起則為陷為塌滯而不榮則為干為枯為青為灰怯而不振則為不快為停漿或有肉先腫脹而痘反不起者漿則滯而不行面已虛浮而痘反退伏者毒則遏而不出身不熱而痘不起恐成冰伏之形此際宜行溫藥氣血弱而不與恐成陷伏之弊治此斷用補劑他如紫色乾枯切忌溫中滯補止宜活血松肌若或皮薄漿清則宜健脾助氣切勿解毒清涼為壅為滯烈藥雖然可發透肌尤是良方溏泄雖宜溫補瀉甚當佐升提界地不分安能起水焦紫不退必致內攻頂有亂紋宜解毒豬鬃眼現是危機此際猶甚解毒急施拯救之功遲之二日則難措手嗟何及乎起脹調治宜急痘出皮膚要漸漸起脹蓋痘起一分則毒出一分必痘脹滿而毒乃盡出倘痘不起脹則痘雖見點其毒仍留臟腑數日之後其毒內攻不可救矣故出齊三日之內其時日十分要緊急於此時觀察形色審症用藥猶如拯溺而不可緩救焚而不可遲也夫痘之安全必要漿膿胞滿其次亦要膿漿六七分方保無虞痘瘡既出形色顯然其膿之成與不成漿之足與不足此時皆可逆觀蓋痘出齊後潮熱已退雜症又除稀疏明朗尖圓紅潤皮粗而厚體實而堅者氣血俱盛毒氣又清必能起脹必能成漿此固可預知也若或稍生不順或熱不退雜症不除色暗而不明勢弱而不振界地不分顆粒不圓紫而不鮮焦而不潤淡而無血薄而不堅者非毒盛之失解即氣弱之當扶此症若無藥救則必不能起脹不能灌漿亦可以先知也故必於此時力為調治猶可救也失此不治則不能起脹又安望其成漿乎痘之生死決於痘之起伏痘起則毒從外出而可化痘伏則毒留內攻以為殃故起脹方有生機陷伏必從死例此萬古不易之論決無幸全之理此際可不慎乎起脹用藥宜慎痘當出齊宜固肌表安脾胃蓋肌表為痘瘡運化成功之地肌表不固則有皮薄漿清潰爛難痂之患故八九日上必用炙耆炙草以其補氣而實腠理也脾土不堅則有泄瀉下陷之虞而痘安能起脹以成漿故凡滑利下瀉之物戒之切莫與服且痘當起水之際又忌利水之劑雖小便不長乃津液上升之故切不可疏利膀胱而通小便蓋小便大利而痘瘡之水不能起矣是故木通車前豬苓澤瀉滑石茯神一切利水之藥此時禁而不用又恐土能制水凡補脾之藥能燥干津液其痘必致乾枯故蒼朮白朮淮藥棗仁苡仁茯苓訶子粟殼藿香砂仁一切乾燥除濕之劑總不宜投況津液盡行痘內多好飲而常口乾勿用葛根知母而驟與之止渴蓋此時忌發表宜叱清涼也縱有痰涎止宜用款冬花粉而南星半夏恐燥烈而漿不行川貝竹瀝又寒涼而慮毒冰伏至不得已而用芩連八九日來須用參耆監製若有熱而水不漲前胡在所必用頭面之痘不起川芎在所必用血熱而界不分紫草紅花生地赤芍以及丹皮是活血之聖藥而補血之歸芎則禁而莫用蓋血既熱而復補必成一片紅氈或頃刻轉為焦紫惟血虛而痘不紅則歸茸必當重用兼以川芎白芍大元枝以助補血之力而紫草紅花是血虛之忌藥遇此症切莫輕投若熱盛而壅毒不起則連翹牛蒡地丁慈菰理必用之而解毒毒之盛者當用此等以為君略用荊防以達表更加陳梗以疏通蟬蛻提毒上行不可多與多則恐致空瘡山楂宣通滯氣或清或補皆當以之為佐其毒乃不滯留穿甲透里攻漿或托或解總宜以之為使臟毒乃得外宣芍藥雖皆行血之藥然赤能涼血白能聚暈故血熱用赤六日以前多取赤芍而生用血散用白七日以後須用白芍而炒之黃耆雖最補氣然生則補中帶發熟則專祕腠肌甘草雖謂和平然生則清胃解毒熟則補氣溫中是以二者之藥六日以前生用七日以後炙施至於升麻乾葛羌活柴胡紫蘇麻黃防風荊芥枳殼檳榔皆走表散氣之藥至此皆不敢用即不得已而用之此等但須少與亦要兼參耆以扶正氣而後乃不傷元他如人中黃雖善解毒用此必合人參始不至於耗本淫羊藿雖能攻漿然亦不敢多服多則痘必生癢遍身起而頭面猶伏則重川芎而加升麻為引用蟬蛻而以筍尖作湯若頭面起而四肢不脹則去川芎而除桔梗用桂枝以達四方若皮薄而軟頂白而平總以氣虛而斷必用人參黃耆川芎肉桂以補氣藥為君若或赤色貫頂久而血不下附頂不放光亦是氣虛不能統血陰盛陽衰之義宜以扶陽為主而參耆丁桂總要多施最忌此時泄瀉瀉則中虛內陷頃刻立變白灰此症最為險要必須補氣安脾參耆更加訶蔻甚則豆蔻丸施雖謂起水忌脾強而急則治標為貴止朮苓淮山莫用以訶蔻為便宜蓋猛藥方能止泄泄定而痘乃升提氣虛下泄待何醫土炒升麻堪濟提氣上行能止泄又堪起痘以高飛此方奇妙少人知曾經屢驗休疑倘或搖頭點額其間尚有驚風莫謂痘出此非凶鎮驚丸猶堪用七八日上或朦朧未免心驚熱壅若用寧心補血定加變症無功若夫失聲咽痛此際不必驚慌定是喉中有痘痘脹故不聲揚嗆水而兼吐飯總因內痘攔當逮至十日以後此症一概平康最怕痘瘡陷伏孩兒十個九亡又畏痘色青黑十日內返泉鄉頂焦終不放毫光有如癩瘡模樣十日舌上生疔十一日見閻王紅氈一片熱難當又怕面如錫蕩蠶形蚊跡惡非常無藥能醫此恙湯泡燈燒莫治灰黑二陷難醫若是紫白血陷此症尚可維持此時雜症是危機勿謂尋常容易腹脹喘噓痰壅皆為毒陷內攻大小二便來血悉為臟敗中傷時時張口欲吐是毒鬱而不祥漿未行而咬牙寒戰此症已云難治痘不起而失智無魂吾知立見夭亡目上視而不轉或牽衣而弄裳此等已為鬼録何須懇禱穹蒼痘之毒氣出於臟腑氣血拘攝送於皮膚故成瘡形初出乃是血點其後漸漸運化血化為水水化為膿必漿足膿血成毒乃化盡然必出於皮膚而毒始能化也故痘必起而水乃行水將行則痘光潤是以痘宜光而不宜暗宜滑而不宜澀宜起而不宜伏究之痘之起與不起毒之化與不化皆氣血盈虛之故邪正盛衰之由也必正氣盛而邪氣衰陰陽調和血氣通暢乃能化毒以成漿痘之起脹雖在六日之後而調治之藥當施於七日之前蓋痘之所以難起者必是毒盛痘稠也凡解毒之藥多是清涼惟七日以前可用若八九日上候當用補毒若未清則畏首畏尾難施治矣故六七日間毒之盛者急宜解之斷不可稍遲延也起脹順症痘出齊後熱退身涼飲食如舊精神清爽體暢心寧上無咳嗽吐逆之弊下無泄瀉祕結之虞痘稀而朗顆粒分明頂尖圓而日起脹腳不闊而聚紅暈痘頂放光而起瘡底帶漿而升先出者先起脹痘若出齊至足而面部水汁俱行天庭地角總光明左右頰腮俱潤澤水至八分其腳便有漿膿又或水至而即帶行漿更為氣強血盛此等易漿易靨尤為至美之苗其次漸漸升灌亦為最吉之痘吉痘何須用藥只要飲食調和起居謹慎自獲平安切莫妄服藥餌恐庸醫反致誤人又莫冒犯穢氣致外邪而觸內毒且肥滑不宜與服恐滑利而生泄瀉以犯痘家之忌生冷不可與食恐冰伏而生腹痛以致終身之疾此保赤之良言故向天下而致囑起脹險症起脹而壯熱不退則毒滯留於內矣毒氣盛則痘色赤紫甚至焦枯稠密而不分地界元氣虛則痘色灰白而不紅活嬌嫩而不蒼老此皆險症也但神氣清爽飲食二便如常雖險可治起脹逆症頭面不起雖遍身皆起不治痘不腫起而肉先浮腫不治痘紫黑不起乾燥不潤慘暗不明者不治痘有紫黑泡刺出黑血旋而處處有此泡者不治痘灰白不起漸成塌陷氣促神昏者不治起脹時痘之四畔旋出小豆攢簇本痘成叢似粟者凶起脹時痘頂即含白漿者凶痘遍身紫點如蚊所咬者不治手足之痘見而復隱起而復塌或上身帶水下身枯者凶痘頂上有黑眼如豬鬃者毒入臟腑也急宜用內托散托之托而不起則難救矣起脹時漿水未行而口唇即有黃漿者俗名鵝口最惡候也急解脾胃之毒用調元化毒湯加石膏為君又用石膏牛子甘草煎水時時搽於口唇而且與噙或可解也不然唇崩齒落而死起脹治法出齊發熱痘已出齊熱宜退熱愈甚兮毒留中毒壅調元大成妙元虛內托可奏功釋凡痘出齊必要退熱潮熱已退則毒盡出於皮膚矣若出齊猶熱是毒猶少留於內也出齊大熱是毒盛滯於中也急宜宣毒出外毒不留滯則熱自退而痘自長矣但毒之所以滯者有二有毒氣壅盛而熱甚者其痘必紅紫乾焦兼之煩悶宜用調元化毒湯以解之若仍不退則用大成散以攻之服此而痘光潤起水即熱未盡退亦當更用補劑蓋八九日上候當用補不敢復試清涼也有元虛不能送毒而熱甚者痘必淡白雖現點稀疏亦是留毒未出不可玩忽視之宜用千金內托散托出痘毒方可無虞調元化毒湯見一卷初熱門大成散録方穿山甲一兩人中黃明雄黃各三錢硃砂二錢麝香二分共為細末冷症溫酒送下熱症紫草燈心湯送下泄瀉者忌千金內托散見卷三七暈門痘不起脹痘不起脹豈無由毒盛元虛可推求傷風傷食皆為纍對症施藥莫亂投釋痘出齊後當漸次起脹然有毒氣熾盛血燥而凝不能起脹者痘色必紅紫而焦枯宜以清毒活血湯主之有元氣虛弱血寒而縮不能送毒而不起脹者痘色必淡白頂必不尖圓根必無紅暈宜用千金內托散及參歸鹿茸湯治之有因風寒閉塞不能起脹者痘色淺淡黯滯外症鼻塞惡寒宜用蘇解散以治之有因內傷飲食中氣為食積所滯不能宣暢痘毒而不起脹者腹必飽脹疼痛宜用寬中快斑湯治之此外更有遇天時暄熱又加包裹以致毒火遏郁而不起脹者宜用白虎快斑湯治之誤食生冷致脾虛而不能起發者宜用理中快斑湯治之清毒活血湯千金內托散參歸鹿茸湯三方俱見三卷七暈門蘇解散見三卷應出不出門寬中快斑湯録方陳皮厚朴山楂神麯川芎白芷砂仁木香香附炙甘草白虎快斑湯録方人參石膏甘草麥冬升麻竹葉理中快斑湯録方人參白朮黃耆官桂木香丁香乾薑炙甘草泄瀉加肉豆蔻訶子面部不起天庭不起手足不起面部不起最為凶天庭不起死相逢手足不起脾氣弱三處看清是醫宗釋凡痘須看面部面乃五臟元陽之會面部若起則遍身雖陷亦氣血灌溉末至以藥力扶之自能徐徐而起也若面部不起而手足先脹此陽氣不能上升而流竄於四肢最為凶兆急用千金內托多用川芎加炒升麻以提氣上升必頭面起脹方保無虞面部又以天庭為緊要天庭不起則兩顴地角雖起亦無生機蓋天庭乃至高之所是諸陽之首此處不起則元陽已衰諸部安能運化急用升天散治之若遍身俱起而手足不起乃脾氣弱而不能灌溉四肢也宜用補脾快斑湯治之升天散録方黃耆八分人參當歸川芎各六分官桂陳皮各五分淫羊藿桔梗各四分木香甘草各三分穿山甲二分補脾快斑湯録方人參黃耆丁香防風防己薄桂炙甘草肉腫痘不起脹肉浮腫虛實分在皮色間赤紫毒盛宜救苦元虛淡紅大補丹釋痘不起脹而頭面頸項腫如瓜瓠此危症也須於皮色間辨其虛實皮色赤紫則屬毒盛宜用羌活救苦湯治之皮色淡紅則屬氣血虛弱宜用參歸大補湯治之羌活救苦湯録方黃耆一錢生羌活防風牛子炒白芷各八分川芎連翹去心桔梗人中黃各七分蔓荊子六分升麻四分引用荷葉水煎服參歸大補湯方歌參歸次補炙黃耆紫茸川芎白芷宜桔梗山楂防厚朴木香甘草用休遲録方黃耆錢半炙當歸山楂各八分川芎防風去蘆白芷各七分厚朴六分桔梗紫草各五分研碎木香人參甘草各三分炙生薑一片同煎溫服平塌痘起因何復平塌寒襲穢衝勢使然或服寒涼痘轉白辨症舉方始安全釋痘已半起忽然平塌者此是元氣本虛或為風寒所觸或為穢氣所沖或誤服寒涼所致宜詳審其因為風邪所觸者必惡風寒而皮毛標起用生薑附子桂枝令出微汗而痘復起為穢氣所沖者其痘必癢用平和湯外以沉檀棗核薰之其痘即起誤服寒涼者其痘必白用內托散加丁香附子以補中氣則痘復起郛郭郛郭充肥完且堅色多蒼蠟或紅鮮如逢破損多囂薄縱有良方恐莫延釋凡痘郛郭充實皮囊堅厚擦之不破色蒼蠟而紅活皆順症也若痘雖紅鮮反乾燥而不充肥此火甚而血不足宜退火滋陰血用四物快斑湯如痘充肥而帶濕淫此濕盛而氣不足宜利濕補氣用四君子快斑湯如痘雖紅活充肥而皮薄嬌紅擦之即破者此血有餘而氣不足宜大補快斑湯四物快斑湯録方當歸川芎赤芍生地升麻粉乾葛連翹紫草荊芥牛蒡水煎和燒過人糞服四君子快斑湯録方人參茯苓白朮甘草黃耆荊芥穗防風白芷赤芍陳皮肉桂水煎服大補快斑湯録方人參黃耆當歸生地川芎赤芍藥牛蒡連翹肉桂防風甘草水煎入燒過人糞同服形色形色須教著意觀紫紅實熱白虛寒倘然錯認分毫處咫尺雲泥禍害端釋凡痘瘡起發須諦觀形色以定吉凶如根窠紅潤頂蒼蠟色者上吉根窠紅頂灰白色者次之若痘色紅紫而焦枯者乃毒火熾盛血燥而凝不能起脹而化也宜用清毒活血湯主之若痘色淡白泡不尖圓根無紅暈而不起脹者乃元氣虛弱血寒而縮不能送毒外化也宜用十全大補湯加丁香鹿茸回其陽氣四肢冷加附子清毒活血湯見卷三七暈門十全大補湯見卷三怪痘門中陷四圍起發陷居中陽氣虧衰尚未通若是中枯成黑子此名疔痘類非同釋痘瘡起發其形不一有緊小而充實者俗呼珍珠痘此痘易壯易靨有粗大而飽滿者俗呼大痘此症早壯遲靨有四圍起中心落陷者俗呼茱萸痘此痘有輕有重痘稀者輕痘密者重乃中氣不足之故宜用內托散托之中自起矣右中心陷而黑者此毒留於裡中氣鬱而不升也宜理中化毒湯治之若先有水忽然黑硬幹枯而中陷者是痘疔也急宜剔破吮去惡血以拔疔散敷之仍用前方與服內托散録方人參黃耆川芎當歸防風白芍藥白芷桔梗厚朴木香肉桂生薑一片大棗一枚同煎服色紫紅者去肉桂木香加紫草蟬蛻漿不滿者用酒水各半煎加糯米不食加人乳丁香理中化毒湯録方人參黃耆當歸白芍川芎牛蒡子連翹人中黃穿山甲防風加雄黃及燒過人糞拔疔散見卷三印堂見點門四圍乾枯中心微起四圍干不久焦枯變一般毒火薰蒸津液竭理中化毒麥前攢釋痘有中心微起而含水意其四圍卻乾枯者此毒火薰蒸津液將枯之兆必身熱煩躁若不急治則盡焦枯而死矣宜理中化毒湯加前胡麥冬以治之理中化毒湯見上黃漿方脹帶黃漿毒火內猖狂急宜針剔破敷用拔疔良釋痘方起脹而即帶黃漿者此毒火熾甚故易成漿俗號搶漿痘不拘何處俱急剔破去其漿膿以拔疔散敷之不然能滯漿路令諸痘不能成漿矣鋪錫起發猶如錫餅鋪皮膚光若水精壺其人能食方無慮不食將為鮑肆枯釋凡痘瘡稠密要依次起發紅活尖圓者吉若一齊起發遍身白色如錫餅形頭目浮腫此惡候也若其人能食無他症延至日久渾身皮脫而愈倘不能食後必生吐瀉熱渴瘙癢之症而死矣能食者宜服助脾快斑湯以扶其中氣助脾快斑湯録方陳皮楂肉荊芥牛蒡木香杭青皮枳殼木通甘草水煎服一二劑不宜多渴起發之時渴又臨火邪內迫熱偏深急宜解毒生津液休得俄延向外尋釋痘瘡作渴此是常事蓋由於中毒竅內則燃熬於毒火外則灌潤於瘡故宜渴耳凡一切瓜果生冷之物不可與食惟炒米湯飲之為宜若渴大甚其人飲食如常大便堅實此內熱也宜生津地黃湯潤之若泄瀉而渴此內虛津液不足不能上潮於口宜七味白朮散滋之生津地黃湯録方生地麥冬知母花粉甘草淡竹葉十片為引水煎熱服七味白朮散録方人參白朮木香藿香茯苓粉乾葛甘草生薑大棗為引水煎服泄瀉自此常宜大便堅如逢泄瀉痘難全調脾散貴如期服豆蔻丸須應候煎釋痘自起發之後大便要堅若泄瀉無休則痘必內陷宜急用調脾散豆蔻丸止之調脾散録方白朮茯苓各七錢白芍神麯砂仁蓮子苡仁楂肉訶子肉肉豆蔻各五錢陳皮四錢香附厚朴木香甘草各三錢共為細末米清湯送下虛甚者加人參七味豆蔻丸録方赤石脂煅五次枯白礬各七錢肉豆蔻煨熟去油砂仁炒訶子肉煨去核白龍骨煅木香各五錢麵糊為丸如緑豆大用清米飲下量兒大小與之不能吞丸者將丸研碎入粥內服之亦可嘔噦痘兒嘔噦不堪聞不是寒邪是火焚妄進湯丸如拙匠內傷臟腑匪妖氛釋凡痘瘡乾嘔無物或時常噦逆此臟腑內傷衝任之火上犯清道故為嘔穢惡聲經曰弦敗者聲必嘶木陳者葉必落臟敗者聲必噦針灸無功湯藥無效此之謂也如曾傷冷物受寒氣此寒嘔也宜二陳理中湯如未傷冷物及寒氣此熱嘔也宜二陳一連湯若咽中有瘡必作痛悶塞而嘔宜加味鼠黏子湯外用控涎散吹之二陳理中湯録方人參白朮陳皮半夏甘草生薑三片為引水煎服二陳一連湯録方陳皮半夏茯苓黃連甘草竹茹生薑為引水煎熱服加味鼠黏子湯録方桔梗牛蒡射干防風山豆根陳皮荊芥連翹甘草水煎熱服控涎丹録方辰砂雄黃黃柏兒茶共為末吹喉中大汗不止起脹不宜常大汗汗多陰液必消亡保元湯治陽虛症陰虛須用六黃湯釋痘毒之火由里達表初見有微汗者是榮衛通暢毒從汗解實順症也但汗為血液太過則陰液必亡故起脹時大汗不止未行漿恐不能灌既行漿恐不能靨既靨尤恐氣血虛脫最為可畏自汗為陽虛急於斂汗以保元湯主之盜汗為陰虛急於降火以當歸六黃湯主之加味保元湯録方人參黃耆各錢半蜜炙白芍八分炒浮小麥七分桂枝六分甘草三分炙水煎服當歸六黃湯録方黃芩炒黃柏炒黃連炒黃耆生生地黃當歸熟地黃水煎服寒戰咬牙同一寒戰咬牙症起脹之時屬裡寒桂附理中須急進莫等陷伏轉手難釋起脹時二便清利不煩不渴而寒戰咬牙者乃氣血虛弱正不勝邪故也以桂附理中湯治之桂附理中湯録方官桂附子人參白朮乾薑咳嗽至此猶聞咳嗽頻毒留於肺氣難勻調方化毒湯為穩加入款桔與天陳釋初熱時多有咳嗽之症至此宜減若仍咳嗽不止則毒留於肺矣以加味化毒湯治之加味化毒湯録方粉葛白芍青皮木香枳殼山楂肉連翹甘草款冬花桔梗花粉陳皮水煎熱服失聲咽痛肺管脹塞音故啞食入咽痛不須憂加味甘桔湯煎水時時口含病即瘳釋痘當起脹肺管之痘亦起脹阻塞氣道故音啞脹塞咽中故食痛此無妨但以加味甘桔湯煎水時時含口中自愈加味甘桔湯録方甘草桔梗元參牛子黃芩山豆根煎水含之不用服
