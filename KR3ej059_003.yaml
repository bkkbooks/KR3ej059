body:
  text: 卷三圖象面部訣一看天庭並太陽二看唇口舌尖方三看梁上梁下穴四看喉吻定陰陽五看諸陽觀氣色六看周圍八卦方仔細推尋依法斷神仙妙道自非常天庭太陽若明朗此痘縱變也無妨二部痘瘡如慘暗孩兒十個九個亡喉吻之中怕痘多再加黑陷死來磨飲食挫喉難下咽七朝端的夢南柯舌尖一穴統心經痘瘡紫黑令人驚再加舌有黑疔見此兒三日見閻君論部位痘瘡初出紅點先察部位可知吉凶蓋人之面部左顴屬肝木也右顴屬肺金也天庭屬心火也地角屬腎水也準頭屬脾土也正額者太陽脈之所會唇頦者陽明脈之所經兩耳後邊少陽脈之所過痘為陽毒故隨陽而先見之於面也但陽明者胃與大腸所經之地故先於口鼻兩傍人中上下腮耳元壽之間先出者吉若太陽者水火交戰之處少陽者水火相併之沖故其位先見者凶其起漿收靨亦皆如是至於頭乃諸陽聚會之處面為五臟精華之府咽乃飲食之道路喉為呼吸之要區胸背為心肺所居之地此五處最宜稀疏切嫌稠密蓋頭顱多者謂之矇頭則視聽廢而陽易絶喉頸多者謂之鎖項則飲食艱而氣易衰胸背多者謂之瞞胸覆背則臟易傷而神易失是皆逆險之症所以難治也他如兩顴兩頤亦要界地清而顆粒明若成一片如塗朱者此肝熱盛而克脾肺留毒而內壅其後必來泄瀉而至喘嗽痰鳴惟有四肢雖多亦不為凶五臟見症治法痘疹之毒發於五臟故五臟皆見症第取其尤者治之庶毒不鬱於其臟其臟乃不傷耳如肝症甚則用藥宜走肝經肺症甚則制方宜平肺腑其餘止兼理之試舉各經而條陳之心屬火火性上炎而為陽故其位居於天庭方廣之區痘出而天庭稠密則心經之毒甚無疑法當清心而解毒麥冬連翹黃連硃砂不可不用且心為藏神之舍譫語狂言搖頭驚搐皆心家之症然虛實不可概論如初發之時多為實熱其唇必紅其舌有苔目多上視口必渴飲此火燥而神昏亂也宜以清解為主然心與小腸相連清心必須利水小便利心火自降故車前木通宜加也若灌膿收靨之際或有狂譫驚悸此時定是心虛治當補血寧心凡歸茸遠棗在所必投天庭為純陽此處不可先收若滿面未靨而方廣先焦則火烈心灰此症斷然莫治印堂若見黑點則胸前舌上定有疔傷又不可不詳也腎屬水水性就下而為陰故其位居於承漿地角之地痘出而唇下光明知其液精充足雖多亦可無虞地角若形焦紫則腎源將竭痘瘡何以成膿再或腰痛則為腎敗無疑雖治亦為難救然不忍袖手旁觀法只滋陰補血方發之初內服解毒養血之劑翹蒡歸芎元枝故仲為佳更以川甲雄黃為引外剖生雞以敷腰痛或亦能療出齊其痘不振用豬尾血與人參加麝香少許痘將有水則純用內托補腎之藥不可少緩但承漿有黑點陰中必有疔此又不可不知也若諸部未靨而地角先收則腎竭源枯其死必矣倘陰囊腫脹則腎毒外泄不至內攻有生理也見此且莫慌張止宜力為托毒收靨之後再解膀胱之熱以加味四苓散加翹蒡則其腫自退矣肝屬木而居左左顴是其位也兩頰紅而左顴尤甚者則肝熱甚可知法當清肝化毒且肝以藏血血不榮活皆由毒郁肝經治宜松肝活血故芍藥丹皮柴胡生地必用再加紅花紫草紫花地丁生甘草等味自明至痘生水泡皆因肝盛剋土至土不能制水故使水不成膿是削肝又為承漿之妙用也且肝來剋土又有瀉青之症故健脾方中加用芍藥則肝斂而泄自安況肝木又生心火木盛而火愈炎故驚風癲癇雖出心經心伐木而心火乃平矧肝統筋膜而司眼目或手足牽引目睛上吊皆是肝經風熱治此又必平肝至於見症設方又在良醫之妙用也肺屬金而居右右顴是其位也兩顴多而右顴更密者則肺金毒盛可知但肺主皮毛毒雖盛而藏亦淺故兩顴報點總無凶機其見症也多在咽疼咳嗽治宜松肌解表理氣寬胸而桔梗陳皮芩連荊防為可用必痘盡出而咳漸減痘起脹而嗽已除則毒不留於肺庶可無虞若治之不早至起脹而嗽愈甚則毒凝於肺勢必不可成漿至於聲啞則肺氣將絶其症亦云莫救若寒戰固屬肺經虛實又宜詳辨六日以前寒戰或熱盛唇紅必是肺經熱甚投以清金解表之藥其症可以立除七日以後寒戰則肺寒當補急施桂附必寒退而肺乃安但肺宜清不宜斂斂則腠理不通毒氣何由宣化故未脹之時五味訶子凡斂肺之藥不可先嘗若漿成之候恐肺虛易中風寒故炙耆諸品須祕腠以固肺關清補因時始不至有誤也脾屬土而居中元壽是其位也此間見點百無一凶但脾乃榮衛之樞氣血賴其滋養脾土堅強則毒不下陷且易成漿脾胃若敗則五臟立虛毒氣須臾伏陷變症必至內攻然痘毒方出之時毒攻胃管雖吐亦非胃弱即咬牙屬胃熱而石膏甘草恐敗胃不敢多服若或泄瀉毒奔騰治以安脾利水兼解毒四苓散得其宜假如祕結脾燥雖酒製大黃微利然亦不可猛攻恐傷肝土之元若灌膿之後純以健脾為主但木能剋土慮肝盛或致損脾故健脾又要平肝更念土雖剋水然水壅而土亦崩又宜疏通水道水泄而脾乃寧故止泄又當利水止有升水之時白朮淮山莫用恐土燥而水不升將靨尤宜土旺補脾自是良方前後治之得法用藥乃不差訛見點辨症賦痘初見點宜觀痘色榮枯一來便覺粗肥稀疏可必見點如還瑣屑稠密堪知帶熱敷瘡陸續出來雖稠密猶可為救一齊湧出縱稀疏未必全生細細白頭如麻子乾枯便作內攻形啾啾紅點如碎粟焦萎定成憔悴勢粗肥達頂似佳苗點子不紅終白陷皮薄頭尖如美種茱萸紋起定空漿肌嫩則皮薄嬌紅黃瘦則痘成褐色人黑皮粗痘色必然慘暗是故嬰兒之肌肉不同不可一例而斷只要綻突有神不喜頰紅乾燥色潤神清見點如珠如粟毛焦皮燥敷瘡或紫或焦雖然帶熱而出亦恐密似針頭維是陸續出來尤忌形如蠶種如麩如㾦如疹如疥根窠不立腳地全無犯此數端皆云莫救點出如同蚊咬惡烈勝似蛇傷一片紅若鋪氈神醫也言不治乍起閃如掣電此症孰是能醫未熱先敷數點俗名報痘若還熱久不敷此症便作疔看先發塊而後敷瘡塊名痘母而必生先敷瘡而後發塊塊名鬼種而難痊避痘避於隱僻眼胞唇內定多凶悶痘悶於要處心胸舌喉皆不吉順不畏多逆嫌一點冷疔先現諸痘安敢張形賊痘若生諸痘豈能灌汁辨症若得真詳急宜剔破與燈燒是以里症未平痘雖出而毒猶在內透肌發散尤加解毒為良便調人靜身雖熱而毒已在表補兼發散仍以安表為先設使內外症平此候不須過治再觀虛實審詳清補何如見點認痘法痘與蚊蚤所傷自異亦與斑丹瘡疥不同蓋蚊蚤所傷雖有紅點其紅必散摸之而不礙手斑丹乃浮游之火亦不礙手瘡疥乃肌肉之毒雖或礙手而皮必枯惟痘毒從骨髓而出又系精血所運故方出之時摸之自然礙手而且潤滑此痘所以異於凡瘡也見點用藥宜慎見點用藥與初發略同但初發之藥在發竅而兼解毒見點之藥宜解毒而佐升提凡補滯辛熱之品此時猶不敢妄投故肉桂附子丁香乾薑炙耆炙草鹿茸鹿血白朮茯苓淮山棗仁遠志熟地藿香砂仁豆蔻訶子五味一切溫滯之藥此際切宜慎之即用黃耆甘草亦用生而不用炙芍藥用赤而不用白地黃用生而不用熟蓋慮其滯毒氣而助毒火以貽禍於其後也見點順症熱至四日於耳目口腮元壽之處先見數點者吉或兩顴報點者亦吉或面部未見而手足先見者尤吉此標縱肝肺脾經來也蓋手足元壽見者是脾經發痘必主稀少百無一凶兩顴來者是肝肺二經發痘雖多少不同究皆可治是以俱為順症報點之痘頭頂圓淨皮又粗老堅硬結實摸之礙手此元氣旺而毒氣少也痘作三四次出到五日後方才出齊頭面頸項胸背俱稀疏者吉蓋頭乃諸陽所聚面為五臟之府兩處若稀則五臟不留毒氣諸陽悉得上升且頸項疏朗則扼要之區不截胸背不密則周身之血皆榮所以云吉縱四肢稠密亦是無妨痘初出即紅活潤澤光明可愛腳有紅暈而不散漫痘與肉色紅白分明者吉痘見點後潮熱漸減雜症漸退飲食漸進吐瀉皆止至五六日後痘齊熱退雜症全無飲食如常精神清爽者吉以上數條固為順症然亦要謹風寒節飲食避厭穢慎起居葷酒不可多與藥餌不可妄投倘或不慎致使輕變重而順變逆不亦深可惜乎一痘出潮熱方退不可驟投辛熱蓋火焰雖息而餘燼猶存一遇燥烈其火復炎煩躁譫狂之症不旋踵而至矣一見點之後毒之輕者其熱即退毒之重者必至五六日上出齊其熱方退其痘若好且無他症雖熱無妨不可妄用寒涼以退熱恐後難於起脹也一痘方出而手足冷者不要驚慌蓋陽氣上達以送毒未及下行手足也必五六日上痘將出齊乃溫耳一痘未出齊其兒不食此胃中有熱故不食也不可認為胃弱而投暖胃之藥滯其毒氣以貽異日之患見點險症痘已見形而煩渴便閉身猶壯熱則毒氣不能盡透且痘出稠密顆粒黏連不分痘色近紫而黯滯不潤澤痘雖稀疏而淡白不紅活猶復飲食少進精神倦怠雖曰可治抑亦險矣見痘逆症初熱一日即出者凶一齊湧出者死痘於天庭方廣印堂承漿先見點稠密慘暗唇紅目赤色白痰鳴者不治痘密如蠶種或如釜中滾沸而無縫者不治痘出不起頂形如燈燒湯泡者不治痘出如蚊咬者不治痘出即白與肉色無異不轉紅潤者不治痘出即紫黑乾枯如干疥瘡者不治痘出即陷頂中有黑點如針眼者不治痘出即含水珠皮薄易破者不治痘出煩躁不寧腰腹痛甚口臭氣粗痘色紫黑者死痘出狂言見鬼好飲冷水點從腰上先出者不治痘出不似痘形滿面血點如噴丹砂者死痘出或青或黑如痣或肌肉有成片青黑者死痘出而舌卷囊縮者死痘出渾身發紫泡刺出黑血者死痘出吐瀉不止蛔從口鼻大便滾滾出者不治痘出即有紫黑之點大如緑豆現於兩腋及腹上者不過三日遍身之痘俱紫黑而死痘出即發無名腫毒此毒氣不能泄之於瘡故發此腫也不治痘出稠密嘴唇崩裂胃爛發癍者不治痘出斜視若有正視則無面如橘皮者不治痘已出後熱一遍復出一遍者凶見點治法應出不出應出不出症有四表用蘇解里導滯元虛益氣保元湯平和解穢是妙劑久吾聶氏曰自有方書以來治痘之家其人不止數百精於此者亦有數十人著書立說流傳天下然皆詳於已出之後略於末出之先深言出速稠密之危不言留中不出之禍不知已出之毒外寇也未出之毒內寇也出速而稠密者外攻也留中而不出者內攻也內寇與外寇勢孰急內攻與外攻禍孰烈故痘已出而死者多在旬日之外痘不出而死者必在六日之內徒知御外寇而不知逐內寇自古以來諸賢之為計疏矣然其失安在惟在痘未出急於解毒而緩於逐毒也不知未出之時毒不可解但當仍汲逐之出外也豫深悟此理而明鑑其失故長顧遠慮為未出以前諸症設法分晰虛實寒熱以施治實熱者宣發其壅滯以逐毒出外虛寒者補助其氣血以逐毒出外至於急用寒熱逐毒內攻等弊則諄諄致戒一以救前人之失一以開後學之迷雖岐黃復起不易吾言矣釋痘出不快其症不同最宜分別有發熱三四日皮下之點不甚紅潤其人聲重鼻塞咳嗽惡寒迷悶不寧膚起雞皮者是為風邪所閉腠理不開故不能出也或從前失於表解身無微汗故有此症以蘇解散主之若皮下之點紅紫其人唇紅舌苔臍下腹痛煩悶咬牙目赤口臭者是毒氣壅盛滯於氣道故不能出也解毒導滯湯主之如更身熱大便閉加熟大黃微利之若皮下之點不甚紅潤唇淡倦臥飲食減少二便清利目閉無魂者此元氣虛弱不能送毒故不出也急用補中益氣或溫中益氣或保元湯以托之或因邪穢所觸隱伏而出不快平塌而頂不起其痘必作癢宜用平和湯解之外燒小紅棗蒼朮或沉香檀香藿香以避其氣仍看痘色暈腳伏則宣之陷則補之蘇解散見卷二寒熱並作門解毒導滯湯方歌解毒導滯升防芎柴甲楂蟬牛子同芩連翹桔麥冬草枳殼前胡陳皮從録方紫草研末麥冬各一錢去心山楂去核牛蒡各八分炒研防風川芎桔梗前胡各七分甲珠連翹枳殼六分陳皮六分升麻五分蟬蛻十二隻去頭足黃連酒炒甘草各三分薑蔥引同煎熱服補中益氣湯方歌補中益氣升柴陳參歸耆朮甘草平無參官桂須加入鹿茸嫩者用之靈録方黃耆白朮土炒當歸各一錢酒洗柴胡七分陳皮六分升麻人參甘草各三分官桂八分鹿茸錢半生薑一片大棗一枚同煎熱服溫中益氣湯方歌溫中益氣用生耆參朮歸身官桂宜白芷防芎楂肉草木香應與白苓陪録方白朮一錢土炒黃耆生山楂去核茯苓各八分香白芷當歸酒洗川芎防風各七分人參五分廣木香甘草各三分炙官桂二分生薑一片大棗一枚去核同煎服平和湯方歌穢氣相沖不可當教君急用平和湯參耆歸芍蘇防芷桂桔沉檀乳藿香録方黃耆一錢生防風白芷各七分當歸酒洗茅桔梗蘇葉各六分白芍五分人參三分官桂沉香檀香乳香藿香各二分生薑一片同煎溫服印堂承漿廣額嘴角鼻孔見點曉星報點非為吉鎖口欄門總不宜更有承漿廣額地點來烙去豈容遲釋諸痘末出獨於印堂先見一顆者名曉星報點此痘能閉諸毒急宜以燈烙之但小兒畏燈必然躲閃須用銅錢一個印於痘上令痘從錢眼暴出然後烙之乃不差誤又承漿廣額先見數點此心腎之苗必凶又恐為瞰報之賊標俱速以燈烙之或用銀針剔破吮去惡血旋用拔疔散敷之亦可此標一除能減無許之痘又嘴角有痘曰鎖口鼻孔邊痘曰欄門喉窩之痘主咽痛心窩之痘主煩悶耳後窩中頸項窩間有痘皆不吉且痘出不拘何處但有獨大異常者非賊痘即痘疔也俱速宜去之拔疔散明雄黃不拘多少研細末又將滾白水泡綿胭脂取濃汁調點疔頭上一齊湧出毒火迅烈一齊出良工至此亦慌忙調元化毒加減用勸君急急莫觀望釋身熱一二日即出痘先發於天庭司空印堂等處或一齊湧出稠密難堪痘又形焦色紫此蓋毒火猛烈而氣血凝滯亦不能收束毒火以致毒火肆行此症實難救一急宜活血解毒宜用調元化毒湯看症加減莫執成方調元化毒湯方歌調元化毒參耆芍紅紫牛蟬荊芥耆歸地前通楂肉翹芩連草桔防風度録方前胡錢半黃耆生生地山楂各一錢去核川當歸八分白芍酒炒牛蒡炒研荊芥木通防風連翹各七分去心桔梗六分紫草研末黃芩各五分人參紅花酒炒黃連酒炒甘草各三分生淨蟬蛻十二隻去頭足生薑一片同煎溫服咳嗽加陳皮花粉腹痛去參耆加炒枳殼大便久祕去參耆加酒蒸大黃微利之若氣血與毒火俱旺歸芍減三之一仍去參耆加小芎清之壯熱痘方見點熱宜減大熱煩悶毒纏綿清解散花仍壯熱解毒湯須日數煎釋痘一見點則毒氣將達皮膚此時熱宜漸退諸症亦當漸平若熱不少減宜用清解丸次服散花丸倘猶大熱蒸蒸悶亂不寧其毒必重其痘必多急以解毒湯治之一日須二三服此際速為解毒痘或可減使怠忽視之則鋪氈蠶種紫黑乾枯之弊至矣若四五日內正宜解毒乃宜清不清遲延數日痘成焦紫而又不敢用涼悔之將何及乎清解丸録方麥冬八錢去心連翹去心牛蒡炒研黃連酒炒枳殼各七錢荊芥防風淮通前胡各五錢紫草茸桔梗蟬蛻川芎升麻元參人中黃黃芩各四錢酒炒共合為細末米糊為丸如龍眼核大青黛為衣量兒大小與症之輕重與服散花丸録方防風楂肉當歸紫花地丁各八錢山慈菰牛蒡各七錢炒研荊芥前胡青皮赤芍各五錢蟬蛻紅花茯神通草各二錢人中黃三錢上方共為細末米糊為丸如龍眼核大青黛為衣怯弱者以生耆煎水為引解毒湯見卷二煩躁門驚搐痘將見點忽驚搐細察外症分所屬毒氣壅盛或風邪元氣虛弱須詳燭驚搐之症多由心經有目睛直視上不能言者有身若反弓手足僵直者有目翻白而雙手擎拳者或牙關緊閉或口出白涎或舌頻出入名蛇舌風或大叫如鴉聲而即死者名烏鴉風或嘴歪頭搐者名黃揭風或十指擎揸者名鸚爪風此皆毒從心經過故有是症必痘出而驚乃定但隨搐而隨醒者吉搐醒而有汗者亦吉蓋邪從汗解痘必出稀搐定而精神清爽面不青藍者吉若面色青藍形神昏暗醒後目閉無魂不思飲食反潮熱大作者是惡候也其痘必稠密而難治矣昔人謂末痘先搐皆為順症豈盡然乎遇此之症為父母者切莫驚慌止可扶持不可把捉恐郁其氣則立斃矣為醫者不可作急驚施治峻用寒涼之藥倘誤用寒涼冰其毒氣不得發越其兒必斃矣可不慎乎釋發熱二三日痘末見點及將見點時忽然驚搐大作不可驚惶失措惟詳審虛實寒熱以用藥有毒氣壅盛於內不能驟發於外而驚搐者必痘影紅紫氣粗身熱面赤唇紫聲音響亮脈沉而數宜用清解散以宣之有為風邪所束痘毒鬱滯而不得出以致驚搐者其形色多同前但聲重鼻塞或流清涕脈浮而數宜用蘇解散以發之有元氣虛弱送毒不出而發驚搐者必痘影淡白唇淡面青氣緩神倦脈沉細遲緩宜溫中益氣湯以托之前症分辨明白用藥合宜一劑之後痘出而驚搐立止不可用驅痰峻攻之藥巴豆芒硝蜈蚣全蠍之屬世人不明驚搐之由不極力托苗而專作急驚治誤人多矣清解散方歌清解荊防升葛通芩連甘桔茸川芎前胡蟬蛻蒡翹共楂肉生薑引有功録方前胡一錢乾葛山楂各八分去核防風荊芥川芎連翹木通牛蒡各七分炒研桔梗六分紫草研末升麻黃芩各五分酒炒蟬蛻十二隻去頭足甘草三分生黃連二分酒炒生薑三片同煎溫服蘇解散方見卷內應出不出門溫中益氣湯方見卷內應出不出門詳定燈火穴法驚搐之症有用藥而搐不止者又或牙關咬緊藥不能進急以燈芯蘸油燃灼按各穴焠之兩手曲池各一穴兩手虎口各一穴兩腳三里各一穴三里在兩腳直下外臁在膝骨之下正臁之外以腳之脛骨而通算之約有一尺長則上三寸之下也言三里者謂此穴去膝蓋最近也按之正臁骨之外去臁不遠陷肉處即穴也兩腳鞋帶各一穴在兩腳直下與腳背交接屈曲之處世人繫鞋帶之所故俗名鞋帶穴按之骨縫中空有穴兩腳大指與次指相近之丫處俗名腳虎口穴男從左手曲池起以燈火焠之隨焠左虎口又右手曲池又隨焠右手虎口又隨焠左腳三里又隨焠左腳鞋帶又隨焠左腳虎口又隨焠右腳三里又隨焠右腳鞋帶又隨焠右腳虎口男從左上焠下女從右上焠下切不可從下焠上左右上下共止十穴每一穴止用燈心焠一下不可多焠凡用燈芯宜用大白燈芯一莖長不過三四寸蘸香油潤之又將各穴掐定用墨筆點真然後燃灼燈心按穴焠之聽燈上有爆聲上吉次第如法焠之抱定睡一個時辰痘苗出現驚搐自止依此治之百發百中若煩躁昏悶不省人事者則不可救矣總之用清解散蘇解散溫中益氣湯三方分門別症可謂詳矣若毒火壅盛於內大便結燥又用敗毒和中散加羌活蘇葉白芷各五分熟大黃一錢二分以下之倘或元氣虛弱又兼大吐大瀉必於溫中益氣湯內倍加參耆朮苓以壯脾元痘出而驚搐自定燈火切不可用蓋火能劫其有餘不能治其不足慎之慎之中風痘出傳風眼直斜牙關緊閉襲風邪此時勿用驅風藥白附姜煎汁當茶釋痘症出時忽然中風眼目直視牙關緊閉者不可用驅風峻藥急宜姜附湯濃煎灌下令出微汗即愈姜附湯録方白附子三錢老生薑二錢濃煎灌下汗出即愈腹痛痘出腹痛有三般痛而發厥蟬末安芍藥防風療煩躁祕結又須化毒丹釋痘出腹痛其症不一有痛而發厥痘出不快者有煩躁叫痛者有大便祕結而痛者發厥者用蟬蛻去翅足為末每服一錢痘出自定煩躁者用芍藥防風湯祕結者用大黃化毒湯芍藥防風湯録方白芍防風陳皮升麻桔梗川芎厚朴枳實牛子大黃化毒湯録方大黃厚朴白芍陳皮煩躁毒火猖狂神不靜故令煩躁異尋常此時用藥無奇巧總宜涼血解毒湯釋痘出煩躁由毒火大盛而神不能清以涼血解毒湯治之涼血解毒湯録方當歸生地紫草丹皮紅花香白芷連翹桔梗黃連甘草燈心引水煎服渴痘出稠密毒方盛那堪臟腑受煎熬檢方難得清涼散惟有涼血解毒高釋痘出稠密毒火方盛而津液內傷故煩渴生焉亦以涼血解毒湯治之嘔吐火邪犯胃氣上騰幾回嘔吐禁不能梔連二陳真妙劑良醫識此已折肱釋痘初出而嘔吐者乃火邪犯胃毒氣上騰故也以梔連二陳湯治之梔連二陳湯見卷二乾嘔門泄瀉痘出時瀉毒因解瀉堪則虞失其常此際豈容輕補澀斟酌惟宜柴苓湯釋痘初出而泄瀉則火熱由瀉而解瀉故非所忌也但瀉甚則使傳化失其常耳然亦不敢遽用補澀之藥以柴苓湯治之柴苓湯録方赤茯苓豬苓澤瀉白朮黃芩半夏柴胡甘草引用生薑燈心水煎服祕結人身二便若江河稍不通流壅遏多四順飲治大便祕八正散調小便多釋人身之有二便猶天地之有江河也江河不可壅塞而二便不可不通若祕結則腸胃壅而毒邪必內滯矣治宜清火解毒而便自行痘初出大便祕者四順清涼飲主之小便祕者八正散主之若至成漿時切勿輕用恐脾胃有損則泄瀉陷伏不旋踵而至矣四順清涼飲録方白芍當歸甘草大黃水煎服八正散録方車前木通滑石扁蓄瞿麥梔子仁大黃甘草引用燈心水煎服癢痘標才見兩三顆爬搔渾身瘙癢多此是火邪留腠理急清風火症應瘥釋痘初出時遍身作癢此火邪留於肌肉皮膚之間不能即出故耳宜瀉心肝火邪其癢自除以清風去火化毒湯升散之清風去火化毒湯録方防風升麻白芍桂枝荊芥粉干牛蒡淡竹葉為引水煎服咽痛痘出咽疼不治咽內托方中倍桔梗痛甚內服鼠黏子吹用一聖散最稔釋痘初出咽痛不專治咽惟於托痘方中倍加桔梗而已若痛甚宜鼠黏子湯外用一聖散吹之鼠黏子湯録方鼠黏子炒研射干桔梗連翹甘草生水煎入竹瀝和服一聖散苦參不拘多少切片焙乾研為細末每用一二分吹之甚效口穢口中腥臭氣沖沖邪毒炎蒸肺患癰瀉火清金須急用遲延七日禍相從釋痘出而口中之氣腥臭沖人此肺中邪火熬煎炎燥故令腥臭出於口也急與清金瀉火湯解之倘淹延不治至七日而死矣清金瀉火湯録方知母生地黃芩石膏桔梗黑梔仁麥冬木通花粉紫菀甘草鮮桑葉七片為引水煎竹瀝兌服舌瘡熱留心竅形於舌治法無奇只清熱犀角清上內治飲搽用赴筵真妙訣釋痘毒留於心經必形於舌舌乃心之苗也故或赤或紫或黑或腫或舒舌弄舌皆熱留於心使然也故以清熱為主以加味犀角治之至於口舌生瘡若不急治必至糜爛腐臭變為惡候宜內服清上飲外以赴筵散搽之加味犀角湯方歌加味犀角湯牛桔甘荊防升麥連梔石犀角鎊可嘗録方牛蒡炒研麥冬各一錢去心防風桔梗各八分荊芥七分梔子炒石膏各六分煅黃連酒炒升麻甘草各三分生水煎服清上飲方歌口舌生瘡名熱毒細察痘苗分所屬清上荷防草麥牛芩連花葛桔翹遂録方麥冬一錢半去心粉葛一錢花粉八分薄荷防風牛蒡炒研黃芩酒炒連翹各七分去心桔梗六分黃連酒炒甘草各三分生生薑一片同煎服赴筵散録方黃柏五錢薄荷二錢共為細末入青黛一分和勻搽之寒戰咬牙肺有實熱因寒戰胃有實熱則咬牙見點治法殊初熱四物湯中酌量加釋痘見點後實熱凝於肺胃而寒戰咬牙不可以初熱時治法治也宜加味四物湯主之加味四物湯録方當歸生地川芎赤芍連翹去心木通麥冬去心石膏煅黃連姜炒水煎服七暈痘有七暈殊名色老紅紅紫乾枯別淡紅淡白氣血虛鋪紅焦紅火毒烈釋痘出而根腳有暈其名有七老紅也紅紫也紅紫乾枯也淡紅也淡白也鋪紅也焦紅也其中有順險逆之分焉苟不辨之於早未有不悔之於後者業是科者其慎之老紅紅紫痘色老紅症順吉深紅帶紫亦堪惜急用和中散為主清毒活血宜繼入釋老紅者暈色紅而老不嬌妖也不閃爍也不乍紅而乍淡也亦不帶紫也此老紅之暈必發熱三日始見點身體平和飲食如常二便皆調精神清爽此順症也紅紫者痘色深紅而帶紫也必發熱二日即見痘苗身必熱蒸煩躁當以敗毒和中散主之看其出齊即用清毒活血湯催其長漿漿足亦歸於順敗毒和中散見二卷初熱門清毒活血湯方歌清毒活血紫參耆牛子當前白芍宜生地芩連翹桔草山楂姜引木通提録方黃耆錢半前胡生地山楂各一錢去核當歸八分紫草茸研末牛蒡炒研淮木通連翹各七分去心桔梗六分人參白芍黃芩各五分酒炒甘草生黃連各二分酒炒生薑一片同煎服煩渴者去參耆加麥冬一錢五分花粉七分紅紫乾枯痘色紅紫並乾枯此為逆症勢堪虞毒火內盛宜急下依然如故費工夫釋紅紫乾枯者初見痘苗暈腳即紅紫乾枯必發熱一日即見點痘必稠密熱必壯盛煩躁昏沉唇焦口渴大便結燥小便短澀黃赤此毒火內盛急宜下之以清毒火仍宜用敗毒和中散加熟大黃以利之毒火必從此少減看其出齊即以清毒活血湯催其長漿若根腳紅活痘漿泛起此尚可救若仍復乾枯不見起長不見泛漿加之諸症如故則必不可救矣焦紅痘初見點頂先焦更加根腳紅紫饒和中散倍芩連紫稍減清毒活血調釋焦紅者初見痘黃頂乃先焦根腳紅紫有芒角不見滋潤圓活此乃毒火內盛急用敗毒和中散倍加芩連紫草茸以托之倘或壯熱少減神氣稍清能食不甚煩躁急以清毒活血湯催其長漿漿足仍可歸順此在人神而明之也鋪紅氣不統血因毒盛散漫皮膚名鋪紅神清能食猶可治調元化毒妙無窮釋鋪紅者初見痘苗通身皮肉盡紅故名曰鋪紅良由毒火內盛氣不能統血散漫於皮膚之間也若神清能食痘稀疏者可治遇此等症用調元化毒湯倍參耆以補其氣藉紫草芩連以清其毒庶氣充血聚可挽逆歸順耳若人事昏沉則不可救矣調元化毒湯見本卷一齊湧出門淡紅痘出何為暈淡紅氣血虛弱故不同和中加減煩熱用催漿內托參歸茸釋淡紅者暈腳四圍淡紅有嬌妖之色以紙捻照之若有紅色若紅色不定將來必變淡白色此乃氣血俱虛見點之時見此暈腳寒涼切不可用或身不退熱微有煩躁宜用敗毒和中散去芩連紫草茸加羌活蘇葉白芷以托其苗俟其出齊以千金內托散催其長漿漿足仍歸於順若先誤用寒涼暈轉淡白急用參歸鹿茸湯以救之緩則成灰陷矣千金內托散方歌千金同托十二味歸芍參耆防芷桂木香甘草及川芎厚朴山楂姜酒是録方黃耆二錢五分蜜炙當歸酒洗山楂各一錢去核川芎防風白芷厚朴各七分炒人參白芍各五分木香官桂甘草各三分炙生薑一片龍眼肉三個同煎入好酒和服隨症加減法同參歸鹿茸湯參歸鹿茸湯方歌參歸鹿茸用三錢蜜炙黃耆貴嫩綿甘草炮來姜一片福元好酒服安然録方黃耆五錢蜜炙人參鹿茸各三錢酒塗炙當歸一錢酒洗甘草五分炙姜一片龍眼肉三個同煎入好酒一杯溫服如困倦手足冷飲食少者加廣木香公丁香官桂砂仁如漿不足而寒戰咬牙者加熟附子如大便溏瀉膿漿難成加白朮白芍茯苓木香丁香肉桂豆蔻訶子淡白痘形淡白虛弱極寒涼一滴不可嘗加味參蘇初托痘千金鹿茸後催漿釋淡白者痘之根腳四圍無一絲紅色止有淡白之點亦不見其有暈也蓋由氣血虛極或出此痘初見此症宜用加味參蘇飲以托之俟其出齊即用千金內托散催其長漿漿或未足即用參歸鹿茸湯灌之今日不足來日再催亦可轉逆為順矣加味參蘇飲見卷二初熱門夾斑丹疹癮赤點紛紛號夾斑如雲突起又名丹碎碎紛紛名夾疹癮癮皮膚更須參釋正痘方出之時有夾斑夾丹夾疹夾癮而出者不可不辨有紅赤小點雜於痘苗空處初無頭粒不見高聳多隨出而隨沒謂之夾斑此皮膚素受寒也用黑參升麻湯治之以黑參為君有遍身紅赤成片如雲頭突起謂之夾丹此皮膚火毒也治當用解毒湯加黑參為君有遍身通紅碎碎紛紛形如麻疹謂之夾疹亦用黑參升麻湯加桔梗黃芩宣托其疹正痘自然依期出透而起發又有紅點隱於皮膚之內而不見者謂之夾癮亦以黑參升麻湯治之四者皆浮游之火散於皮膚用清解丸多加黑參立愈黑參升麻湯録方黑參一錢防風荊芥牛蒡各七分炒研升麻五分甘草三分水煎溫服解毒湯見卷二煩躁門清解丸見卷內熱門夾水痘水痘雖同正痘形易於起水且無膿收結當先痂疤少術家莫藉此為功釋水痘者兒在胞中其母飲食之毒或成胎而再交之火也其毒不藏臟腑所以不致傷生依然潮熱起水形與正痘無異但易於起水而不灌膿易於收結而少痂疤耳或先正痘而出或與正痘並出正痘若好此不必慮術家遇此則謂吾能去惡痘而復出好痘可笑也小痘小痘原與大痘殊形赤故名即相符毒稀自爾尖圓好易齊易靨復何虞釋痘之大者俗謂大痘小痘名赤痘蓋以形而名也赤痘雖不甚起脹而尖圓可愛此乃毒稀之症故易齊易靨不如常期亦無恙也疔痘紫黑堅硬形獨大先出先長即是疔能閉痘毒須急治敷用膏散刺用針釋痘之有疔毒氣凝結而成也痘未出疔先出痘未長疔先長其色紫黑其形堅硬根腳獨大卻無紅暈五臟各有所見心疔色赤起於顴阜胸乳之處肝疔色紫起於左太陽左脅眼胞兩臀阜之處脾疔色先黃後黑起於腮頰中庭口角肚腹手足之處肺疔色先灰後黑起於右太陽右脅頸項喉實之處腎疔色黑起於地閣後頸耳窖背俞腰脊陽莖之處凡疔能閉痘毒未齊有疔則諸毒不能出現既齊有疔則諸痘不能起脹行漿時有疔則諸痘必致倒陷其為禍可勝言哉故初出之時見有紫黑獨大之點恐其成疔即宜以銀針刺破吸盡黑血然後以拔疔散敷其瘡口或用四聖膏貼之或用三豆湯洗之俱可次日再看若再硬脹仍然刺破以前藥敷塗必轉紅活方可歇手若針挑不動手捻有核則成疔矣須用針從四面刳開以小鉗鉗出其形如疔有半寸許長拔去其疔仍以前藥敷滿瘡口乃可無虞又手足四肢有痘慘暗堅硬而甚痛或外無痘而內有核作痛者亦痘疔也宜以艾火灸之即愈或以燈火烙之亦效若不急治則其疔深陷穿筋透髓而爛見骨甚可畏也又天庭有黑點心窩舌上必有疔地閣有黑點陰囊必有疔兩顴有黑點兩腋必有疔準頭有黑點四肢必有疔此觀顯可知其隱又不可不詳也凡用針挑痘疔時以二指拿針平平入痘撥斷疔中筋絡衆痘即發但挑時輕重徐疾之間貴乎得宜不可挑破頂亦不可重入傷肌治者宜詳識之拔疔散見卷內印堂見點門四聖膏録方緑豆豌豆各四十九粒俱燒灰存性珍珠煅頭髮各一分燒灰共為細末以綿胭脂水調和成膏將銀針撥開瘡頭然後塗之三豆湯録方黑豆緑豆赤小豆各一合研爛為末用醋研濃漿時時以鵝翎掃之賊痘賊痘顆粒大甚速形雖起脹按之虛閉毒與疔相上下火攻針刺治無殊釋賊痘者較之衆痘彼之顆粒獨大初出便如緑豆過一日大如黃豆再過一日大如龍眼其大又甚速也此痘根窠與頂全無血色形雖起脹而按之虛軟或微含水漿而中有黑色後必帶纍衆痘不得依期長漿名之為賊是此故耳疔痘外形固大根腳微腫賊痘外形雖大根腳不腫以此分別又有一種於將熱之時或初熱一二日間即於天庭太陽見標數點大如赤豆光亮好看過一二日即收沒者猶之賊欲攻城陷地先命一二細作探其虛實故名賊標此標既沒隨即大熱攻作遍身之痘必如鋪氈蠶種不可救療甚可畏也凡見此症急用銀針刺破去其惡血以拔疔散敷其口或以燈芯蘸清油當賊痘頂上焠之其毒即化然一二顆可依此焠之倘賊痘出多燈火恐其難受可用拔疔散搽之若焠之不退搽之不效諸痘必難成漿則不可救矣出而覆沒痘出何覆沒氣血原兩虧千金內托散調服豈容遲釋痘出而熱不退痘頂不起根窠不紅若隱若見出而覆沒者此氣血兩虧不能盡發其毒也若不急治則毒陷內攻須臾告變矣宜速用千金內托散以托毒外出而後乃能起脹千金內托散見卷內七暈門痘如肉色痘色如肉色血虛氣亦虛保元與歸鹿活血自有餘釋痘出雖稀而根窠絶無紅暈與肉色無異者此血虛而氣亦不甚振也以加味保元湯與歸鹿活血湯治之加味保元湯録方人參黃耆當歸川芎紅花紫草茸肉桂防風歸鹿活血湯録方當歸鹿茸人參黃耆川芎白芍藥手足厥冷痘出腳厥冷痘白是陰寒異攻散可服先用回生丹釋痘出身涼手足厥冷其痘色更見灰白且泄瀉不食乃寒厥也速用起死回生丹與異攻散救之起死回生丹録方丁香十粒乾薑一錢水煎熱服被蓋片時令脾胃溫暖痘自紅活矣異功散録方人參白朮當歸茯苓陳皮川厚朴半夏木香丁香肉豆蔻肉桂甘草訶子肉生薑大棗引痘瘡入眼痘瘡未入目黃柏膏保安已入胭脂水調點清肝丸釋痘瘡之毒第一防眼所以古人用護眼之法先以黃柏膏塗之若已入目用清肝丸磨水蒸出藥性以胭脂米研爛入藥水中頻頻點入毒散痘收自不傷目或獨用胭脂水點入亦可黃柏膏録方黃柏一兩甘草二兩共為細末用新緑豆五合新汲水三碗浸豆一晝夜去豆入紅花一兩煮之其水約減二盞去紅花入二藥末慢火熬成膏每用敷眼胞上下厚塗之則痘瘡不入眼矣清肝丸録方白芍膽草各一兩防風荊芥薄荷各五錢菊花蒺藜連翹黃芩辰砂各四錢合末作丸辰砂為衣上方清肝退熱除眼中翳膜凡眼中有痘紅腫不開者用飯後服再將此丸磨研淨水濃煎以渣敷眼胞又用胭脂抖汁入藥水時時點入眼則痘毒不能傷眼矣逆症痘瘡磊落不須防叢聚相黏定見傷蠶殼蛇皮生不久蚤斑蚊跡禍難量釋痘瘡初出須看相去遠近若相去三五寸一粒者輕症也一二寸者頗密如二三成叢者必密而重如蠶之殼蛇之皮者此氣至而血不隨也當行氣補血宜祛風勻氣散如蚤之斑蚊之跡者此血至而氣不隨也當涼血補氣宜參耆和氣飲祛風勻氣飲録方人參川芎當歸赤芍麥冬北防風青皮荊芥木香薄荷甘草水煎半飢服參耆和氣飲録方人參黃耆連翹牛蒡黃芩粉乾葛蟬蛻當歸木通桔梗甘草水煎服出形末定先含水起發之時便戴漿膿水末成收靨急休誇妙術有青囊釋痘初出一點血血化為水水化為膿膿成而毒解此自然之序若初出之時即含水珠或將起發便戴白漿或膿水末成忽然收靨此毒火大盛失其自然之序不應至而至謂之太過不久倒陷入里而死無可治矣蓋不應至而至所謂早發還先萎也比之應至不至者因其氣血不充尚有補救所謂人奪天功此則不相侔矣逆症一十三條久吾聶氏曰黃西邱著順險逆三圖順症不須用藥險症有藥可治若逆症雖勉強用藥斷不得活曾立逆症圖三十條豫每看痘症逐年經見實有一十三圖果系不可治之症無再生之望雖細心極力變方設法亦不能出西邱範圍之外因以揭逆症一十三條分例於後以廣後學之見聞矇頭此毒參陽位也矇頭者面部身上及手足俱稀疏獨頭上以至髮際形如蠶種此逆症也若稠密有界又當別論蓋面蓋面者他處俱稀疏獨面上形如蠶種無絲毫空處此逆症也若稠密有地界又當別論托腮托腮者他處俱稀疏獨兩腮頰及地角相連一片形如蠶種此逆症也若稠密有地界又當別論鎖項鎖項者他處俱稀疏獨項間形如蠶種無絲毫空處此逆症也若稠密有地界又當別論雲錦鋪胸鋪胸者他處俱稀疏獨胸前一處上連咽喉之下下及兩乳之間形如蠶種此逆症也若稠密有地界又當別論雲錦鋪肩鋪肩者他處俱稀疏獨兩肩及後頸窩形如蠶種此逆證也若稠密有地界又當別論前後補服前後補服者他處俱稀疏獨心窩之下肛臍之上脊背風翅骨之下脊後腰之上前後如職官穿補服樣或方或圓一片形如蠶種此逆症也若稠密有地界又當別論斷橋斷橋者他處俱稠密不分地界獨腰間絶無一點猶橋之有梁而中斷也故名斷橋此逆症也若上下別處所出之痘有地界猶可望生又當別論蝦蟆瘟蝦蟆瘟者遍身上下痘出稠密不分地界惟胸腹之間不見痘粒有似於蝦蟆形故名蝦蟆瘟此逆症也若稀疏又當別論無根無根者通身上下痘俱稠密不分地界獨兩手心兩足心無痘蓋以手足為諸陽之本陽絶則兩手心兩足心皆不出痘此逆症也若通身出痘稀疏又當別論玉帶橫腰玉帶橫腰者他處俱稀疏獨前後腰間闊不過二寸周圍密如蠶種如帶束腰間一樣此逆症也倘若稀疏又當別論枯樹掛蛇枯樹掛蛇之症有單掛有雙掛有掛在手肱者有掛在腿股者他處俱稀疏獨掛處如蛇形而纏繞之密如蠶種此逆症出倘稀疏有地界又當別論形如瓜瓠形如瓜瓠者痘初見標尚未出齊以及將出齊之際痘未見起發而面部腮頰以及兩目俱皆腫脹形如瓜瓠此逆症也煩躁昏迷不省人事者決不可救異痘類痘有吉凶症有生死不能識其吉凶焉敢決其生死乎況有似吉而凶似凶而吉者尤不可以不詳辨也天根痘天根者諸痘不起惟天庭太陽起灌也天庭乃諸陽之首此處若起則陽氣必旺將漸次而起十有九生陽氣為痘根本天庭起者其根本故也故名天根而必生天空痘天空者諸痘雖起而天庭曉星不起也此必其陽氣已虧不能直灌於陽會之處即諸部起者必漸剝落而成空瘡故天庭不起十有九凶明朗痘明朗者諸痘不起而太陰太陽獨起也太陰太陽乃日月光華之地二處灌漿則血氣俱盛故直達於日月高懸之所諸痘自將漸次而起故曰明朗而生明蝕痘明蝕者諸痘雖起惟太陰太陽不起也日月當明而不明猶如天狗之蝕矣此處不明則氣血兩虧故不能充灌乎陰陽聚精之位其後諸痘安能運化而無虞乎故以死論也海溢痘海溢者諸痘不起而耳後方圓一寸獨起也蓋此處屬腎名星宿海此處升灌故名海溢海而充溢則腎經壯旺精髓已足而血不虧故可治海枯痘海枯者諸痘雖起惟耳後方圓一寸不起也此處不起其腎已敗若不調元補腎後變唇裂齒崩之症則難療矣有根痘有根者地角方圓其痘起脹明潤如珠腎水足也十有十生腎為人之根本故曰有根無根痘無根者諸痘雖好而地角之痘乾枯不灌及灰陷白陷者腎水絶也治之何益抱鼻痘抱鼻者面部俱稀而鼻梁左右密如蠶種者名為抱鼻此毒聚於脾肺也其症甚險鎖口痘鎖口者一口角有痘一粒較諸痘獨大名單鎖口兩口角各有一粒名雙鎖口又口之上下四旁連串環繞者亦名鎖口此毒擁於脾也見此急以銀針挑破令出惡血以拔疔散敷之或可救豬頸痘痘出而喉窩及頸窩甚多者名豬頸急用藥以散其毒緩則喉痛咽爛不進飲食必難治也録方山豆根元參桔梗生地川芎歸尾牛蒡木通甘草兩頭痘自逆症中斷橋也自胸以上自臍以下俱有痘而中間一截全無者名兩頭痘此氣血不能貫通於上下而腰臍之間恐為寒毒凝滯也若不急治必變灰白之痘不可救矣録方生黃耆當歸赤芍桔梗防風厚朴續斷白芷山楂木通黃豆三十粒逆痘上身絶少下身絶多或從下身先出而升漿收結俱從下身先起此雖出於常數之外其實無妨鬼捏痘通身無一點粒各處一片紅青形若打傷之狀擬為鬼所傷也故名鬼捏遇此等症何用施治鬼痘手足胸背俱多而頭面全無者其痘如鬼不敢現於陽道也故名鬼痘又曰無頭痘此氣血不能上升故頭面絶無點粒急於五日之內提氣上行令頭面略見痘點乃可録方升麻川芎白芷防風羌活前胡黃耆生當歸桔梗甘草生薑引蛇皮痘痘出稠密成片遍身俱無空地狀若蛇皮故以是名此乃毒火所致宜急用解毒庶或可救張氏遜玉曰昔余孫女出痘如此發熱之時寒戰咬牙口氣臭甚常如食物余曰此惡候也急與解毒用解毒湯日進三四服及痘出密如蠶種顆粒不明乃用前胡川芎丹皮生地紫草茸人中黃連翹牛蒡紅花黃芩連進數服乃分顆粒其後去人中黃紫草紅花黃芩等藥加生耆白芷其水漸升乃用參歸鹿茸湯加丁香官桂白芷白芍次加白朮其漿乃足漿起之候竟似蛇皮落痂之際成片連皮而去遍身如蛇退殼手足指甲無一未落毛髮悉皆脫換其症果蛇皮也善以治之亦竟安全可見不治之症亦勿棄而不治也但症遇惡烈藥必猛攻而遷延觀望豈能救乎藥患痘初標紅潤至八九日忽變陷伏此必其人氣血虛弱而毒又盛庸人見其初標明潤而玩忽不治當藥不藥致有此變或庸醫審症未明誤投藥餌致有此變以為患也故名藥患誠觀此條當顧名而思義慎勿潦草而治也九焦痘天庭地角左顴右顴耳後胸背手足九處皆有一二點黑陷焦枯者名九焦也此臟腑皆滯留內毒將漸遍身焦黑而死誠不可治之症也伏陰痘痘不灌漿而瀉膿血此毒氣陰伏於內而不升出於外故名伏陰亦不治症也但痘方不振之際七八日上急用溫中內托猶可救療石臼痘石臼者痘四邊起而中落窩雖明亮好看內並無漿以手摸之其硬若石形如石臼故名石臼此毒凝於表血涸於中不能運化其痘必壞不可治也茱萸痘茱萸者痘不甚起脹有亂紋於頂上形若茱萸故名茱萸痘此毒盛而中氣又虛故痘頂有紋而不尖圓其後必空漿倒陷而斃也張氏遜玉曰一兒出痘如此諸醫皆云難治請余往視見痘中間多有黑眼余曰此毒凝而氣不能升其毒將入臟腑急為解毒行氣猶為可救蓋此時止六日也乃用川芎升麻生耆赤芍牛子連翹黃芩黃連蟬蛻白芷甘草外以楊柳水洗之連服數劑其痘漸圓淨紋與黑眼俱無後以補氣為君補血為臣治之竟愈余治此痘甚多其先必須解毒行氣茱萸紋乃可除也白漿痘白漿者初起發時瘡頭即有白漿其後必成灰白癢塌而死蓋漿必由腳而起乃為順症此毒參陽分而陰血不能運化故不久而即陷伏也但初起之際間有數點即刺去其漿旋有此者又刺之時時瞻顧不可怠玩內服千金內托散大補氣血乃可無虞若遍身如此則難治矣四圍痘四圍者其痘出後四圍旋出小痘叢簇本痘故名四圍後必串成一粒而為水泡矣此症僅見於手足者則無妨若遍身如此即不可治琉璃痘琉璃者痘雖光亮全無血色明若琉璃略擦即破內俱清水而無膿漿此氣血不能運化毒氣而然也痘初起見有此痘急取其尤者刺去其水再用實漿散治之實漿散録方人參黃耆當歸鹿茸白朮淮山藥山楂扁豆白芷炙草黃豆四十九粒草尾珠草尾珠者謂遍身之痘俱陷惟尻骨一圍飽滿潤澤其明如珠猶之草尾露珠也故以是名蓋尻為腎部此必腎強精髓充足急用內托之劑則遍身之痘旋覆起矣黑痘痘毒隨血而出毒盛血熱之甚故其痘乃黑也此必死之症古方雖有數條總以涼血解毒為主姑載於後以備參用初見黑點在皮膚之間者用硃砂冰片牛黃或用豬尾血調人牙散好酒同服初見點便黑者用紫草茸三錢好酒調服又皮膚髮青紫紋者用紫草紅花荊芥防風牛子生耆升麻木香甘草又黑痕並黑靨者用蟬蛻五個紫草茸一錢又黑如煤炭血不紅活者用紫草紅花生地牛子赤芍又黑而軟者氣弱而血熱也用保元湯加紅花紫草生地又焦黑潮熱煩躁者用小無比散加紫草生地紅花磨犀角調服人牙散人牙自落者火煅存性入韭菜汁淬之加乳香一分穿山甲二分用雞冠血蔥白煎酒調服保元湯録方人參黃耆制甘草炙引加生薑水煎服小無比散録方滑石六兩石膏一兩煅寒水石煅鬱金甘草水煎透煅干甘草各五錢共為細末量兒與服熱甚者加犀角磨水調服痘復出復出痘者初出之痘甚稀已經起漿收靨究竟皮膚之內有痘未出靨後毒發常致莫救此皆元氣虛弱不能送毒故也凡痘出稀者須用捻子照之若皮下隱隱有點是痘未盡出宜急用千金散托出其痘方可無虞千金散録方黃耆蜜炙當歸酒洗鹿茸酒炙各一兩白芍炒川芎各四錢官桂炙甘草山楂去核木香白芷厚朴丁香各三錢防風桔梗穿山甲各二錢上方共為細末將荔枝四兩連肉及殼慢火熬煎水以入米糊為丸如龍眼大本方有人參一兩臨時加用云翼子二十八股怪痘丹云繞頂遍身痘俱好惟頭頂一片通紅此虛火上炎故也宜滋陰降火通利小便則火瀉下行矣紫雲貫頂遍身痘好但頭頂一片焦紫陷伏此毒凝陽分陽氣莫升不久而皆伏矣故不治烏紗覆頂頭上一片其痘皆黑連皮膚俱有黑氣此元陽將脫陽血已死不治黎花漫頭頭上一片俱白陷此元陽虛弱故也急用保元湯加肉桂附子鹿茸川芎猶或可救保元湯見本卷異痘門霞掩天庭遍身之痘磊落光明惟天庭一片俱是血泡連皮俱紅此心經蘊蓄客熱故有是症也急宜清心解熱以犀角黃連麥冬連翹加豬心血與服紫萍鋪額額上之痘形若紫萍此心經熱毒之甚其人悶亂不寧若諸部痘好宜用小無比散加元參升麻犀角與之服或可以救小無比散見本卷異痘門烏紗蓋額天庭額顱俱是黑痘而兼黑氣不治灰撲印堂印堂之痘有灰色此心經血虛所致宜用千金散加豬心血與服紅砂拂面滿面雖分顆粒但點子紅若硃砂人皆以為好痘孰知此由血之太盛若不急治其紅將變紫矣速宜涼血乃能起脹成漿楊花拂面滿面之痘俱白而不振此氣血兩虧也宜用千金散多用鹿茸加附子治之赤朱繞唇唇若塗朱而或硬裂此脾經熱盛故也治法宜清脾胃之毒烏飯沾唇唇皆黑痘而或唇黑不治霞錦穿胸心胸一片痘無顆粒界地不明紅紫滿胸如霞如錦此心經毒火散漫而不能收拾也不治黑棋排胸胸前盡是黑痘死於三日之內楊花飛胸胸前盡是白點全無紅暈腳地此心經血虧所致失治則轉灰陷急用參歸鹿茸湯見本卷淡紅門加豬心血治之楊花映背背上痘稠密而淡紅但其紅散漫界地不分此是心經火毒未清也宜用元枝白芍川芎丹皮紅花連翹麥冬生黃耆甘草失治則不能成漿矣紫萍浮背背上之痘形若浮萍而色俱紫此毒盛滯於血分而腎氣又不能送毒也須用調元化毒湯去防風荊芥加豬尾血如效可救調元化毒湯見本卷一齊湧出門黑砂滿背背上盡是黑點不治云鋪魚背滿背青黑如雲痘似魚鱗之布此氣血已枯而毒凝不化決無生理赤鱗穿腹腹上痘密如鱗而色紅也此脾胃中多火毒宜清胃退火用人參白虎湯加丹皮生地治之人參白虎湯録方石膏四錢知母一錢五分甘草三分人參五分糯米一撮黑緞纏腰腹上連皮及痘俱黑必腰脹音啞而死白梨落地痂薄而白遍體痂痕盡無血色此氣血兩敗也急用十全大補湯以救之外加鹿茸十全大補湯方歌十全大補湯最靈人參黃耆白茯苓當歸白朮肉桂草白芍熟地及川芎録方熟地黃耆各一錢炙茯苓當歸白朮各八分炙官桂白芍各七分酒炒川芎六分甘草三分炙人參五分煨姜引水煎服葡萄落地痘前痘後忽然片片青紫若葡萄者兩日必死爛粟居臀遍身痘俱好惟臀及髓尾如粟之崇臭爛難聞者此下元虛也宜十全大補湯扶之榴花遍點面痘俱好惟四肢紅紫而唇口如朱或硬裂者乃脾肺二經熱甚也宜用赤芍生地紫草牛子石膏桂枝甘草與服可解黑珠遍體遍身之痘盡皆枯黑四肢形如柴炭命在旦夕不可用藥致人譏誚楊花發枝諸痘俱好惟手足灰白蓋手足屬脾胃是榮衛之元氣虛也宜用人參鹿茸白朮黃耆丁香附子當歸肉桂桂枝甘草煨姜引
