body:
  text: 卷七痘後辨症賦痘結痂瘡雖生意已成其八九餘毒未消而變症正慮其多端是以眼合腹脹猶為危候虛浮不退尚是凶機痂既成而反致失聲前瘡恐為黑靨腫未消而眼已先開眼開疑是內攻陽氣極而狂叫喘呼腸胃傷而悽悽不寧至於冷風入胃則利下膿黏熱滲膀胱則小便溺血熱毒逗留不化痂結而壯熱憎寒經絡各遺餘毒日晡而潮熱往來發在午前為實熱煩渴腮紅申時方作是陰虛便調人靜他如撮唇弄舌心經熱盛何疑扶肚挺胸肺胃毒沖有準身熱燎人而便秘恐來暴急驚風日常潮熱兼泄瀉久變慢脾風症驗喪目於眼合羞明辨口疳於唇焦齒黑實熱下注大腸必有秘結之禍虛寒容留臟腑乃成泄瀉之疴喘渴須分虛實驗症切勿差訛欲觀痂落之餘再審瘢痕之色桃紅潤澤榮衛俱安紫黑乾枯尚留餘熱粉白為氣血之虛周過也應深逝走馬壯牙疳之烈月餘亦見長驅遍體赤斑乃是失於解利渾身青紫一定傷於風寒餘毒未消不特為疽為癤見風太早恐其復發瘡痍此是先賢之秘訣故向後學以宣傳痘後調治總論痘至十五六日靨齊其功已就至是雖可無虞第恐漿清痂薄致留餘毒為殃餘毒若在肌膚是必為疽為癤疽癤既形則毒不內攻此兒知其不喪雖綿延亦可全生若熱蘊肝經則目紅頭痛而眼合羞明肺留餘熱則咳逆痰涎而瘡痍外著實熱下注大腸則大便或來膿血裡急後重致生痼痢之疴餘熱若滲膀胱自必陰囊腫脹以致小便赤痛若夫口瘡腐爛齒血牙疳狐惑瘡生皆是胃經有毒至若驚搐狂言昏沉朦朧弄舌撮唇悉是心家之熱經絡若留餘毒尤恐變生莫測總隨症以調治有熱則退其熱有風則去其風勿謂痘家之症遂膠固而不通但用藥不宜太猛恐元衰難任寒涼固必慎其藥餌亦宜謹其起居洗浴太早恐生浮腫冒犯風寒致生潮熱誤服食物致腹脹痛痘痕損破乃病瘡痍是以落痂之餘最要避風寒節飲食莫速梳頭莫早洗浴不可出外行動不可忍飢過食熱物慎勿多食生冷切須禁忌必等氣回血復精神如故臟腑安寧然後可以無虞痘後逆症痘後發搐連綿不已者心氣已絕神無所依也不治面色青白神氣昏暗目無神光瞳子不明心腹疼痛者不治寒戰咬牙手搖足掉噤口不開者不治目閉腹脹足冷過膝者不治牙齦腐黑臭不可聞者不治抓破穿肌遍身肉爛者不治口鼻出蛔滾滾而上者胃絕也不治潮熱不退肌膚盡落其瘦如柴者不治痘後治法潮熱痘後潮熱有數端氣血回元不必藥虛熱宜用補中湯餘毒連翹飲加削釋痘後發熱症有數端有氣血回元而熱者則悠悠潮熱不煩不渴不一二日氣還血復熱自退矣不必服藥有氣血兩虛而熱者其熱稍緩頭熱面不甚熱手足心熱手足背不熱精神倦怠大小便利者乃虛熱也其熱多在午後故曰發在午前為實熱申時方作是陰虛宜用補中益氣湯與十全大補湯治之有餘毒攻作而熱者胸腹手足頭面俱熱心煩口渴大便秘小便赤乃毒盛也急用大連翹飲治之遲則必生痘毒矣然此湯不可過用須看強弱加減可也補中益氣湯見卷三應出不出門十全大補湯見卷三怪痘門大連翹飲見卷六毒盛門痘爛復灌痘後發癢由血熱甚則潰爛復灌漿芩柏牛地銀紅草煎油搽之是妙方釋痘後發癢甚而潰爛復至灌漿皆血熱之症然毒氣外泄故用方搽之即愈錄方黃芩黃柏牛蒡紫草銀花紅花生地甘草共煎油搽之即愈或用黃豆燒灰調油搽之亦可痘後諸瘡痘後諸瘡名各殊總由風寒與毒余治宜驅風兼解毒火灸水洗及調敷釋痘後遍身肢節上生瘡者名為疳蝕此由風寒相搏而氣血凝滯於腠理也以綿繭散敷之自愈有見風太早致成瘢癬而出膿汁者燒乾牛糞敷之有皮膚之下隱隱而起者俗呼疙瘡宜服解毒藥外用漆蜆剖開取其腹內之水洗之或用蜆殼煎水亦可蜆生魚池泥中形如螃殼凡割漆者必用此殼俗呼漆蜆又有用活石甘草為末調敷名天水散有痘痂落後抓破出血成血風瘡每至春夏即發秋冬自愈俗名痘風瘡外用黃丹黃柏黃芩大黃輕粉為末豬油調敷內服苦參丸再於風池曲池三里諸穴以火灸之則永不發矣綿繭散見卷六瘡破流膿門苦參丸錄方苦參元參梔仁炒防風枳殼獨活黃連黃芩大黃菊花共為細末蜜調作丸如梧桐子大每服五十丸酒送下嘔吐痘後瘦削頻嘔吐胃氣虛寒又何疑急用香砂六君子升消平胃卻不宜釋痘後忽然嘔吐不思飲食若形氣瘦削此虛寒也急宜用香砂六君子湯加煨姜以溫之若用升消平胃其症必死又有痘出稠密漿不甚滿遲延日久飲食多減痰液必盛用養胃開痰湯加減服之香砂六君子湯方歌四君子湯中和義參朮茯苓甘草比益以夏陳名六君祛痰補氣陽虛餌除卻半夏名異功或加香砂胃寒使錄方人參白朮茯苓甘草半夏陳皮木香砂仁養胃開痰湯方歌養胃開痰參朮草茯苓山藥山楂寶蓮肉陳皮半桔奇渴服麥冬五味早若還吐逆藿香砂黃土鼻間須論討錄方人參白朮炒茯苓山藥山楂去核蓮肉麥冬各一錢去心陳皮八分去白藿香砂仁各七分炒半夏姜炒桔梗各五分五味九粒去骨生薑一片同煎溫服牙疳痘後牙疳毒熱攻口臭齦腫多痛疼內服清毒涼血飲外敷救苦蠶蛻靈釋痘後生牙疳者乃餘毒未解上攻牙齒而然也初起口臭齦腫牙縫出血時多疼痛甚則色黑腐爛牙齒脫落穿腮破頰蝕透鼻唇多致不救初起須急急調治內服清毒涼血飲外敷救苦散及蠶蛻散即愈清毒涼血飲方歌清毒涼血治牙疳知母石膏生地連歸芍大黃山梔子丹皮荊芥連翹煎錄方石膏生地大黃各一錢當歸山梔子荊芥連翹各八分知母丹皮各七分赤芍六分黃連三分水煎服救苦散錄方人中白焙乾青黛冰片殭蠶寒水石共為末洗淨惡血以此敷之蠶蛻散錄方枯礬三錢人中白五倍子蛇床子各三錢蠶蛻一錢共為末洗淨惡血以此敷之附噙方石膏牛子連翹黃芩生地紫草蛇床子甘草煎水噙之唇口生瘡痘後狐惑症最惡治法須用除䘌丸鵝口瘡又分赤白服洗方同敷異丹釋上唇有瘡蟲食其臟其名曰狐下唇有瘡蟲食其肛其名曰惑皆由裡熱生蟲內食臟腑以及於肛而外於唇之上下乃有瘡形也必其人昏昏好睡不思飲食其聲嗄啞而音不亮即狐惑也此最惡之候宜用除䘌丸治之又有口舌生瘡赤者名赤口瘡白者名白口瘡又通名鵝口瘡內服俱用洗心散外皆以鵝涎洗之即鵝糞煎水洗之亦可又有用地脾蟲蘸米泔水洗之者惟敷藥赤者用陰陽散白者用朱礬散除䘌丸錄方使君子肉三錢黃連三錢蕪荑錢五分蘆薈錢三分川楝子肉一錢蟬蛻燒灰三分共為末用烏梅洗淨去核搗爛和末為丸米飲下洗心散錄方黃連當歸尾生地大黃木通薄荷連翹牛蒡子甘草燈心為引水煎熱服陰陽散錄方黃連一錢乾薑一錢炒黑共為末茶洗瘡口敷之朱礬散錄方硃砂二錢枯礬一錢共為末茶洗瘡口敷之赤火流丹惡症無如痘後丹皮膚蘊火毒相干看他所發歸何部心腎之經治亦難釋赤火流丹惡候也流移紅腫其痛手不可近此因蓄火大甚不能發泄鬱於肌肉之間故發而為丹從頭上起過心即死從足下起過腎即死內服元參化毒湯解之外用瓷鋒砭法元參化毒湯錄方元參當歸尾生地紅花連翹石膏赤芍地骨皮防風木通荊芥淡竹葉十片為引水煎服瓷鋒砭法用上清瓷器輕輕敲破取其鋒銳者一枚將筋頭劈破橫夾瓷針露鋒於外將線紮緊以磁鋒正對丹毒之處另以筋一條於磁鋒筋上輕輕敲之其血自出多刺更妙毒火出盡立時見功治丹若不砭去惡血專用搽敷十不救一咳嗽痘後還愁咳嗽多總由毒火肺中磨清金降火兼調氣肩息胸高若命何釋痘疹之後惟肺受傷至於收靨毒解宜乎寧矣若反咳嗽喘急乃毒火流入肺中也當清金降火宜寧肺湯倘服藥而嗽不止胸高肩息者不治又有元氣虛弱風邪入肺而咳嗽者必乍寒乍熱宜用補中益氣湯加桔梗陳皮半夏白附杏仁治之寧肺湯錄方知母牛蒡沙參生地麥冬地骨皮石膏炒阿膠生前胡白芍甘草炙新桑葉七片枇杷葉一片引水煎入竹瀝兌服手足厥冷收後渾身手足寒好將氣血作虛看六經脈細如將脫急服生脈散自安釋痘靨之後手足厥冷六脈沉細元氣大虛急用調元生脈散以溫之稍用寒涼必取敗亡也調元生脈散錄方人參黃耆蜜炙白朮土炒當歸酒洗五味麥冬去心官桂虛冷甚者加熟附片生薑大棗為引水煎服手足拘攣身已康寧手足攣分明血少致斯愆當歸桂枝湯誠妙看症加藥無弗痊釋痘後手足拘攣不能屈伸轉運乃血少不能養筋又或外被風寒水濕所致耳切不可用發散並驅風之藥以耗其血只宜當歸桂枝湯補脾養血則手足自和當歸桂枝湯錄方人參當歸川芎白芍黃耆漂蒼朮黃柏甘草氣虛肢冷加附片血氣大虛者加鹿茸虎脛淮牛膝感冒風寒以致筋骨疼痛加羌活防風驚搐收靨之餘驚搐生責其毒火未全清清心散火風邪退發作無休命必傾釋痘後發搐乃毒化未盡火毒攻心所致也此時血氣已衰正不勝邪故曰痘後發搐是凶機然搐而易退者尚可以治若連綿不已則必死矣宜用清神散火湯或紅粉丸治之清神散火湯錄方木通元參麥冬黃連當歸人參茯神甘草燈心為引加辰砂末調服大便秘者加酒大黃弱者倍人參紅粉丸錄方膽星天竺黃辰砂胭脂米共為末生薑薄荷湯下昏迷錯語睡思沉沉不識人恍疑中酒妄言頻只因熱伏心包絡導赤解毒湯入神釋收靨而好睡乃毒解神虛此常事不必施治若連日不醒口中喃喃自言自語形如醉人每多錯語者此邪熱乘於心胞也宜以導赤解毒湯或安神丸主之導赤解毒湯錄方木通車前生地麥冬茯神黑柏仁人參菖蒲甘草燈心為引水煎服安神丸錄方牛黃黃連當歸黑梔仁共為末入豬心血和勻為丸如綠豆大硃砂為衣每服五七丸燈心湯下若無真牛黃則加貝母膽星琥珀飲食倍進痘後臟虛貴能食飲食倍進亦失常此是內熱易消爍治以四順飲為良釋痘後固貴能食若面赤喘急二便秘澀而飲食倍進此內熱易於消爍也若不急治必生他症宜以四順飲主之四順飲錄方當歸大黃白芍甘草不食收後緣何食不思胃寒熱滯少人知見食嘔逆因傷食辨症制方貴得宜釋痘後臟腑空虛最要能食方可滋養百骸以復元氣然有脾胃虛寒而不欲食者必唇舌俱白而身復涼精神困倦懶向人言須用人參黃耆當歸白朮川芎茯苓丁香肉桂砂仁乾薑山楂麥芽有脾胃滯留餘熱而不欲食者必舌心有苔腹脹微熱仍用前消導解毒之方為主有一向能食忽然聞食則嘔而不欲食者必為傷食所致若不施治必成疳勞須用平胃散加三稜莪朮枳實良薑及保和丸治之保和丸錄方人參白朮茯苓甘草山楂麥芽神麯共為末米糊丸米飲下浮腫忽爾渾身腫脹形或風或水或食停腫因肺熱宜清表脹屬脾家利解寧釋痘後膿血去盡脾土已虧氣血俱衰邪易入而食易傷故或感風濕或傷飲食或滯餘毒皆發為浮腫然感冒風寒者多自面目先腫而身熱口渴仍宜汗解用加味五皮湯感濕氣而腫者多在足下先腫其形光亮以手按之而即有窩其起亦緩此由脾胃已虛飲水過多蓄濕於內所食過多積熱於中仍宜解利宜厚朴湯倘屬虛脹不可妄攻但宜萊菔子丸又有食積而兼滯毒者多自腹先腫起必腹中隱隱作痛不思飲食大便黃臭小便赤澀治當消導解毒為主加味五皮散錄方五加皮桑白皮茯苓皮大腹皮姜皮羌活蒼朮桂枝防風防己淮木通豬苓甘草燈心為引水煎熱服厚朴湯錄方蒼朮厚朴陳皮大腹皮茯苓皮豬苓因於食者加神麯山楂三稜莪朮生薑大棗為引水煎熱服外用蒼朮檀香燒煙薰之以被蒙蓋令出濕水其腫即退萊菔子丸錄方萊菔子五錢炒研洋胡椒厚朴煎湯浸過曬乾用二錢白朮炒二錢共為末蜜丸每服一錢陳皮湯下附食積兼滯毒浮腫方蒼朮厚朴陳皮香附川芎大腹皮山楂神麯牛蒡連翹木通車前子半夏甘草茯苓皮毒火攻目痘後餘毒上攻目頭頂疼痛勢難當清毒保目須急進翳生還用撥翳湯釋凡人之有兩目猶天之有日月也風雨晦冥朔望薄蝕日月遭其障蔽亦有時無光也然薄蝕不過一二時刻復還本體之光明風雨晦冥俟其雨罷云收日月之光明仍舊觀此可以悟毒火攻目之根源並可以參透久吾聶氏訂方命名之精微矣夫男女失明其症不一有因修造興工動土其年值本命之方而成眼患者名曰犯眼有因感冒風寒火熱交併而為眼患者名曰火眼有因內有積熱熱久成疳疳蝕兩目或蝕一目名曰疳蝕眼以上諸症亦有調治得宜久患而隨愈者亦有翳障不開終身失明者然不過千百中僅見一二而已惟痘後壞眼者甚多前哲著書立說俱言目中有痘獨久吾聶氏曰此非有形之痘乃無形之痘也痘毒攻眼皆因長漿之際醫不能及時用藥攻漿致漿不充滿及至回水之際外現身熱頭疼之症並眼胞紅腫不能開視而毒火攻目之症俱已全現此時稍能用清毒保目湯服一二劑尚可以解上攻之毒乃委而去之且曰眼中有痘傷壞兩目痘結成翳非人力之所能為也嗟嗟庸醫誤人莫此為甚蓋有形之痘發於咽喉者有之發於口舌者有之然外痘起脹內痘亦起脹外痘收靨內痘亦收靨惟入眼之毒必作於收靨之時與咽喉口舌之痘迵異此以知非有形之痘乃無形之毒也明矣夫眼有陰陽之別左陽而右陰也眼有五臟之分黑珠屬肝大小眥屬心白珠屬肺黑珠中之一點真水屬腎腎乃夭一所生之水澄清如鏡萬物畢照鳶飛則目中有鳶魚躍則目中有魚人對面見之則為瞳人是目中之水照見人而為瞳人非目中實有瞳人也眼外之上下皮屬脾痘後壞眼翳膜獨遮瞳人黑珠別處無有翳膜豈必與脾肺不受毒耶緣因痘出稠密毒火上炎攻於兩目眼胞必腫緊閉不開熱淚長出眥膿黏滯失此不治毒火愈炎攻脾而兩眼胞紅腫攻心而大小眥紅腫大痛攻肺而白珠紅花障蔽日夜啼叫痛苦異常夫然後欲開不得開欲視不得視內動肝氣肝家之相火與痘家之毒火內外夾攻而腎水爍干腎既困矣肝家黑珠之翳膜漸漸侵入瞳人或從左入右或從右入左或從下犯上甚至毒亢極當頂而遮蔽瞳人兩目喪明不幾成一廢人乎學痘科者當膿漿未成及未滿之時必當細心研究氣血兩虛者急用參歸鹿茸湯以攻之今日不滿明日再攻若毒火內盛而氣血凝滯者急用清毒活血湯以攻之今日不足明日再攻攻之不長又不充滿處於無可奈何即於清毒活血湯內加皂刺黃土炒穿山甲前足甲片研末入於湯內煎熟服之此攻爛之法救命之權也如此及時用藥漿無不足決無毒火攻目之症然亦有不寒而誤服桂附不虛而妄用補劑至火熱上炎攻於兩目身熱頭痛腫閉難開急用清毒保目湯解上攻之火毒服一二劑後看其目中果有翳膜遮蔽則用清毒撥翳湯從容調治或隔一日一劑或隔二日一劑切不可過用寒涼責效於數劑之間計功於旬日之內又不可聽世俗眼科用藥點磨更有一法用蟬蛻豬肝散每日清晨用公豬肝七尖四兩按四時也兔糞八枚按八節也蟬蛻二十四隻去頭足按二十四氣也先將兔糞蟬蛻清水二大碗入磁罐內慢火熬滾令其性味俱出後將豬肝七尖切成薄片入於湯內一刻即熟先飲湯後食肝若得黑褐羊肝更好湯散兼治兩月之久翳可消一半百日之久自可全愈止要性情不躁暴不惱怒並戒食煎炒辛熱之物而已清毒保目湯方歌清毒保目荷柴蟬翹桔荊防赤芍緣升麻牛子歸芎草酒炒梔芩降火全錄方柴胡一錢桔梗當歸各八分酒洗連翹去心荊芥防風赤芍川芎牛蒡各七分炒研黃芩酒炒薄荷升麻各五分蟬蛻十二隻去頭足山梔子炒甘草各三分生燈心五十寸為引同煎服清毒撥翳湯方歌清毒撥翳草連梔牛賊蒙精決蒺藜生地羌防柴菊葛川芎花粉荷歸宜錄方生地錢半酒洗當歸一錢酒洗柴胡八分牛蒡七分炒研蒙花穀精草草決明白蒺藜研防風甘菊花粉葛川芎薄荷各七分木賊山梔子酒炒羌活各五分黃連酒炒甘草各三分生生薑一片同煎食後良久服痢疾痘後忽然痢疾生濕熱傷中症非輕白屬傷氣和中妙紅屬傷血導滯靈釋痘後忽患痢疾當看其或赤或白或赤白相兼白屬氣分芩連俱不可用以養胃和中湯主之赤屬血分以加減清熱導滯湯加紅花桃仁地榆主之養胃和中湯方歌養胃和中用山藥參苓朮草白芍藥陳皮砂仁建蓮子扁豆炒研須去殼錄方白朮一錢炒山藥茯苓陳皮蓮子扁豆各八分炒研白芍五分酒炒砂仁各五分炒研人參甘草各三分一方加木香三分生薑三片陳老米三錢作引加減清熱導滯湯方歌加減清熱導滯湯當歸白芍樸檳榔陳皮枳殼翹蒡草芩連楂肉廣木香錄方陳皮八分當歸不用尾山楂各七分去核厚朴炒檳榔白芍生枳殼麩炒各五分連翹牛蒡各三分研木香黃芩酒炒甘草各二分生黃連一分酒炒加桃仁地榆各五分紅花三分生薑三片作引同煎服補論李氏東垣曰痘症下痢須用升麻提起正氣使痘不致下陷可見痘中治痢須用保元湯加升麻為主然後隨其赤白加減治之在痘中不致陷伏之虞痘後可免喪元之禍也加味四物湯治赤痢錄方當歸白芍炒生地川芎黃芩炒黃連炒木香桃仁紅花甘草水煎服久而不愈去桃仁加阿膠硃砂黑姜加味四君子湯治白痢錄方人參茯苓白朮土炒甘草炒黃芩炒木香黃連炒陳皮滑石裡急後重加枳殼生白芍肛門突出加升麻久而不愈加黃耆乾薑砂仁水煎服加味八珍湯治赤白相兼即四物四君子合飲而加黃芩黃連若小便赤澀而煩渴者加生地木通車前麥冬似痢非痢釋痢之為症險惡異常若不辨別明白用藥多有錯誤如痘後便下膿血腹下間或作痛但不裡急後重以此迥異如所便之膿血以清水試之攪動浮有痘痂樣此因腸胃有痘收結滑下此亦無妨可用大連翹飲以清解之此症肚腹不痛為不同耳若痘後腸胃發癰必先作腹痛癰熟內潰所便膿血俱有知是癰破膿血注下不過二三日腹痛自止仍用大連翹飲以清解之一劑即止不可多服切不可用大黃下行之藥大連翹飲見卷六毒盛不靨門發癰餘毒未盡發癰疽大連翹飲三豆敷平坡漫腫無地界托裡消毒免憂虞釋痘當起長灌膿之時醫者不能及時攻漿以致膿漿不足及至回水結痂之後偏身發熱蒸蒸毒氣凝聚於一二處紅腫堅硬此為餘毒未盡而發癰也亦有誤服補劑熱藥助其毒火薰蒸而凝結於肌肉皮毛之內者其中有陰陽之分焉或頭上或手足上初起腫而紅高聳有頂此陽毒也宜外敷三豆丹內服大連翹飲可消則消之不可消則攻破出膿盡用生肌散貼萬應膏則全愈矣或發熱蒸蒸各處平坡漫腫不分地界不見高聳既無頭腳亦無紅色此陰毒也急宜托裡解毒使頂漸高聳腳漸收束毒內作膿膿成而毒亦解猶可望生遇此危症切勿緩圖三豆丹見卷三疔痘門大連翹飲見卷六毒盛不靨門生肌散見卷六瘡破流膿門托裡消毒散方歌平坡漫腫陰毒攻參耆玉燭歸地從翹牛苓朮銀花刺赤芍防風白芷同錄方黃耆生玉燭各二錢當歸熟地白芷各錢半白朮連翹去心牛蒡炒研赤芍金銀花防風各一錢茯苓皂角剌各八分人參酒摻服補論凡痘後之人元氣必弱雖解餘毒亦當顧其元氣故清解方中俱宜加以參耆蓋痘發餘毒不致內攻未必夭人性命若求欲速效峻用清解之劑恐元氣一耗禍起蕭牆是不死之症反立致其死者不堪悲乎余見世之庸醫遇痘後潮熱餘毒發蒸恆據聶公之書輒投大連翹飲以致變生莫測令人不可救者不可屈指數也故余治餘毒必先調元以固其本而兼解毒以治其標標本兼治十無一危且須內外交攻毒始除去看其硬之高起者是潰膿之所也宜用針鋒刺去惡血然後用藥四圍敷之留口莫敷令出毒氣再用膏藥貼之拔盡膿汁而自愈矣若已成膿亦以針刺之令膿潰而痛立除亦以膏藥收功鐵箍散備方取樹上百足蟲用新瓦煅成灰為末調油敷之其蟲腹下盡皆生足其背殼硬跌下地來即首尾交合如環其大如指長二寸許芙蓉膏芙蓉花或葉或皮或根俱可惟花更佳黃荊子各等分共搗碎用雞蛋調敷留頂莫敷連敷二三次其效如神如意散生半夏大黃各一兩生南星八錢鬱金薑黃白芷蒼朮各五錢共為末用醋調敷一方用紫花地丁擂酒與服搗碎外敷十六味流氣飲治痘癰腫痛元氣素虛者人參川芎當歸赤芍防風南木香黃耆薄桂白芷桔梗檳榔臺烏藥厚朴紫草枳殼甘草氣血虛而瀉利者加熟附子大便秘結加酒蒸大黃水煎半飢服連翹解毒湯治痘癰腫痛能食而元氣強者連翹白芷川芎赤芍牛蒡當歸尾穿山甲甘草水煎服汗腠理疏通兩汗傾衛虛榮弱兩無情建中自汗湯偏勝盜汗當歸六黃平釋經曰衛氣者所以溫肌肉充皮毛肥腠理司開闔也痘後衛氣受傷故收靨之後衛弱而汗出也醒時常出為自汗宜建中湯睡著而出者為盜汗宜當歸六黃湯建中湯錄方黃耆炙官桂白芍當歸甘草炙生薑大棗為引水煎熱服當歸六黃湯見卷五汗門諸失血血在身中本自寧火邪迫血血違經鼻中血出堪調治便尿中來命不停釋痘後忽見血症最為危候蓋鼻血出於肺吐血出於胃溺血出於小腸便血出於大腸皆由毒入於內迫血妄行急宜涼血地黃湯止之服藥後血不止者不治涼血地黃湯錄方黃連當歸尾懷生地黑元參炒梔仁生甘草蓮蓬殼燒灰為引水煎服鼻血加絲茅根新桑葉吐血加熟石膏知母香附童便尿血加木通滑石便血加秦艽槐花地榆諸血不止加炒蒲黃生藕節生柏葉吐蛔忽吐蛔蟲症已非要知內熱又常機但聞食臭蟲斯出嘔吐心煩蟲作威釋傷寒吐蛔責之胃寒痘症吐蛔責之內熱由熱湧出者宜黃連止蛔湯黃連止蛔湯錄方黃連黃柏烏梅人參白朮川附片大棗引水煎服小便赤澀小便宜清偶澀遲膀胱蓄熱少人知不將導赤為良法只恐遷延有變時釋凡痘疹小便始終宜清若使赤澀此熱積膀胱宜加減導赤散以清其心加減導赤散錄方木通車前瞿麥滑石梔仁炒赤伏苓淡竹葉燈心為引水煎熱服大便秘結便貴滋榮乍覺難誰知腸胃液津干潤腸膽導宜兼用縱有餘邪便後安釋凡大便始終須宜潤澤一二日一次為佳若痘後大便秘結乃痘出太多血枯氣不潤腸宜潤腸丸兼膽導法潤腸丸錄方當歸尾懷生地火麻仁光桃仁萊菔子為引水煎熱服
