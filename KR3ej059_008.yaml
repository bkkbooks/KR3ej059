body:
  text: 卷八襁褓芽兒出痘所為芽兒者不分男女或生下不上十日或半月一月俱謂之芽兒以其初出胎懷隨母在産房之內未經風日如谷種之萌芽此雖吳楚俗語其中有至理存焉如身熱一日切不可指為驚風雜症用藥妄治豫曾治一芽兒出痘先問其家有出痘之男女否乎彼曰有豫向主人曰今且勿藥姑少待之俟來早再看至次早看其面郭已報痘苗兩三顆矣亦不必用藥俟至三日痘已出齊通身上下手足不滿二三十顆至第四日次第長漿第五日灌漿充滿尖圓紅潤第六日漿足回水先從腎囊結痂有兩三顆黑色豫初見之而驚疑因其身又不熱乳又好睡又安靜因思未出房幃時令之濁氣溝渠之穢氣俱不能侵且腎囊居至下之位天一所生之真水系焉地六成之是腎氣生於五行之初而亦成於五行之始宜其先靨及至七日而通身之痘痂已落其半此乃出於常格之外未可以一十二日拘泥也或問之曰子言未出房幃時令之濁氣溝渠之穢氣不能侵犯固言之有理獨不思産婦房中産婦懷內能無産後瘀血而厭穢者乎豫笑而應之曰氣血原屬一本非外人可比正所謂母不厭子也年長男子出痘男子自二十三十以及四五十歲俱謂之年長有婚配多年者亦有生子及孫者未免真元虧損更加時令不正之氣傳染而出痘順症固不必藥險症易於變逆矣治者須知水虛則難制火故雖見口渴心煩鼻衄咽痛熱症不可純用清涼苦寒之劑五六日前惟用參麥清補湯足以清熱足以催漿連服三五劑必能奏效設至七八日膿漿不行急宜以參歸鹿茸湯內調雞冠血治之但得漿行庶可無虞參麥清補湯方歌參麥清補甘草芍半生半熟紅花著生耆歸地桔川芎花粉前蒡楂肉度録方炙甘草三分生甘草二分酒炒白芍五分生白芍三分紅花酒洗炒人參各五分生黃耆三錢前胡生地黃麥冬酒蒸曬乾去心山楂各一錢去核白花粉酒蒸曬乾牛蒡各八分炒研當歸酒洗川芎桔梗各七分生薑一片龍眼肉二個同煎溫服參歸鹿茸湯見卷三七暈門室女出痘治法發熱行經室女出痘天癸至發熱升麻葛根湯元氣虛弱參蘇飲腹痛酒炒香附良如期毒亦隨血解不須妄治過驚慌釋室女者十四歲以後謂天癸已至尚未嫁者也若發熱之際天癸暴至不必驚惶當問其及期否或前後錯日否又問其腰痛腹痛否惟按發熱治法用升麻葛根湯或元氣虛弱則用加減參蘇飲倘或腹痛加酒炒香附以和其氣如月經如期而行者則毒隨血解不必妄加施治升麻葛根湯加減參蘇飲二方俱見卷二發熱門經行先期發熱經行非正時火邪迫血血奔馳涼血解毒方中病元參地黃湯亦宜釋女子非經行之期於發熱時而經水忽至者乃火毒內熾觸血妄行其毒必盛其血必多急用涼血解毒湯倍加連翹牛蒡或元參地黃湯治之若因循隱忍則血愈虛而毒愈熾不旋踵而伏陷內攻雖有良醫亦難治其後矣涼血解毒湯方歌先期經水或妄行毒火內擾於胞中涼血解毒歸地紫翹芷牛桔連丹紅録方當歸錢半酒洗生地一錢酒洗紫草茸研末白芷各八分桔梗六分丹皮五分黃連酒炒紅花生甘草各三分連翹牛蒡子各錢半炒研燈心為引水煎服元參地黃湯録方生地元參丹皮升麻梔仁炒蒲黃炒甘草生燈心十莖水煎熱服行經不止熱入血室血妄行過期不止使人驚四灰調酒須先服四物解毒毒自清釋發熱之初經期適至則毒隨血解固不須治然過三四日血猶不止此熱邪乘血室之虛迫血妄行治之不容緩也急以四灰散調酒與服止之若猶不止宜以四物解毒湯加元參甘草治之四灰散録方舊棕老杉樹皮胎髮臍帶俱燒灰存性調酒服四物解毒湯録方當歸生地白芍川芎黃連黃柏黃芩梔仁元參甘草水煎熱服經後譫妄適逢發熱經斯斷熱入子宮譫妄生此際莫作實熱治逍遙歸脾後先清釋發熱時經水適斷宜早服柴胡四物湯以防血室空虛毒邪乘虛而入致生他疾若憎寒壯熱神識不清見聞妄誕言語錯亂此陰虛似實切不可以實熱治之蓋經行之後血室空虛心以生血血竭則心神不寧肝以藏血亦且藏魂血盡肝虛神魂自不能定此譫妄所由來也痘未出宜以逍遙散加丹皮主之痘已出宜以加味歸脾湯主之柴胡四物湯録方當歸川芎生地白芍柴胡人參黃芩麥冬知母地骨皮淡竹葉生薑一片同煎熱服加味逍遙散録方白朮茯苓當歸白芍生地柴胡甘草加丹皮梔仁加味歸脾湯録方人參黃耆白朮茯神棗仁遠志當歸木香甘草加柴胡梔仁崩漏崩漏多時血已枯適逢出痘更堪虞十全大補湯雖緩濟弱扶傾在呼吸釋女子正值崩漏適逢出痘則氣血俱虛必不能送毒出外急宜大補氣血否則痘不能出雖出亦易倒陷矣遇此之症速以十全大補湯或參歸鹿茸湯主之十全大補湯見卷三怪痘門參歸鹿茸湯見卷三七暈門閉經女子居經日已賒況逢此際又天花桃仁四合雖除垢猶慮胞門隱毒邪釋女子一向經閉血海已涸適逢出痘毒氣滯於沖衛之間致生乖戾者有之故發熱之初即當滌除停垢以桃仁承氣湯主之後以四物湯合勻氣散調理之桃仁承氣湯録方桃仁二十粒去皮尖研泥大黃二錢酒潤紅花一錢桂枝尾甘草各五分生先煎大黃紅花桂枝甘草湯成去滓入桃仁泥化開空心服四物合勻氣散録方當歸川芎白芍生地木香京楂肉炙甘草水煎不拘時服失音經行暴啞毒邪侵血出津枯乍失音養血利竅憑何藥當歸養心勝千金釋女子出痘經水忽行暴啞不能言蓋心主血舌乃心之苗血去則心虛心虛則少陰之脈不能上榮於舌故至失音先以當歸養心湯養其心血利其心竅自然能言後以十全大補湯調之當歸養心湯録方當歸人參麥冬生地茯苓甘草生燈心十二根為引水煎服起灌經行起發成漿忽動經氣隨血散豈能停十全大補可通用調元內托陷伏靈釋女子出痘當起漿灌漿之時忽然行經恐血氣太虛痘易倒陷急宜大補氣血用十全大補湯或參歸鹿茸湯主之治若少緩致痘應起不起應灌不灌頂陷灰白仍宜用十全大補湯及調元內托散外用胡荽酒噴之使痘起漿行或於空處又出一層則為吉也若服此不效寒戰咬牙喘急腹脹反增他症則不治矣調元內托散録方人參黃耆肉桂木香當歸川芎白芍附片胡荽酒録方胡荽四兩切片黃酒半斤同煎孕婦出痘治法妊娠出痘有真傳惟有安胎法最先不可令胎輕觸動胎元觸動命歸泉釋妊婦出痘痘家最忌蓋痘毒出於五臟痘毒發越則風火相搏必致動胎胎動則氣血耗散勢必不能送毒行漿況痘家用藥多主補溫如半夏肉桂之類皆為孕婦所忌而黃芩烏藥又非痘家所宜此孕婦出痘所以最難調治也遇此總以清熱安胎為主發熱孕婦出痘本異常初熱不必問奇方升麻葛根加芩術托痘保胎兩安康釋有孕之婦遇出痘時急宜遠出回避若至出痘當發熱時即以保胎為本以托痘為標仍用升麻葛根湯加酒炒黃芩土炒白朮以保護其胎元夫黃芩寒涼易至冰毒若無孕不敢早用然有孕而毒火薰蒸不用黃芩以清內熱胎必不能保矣至於出齊熱或未清黃芩亦不妨再用見點見點調治問如何安胎飲宜服之多渴用參朮散加減泄須黃芩二湯和血動四物芩連入腰疼保和散不頗釋孕婦出痘終始以安胎為主故見點後多服安胎飲為佳渴者則用人參白朮散加減泄者則用黃芩湯合四君子湯內加訶子血動者四物加芩連腰疼者保胎散宜早服總之不問輕重悉以清熱安胎為主安胎飲録方人參白朮條芩當歸白芍川芎砂仁蘇葉陳皮地黃熟甘草生薑三片紅棗三枚水煎溫服黃芩湯合四君子湯録方黃芩白芍人參茯苓白朮甘草訶子芩連四物湯録方當歸白芍地黃川芎黃芩黃連保胎散方歌保胎當歸川芎草茯苓玉竹續杜炒黃芩白朮各等分腰疼用此方宜早録方玉竹四錢酒蒸當歸三錢酒洗續斷酒炒杜仲各錢半鹽水炒茯苓黃芩酒炒白朮各一錢土炒川芎甘草各八分水煎服灌漿痘暈紅紫須清毒白朮加入五六分淡紅淡白內托散去桂增術可解紛釋長漿之際痘暈紅紫此血分有熱必用清毒活血湯內有黃芩外加白朮五六分以固胎元胎必不動若痘暈淡紅以及淡白必用千金內托散倍加參耆去肉桂外加白朮一錢以固胎元胎必不動此母子兼治之法也墮胎孕婦出痘勢正危更逢胎墜莫遲疑外用平入大産法內將湯藥按症施加味保元治稠密十全大補調元虧小腹若痛瘀末盡用黑神散正相宜釋孕婦出痘以安胎為主若從前不能按法調治至熱氣內蒸而墮胎者多矣遇此等症令老成穩婆撐扶産母以熱水淨沐下身扶其上床不要倒睡必須強坐一二刻用滾水滲白酒一鍾入童便半盞和服行其瘀血若痘稠密用加味保元湯氣血虛甚用十全大補湯若小腹急痛瘀血未盡也宜黑神散以滌除之寒涼切不可用加味保元湯方歌加味保元參耆歸川芎芷桔厚朴隨紫草防風牛子共白芍肉桂最相宜録方人參黃耆當歸川芎白芷桔梗厚朴紫草防風牛子白芍肉桂十全大補湯見卷三怪痘門黑神散方歌黑神散中熟地黃歸芎甘草桂炮姜蒲黃黑豆和香附去瘀生新是良方録方地黃熟當歸川芎甘草肉桂炮姜蒲黃炒黑豆香附醋炙童便酒調服産後出痘産後如逢出痘瘡此時胎去免憂惶只憑補助收功效莫犯寒涼生氣傷釋婦人産後出痘只以大補氣血為主十全大補湯是此時要方方中白芍亦用好酒炒熟不可妄用寒涼以傷生髮之氣也
