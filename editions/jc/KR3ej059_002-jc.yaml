body:
  text: 卷二治痘總論痘本臟中之毒非猶外染之瘡諸瘡雖烈外染之症終不至傷臟腑痘毒雖微內攻不出頃刻立殃治之可不慎乎方發熱之初內毒已動慮夫寒邪壅閉腠理緊秘而毒氣難宣治宜開提發竅解毒松肌最忌驟投辛熱以致助毒為虐故桂附乾薑諸品萬勿亂投尤忌藥中滯補以致毒不能出故耆朮熟地諸藥切莫輕試懼發驚宜利小便慮不出善用開提嘔吐多是毒攻胃管痘出而吐自平勿驟用砂香止塞惟面青唇白虛寒可據然後稍投和胃之劑泄瀉多是毒氣奔越宜用加味四苓內分清濁以導毒於膀胱毒盡而瀉自止凡訶朮粟殼切勿妄施以滯毒氣惟便清糞白神力困倦方用參苓豆蔻以固其脾若或寒戰咬牙此際恐為實熱而清胃解肺其症立平設或頻頻腹痛此內毒作痛須以解毒為良若是痛叫太甚則寒邪積胃當以平胃為佳在腰痛最為不吉速剖生雞以敷其腰或發搐不要驚慌與益元加以鎮驚夫發熱固宜發散尤恐發表太過而表虛必成潰爛痘前雖要清解尤慮清之太甚而裡虛後變灰白故治之於始必慮之於終不可以不慎也既詳發表須論見標未熱先敷恐為片賊之標見之急宜剔破坎離報點必為不順之兆方出速用燈燒一日放標者死二日見點者凶必三四日而後見點者乃吉也且標喜粗肥而嫌瑣屑粗肥則痘稀瑣屑則痘密一齊湧出定作南柯一片紅氈必歸陰府青斑若現魂歸鬼錄焦紫遍身魄赴黃泉二便見血須知莫救痰鳴腹脹總是難醫三五成群如梅瓣後日必成水泡皮間隱躍似紅萍此際便知不起點如蠶種十死一生形同蚊咬良醫難治出齊熱退乃為吉兆若痘齊猶熱急與解毒之劑而牛蒡連翹是其聖藥界地不清速解血分之毒而紅花紫草可謂良方清毒活血之藥此際不容少緩以為灌膿之計蓋毒不清則必焦血不活則必紫焦紫之症安能起脹而升漿乎但毒不可以盡解過於解毒其漿必清熱不可以盡除身無微熱其膿不成故一至地清色潤清涼在所必屏以顧成漿之地倘至七八日後則臟腑空虛候當用補清解之藥敢復試乎故脹水之時忌其泄漏膀胱利水之劑切不可用又忌土燥制水助脾干乳之藥不可輕嘗至痘之形畏頂平而腳闊腳闊由於血散治當斂血為主頂平必是氣虧法以補氣為先迨水足而漿猶清則補益中須加白朮縱或身熱口渴此時定作虛看況作漿定然身熱痂結乃自退潮即有譫語狂言補血寧心自定若或咬牙寒戰理中桂附無疑然痘之生死總看膿漿有無有漿則生無漿則死至於收靨須從鼻準地角先收則腎竭天庭先靨則心焦聲啞痰鳴死期已至一時齊靨頃刻立亡遍身痂皮如竹紙收齊亦當長逝面部手足盡無痂不久定返泉鄉漿清痂薄必留餘毒漿濃痂厚變症終無餘毒熏蒸扶元而兼化毒冒風潮熱發表而且溫中熱瀉能消餘毒不必驟止盜汗乃是表虛宜固表肌手足拘攣是血氣不足眼目羞明乃是餘毒之傷睛為疽為癤解毒又貴調元為疳為疥內解亦兼外敷變症雖多因人調治虛實得宜自無不效初熱變症賦初發悠悠身熱尤宜氣息和平二便如常面容不改兼之精神清爽睡臥安寧便見症來順候肌色青而㿠白精神少而倦怠此症常作虛看痘出決然不振再看哯乳便溏只宜補益為先若熱盛氣粗煩躁不寧譫語狂言面紅眼赤均為內熱如加喘滿腹膨脹便閉須知熱壅肌膚燥而毛色焦口氣熱而身燔灼此則蓄熱鬱遏內症固重而外症尤烈腹脹口張而喘急啼聲不絕而嘎嘎五竅不通須防失血點來隱隱出恐復顛吐乳更兼搭眼面青又見搖頭狂語忽生發驚先兆是故熱盛者只宜清涼發散不宜峻用苦寒發散則毒得外出而熱自解苦寒則毒反冰伏而出愈難故發散之劑輕則加升麻乾葛以疏其熱而煩躁壯熱者非此何以定其標重則麻黃羌活以開其壅而喘急腹脹者非此何以救其危未萌先泄有熱症莫作虛看無熱症定為虛論止實瀉以清涼重加發散治虛溏以溫補仍用開提是以內虛誤用寒涼不特助伊作泄實熱而投補劑尤恐勃增煩劇安靜而能食勿謂便秘而可下泄瀉而煩渴休言熱症而投涼宣毒雖貴開提恐發表太過有傷貞元之氣初熱雖當清利恐清利太甚以致臟腑之寒慮始慮終方為妙用顧首顧尾乃是良方凡痘初熱之時毒之輕重痘之吉凶皆兆於此熱之微者毒必輕而痘必稀吉之兆也熱之甚者毒必盛而痘必密凶之機也此必然之理醫者宜預知之發熱順症身熱和緩時熱時退神清氣爽飲食如常大便稠黃小便清利並無雜症者此順症也又初熱時或吐或瀉不可驟止蓋吐者邪從上解瀉者毒自下奔因吐瀉發越而毒乃輕是順症也若驟以止之是關門閉盜輕者反變重矣不知毒氣奔越之吐瀉俟痘出後將勿藥而自止又何必施治乎凡不必施治之症而強治焉正恐復增他症也故但戒葷酒禁風寒善於調護而已發熱險症身熱燎人連日弗退煩躁而口渴面紅而唇赤小便短澀飲食減少此毒盛而閉結於中故現症如此也發熱逆症初熱頭面一片紅如胭脂者不治初熱身如熨斗眼紅唇裂而紫黑者不治初熱腹痛及腰痛如杖連尻骨俱痛者不治初熱目痛無魂昏睡不醒者不治初熱七孔二便出血不止者不治初熱聲啞神昏舌頭紫黑者不治初熱吐蛔不止者不治初熱口吐臭痰或腹脹痰鳴者不治初熱四肢厥冷舌卷囊縮者不治初熱口中常如食物者不治初熱胸高而突者不治初熱目閉咬牙鼻生黑氣者不治初熱飲食不化形色青藍者不治初熱心窩中及遍身皮內有成塊紅者不治初熱唇頂硬腫神氣昏暗者不治未熱先出賊痘數粒至熱時而俱沒者不治初熱三日治法初熱體實升麻湯體虛參蘇飲差強無力服參鬚權變扶元宣解代之良釋初熱身體平和不必服藥其或憎寒壯熱頭痛咳嗽鼻流清涕多因外感宜於發散當視兒強弱以用藥體氣壯實者用加味升麻葛根湯體氣怯弱者用加味參蘇飲但人參價重人多無力服參其方無參而復用之有反誤人乎故又以扶元宣解湯代之看症加減可也加味升麻葛根湯方歌升麻葛根湯四味赤芍甘草麻葛是楂防芎桔蘇蒡加體氣壯強斯藥治錄方粉葛一錢山楂八分去核防風去蘆川芎各七分桔梗蘇葉各六分牛蒡炒研赤芍各五分升麻三分甘草二分生生薑三片同煎取微汗加味參蘇飲方歌參蘇飲內桔前陳參蘇葛半草雲苓加入楂芎及牛子體氣虛弱用此靈錄方前胡一錢茯苓山楂去核粉葛各八分蘇葉陳皮川芎各七分桔梗牛蒡各五分半夏甘草生人參各二分生薑三片同煎熱服取微汗扶元宣解散方歌扶元宣解生耆芎當歸升麻柴桔通陳皮牛蒡楂肉草頭痛薄荷藁防風錄方黃耆一錢生當歸酒洗山楂去核白芷防風川芎陳皮各七分柴胡去蘆桔梗薄荷藁本各六分牛蒡炒研升麻各五分甘草三分生咳嗽加半夏黃芩腹痛加厚朴香附木香生薑三片同煎熱服取微汗毒盛發汗之後熱蒸蒸毒氣壅盛急須清敗毒和中加減用苦寒峻下亦莫輕釋既經發汗兒頗安靜身熱稍緩則姑待之看其痘出如何另施方略蓋既汗則不可再發恐表虛而後難於起脹灌漿也若依然大熱蒸蒸齦紅唇紫舌有黃苔口中氣臭煩躁狂譫口渴飲水即宜用敗毒和中散清之服此仍煩躁不寧諸症不減則毒氣壅盛非一服可清須速進數劑其毒乃開倘大便閉澀加酒蒸大黃微利之如外感風寒見症必頭痛鼻塞此方去芩連加羌活白芷蘇葉發散而兼托痘則諸症自止然後看其痘或稠密或紅紫或帶焦黑乾枯急於此方內倍加芩連紫草以清血分之毒火慎勿用苦寒解毒與硝黃峻下致內攻告變也敗毒和中散方歌敗毒和中翹桔草牛蟬前麥芎連好通麻芩殼紫荊防便秘蒸黃微利早錄方紫草錢半研末前胡一錢麥冬一錢去心連翹去心隔川芎牛蒡炒研木通荊芥防風各七分桔梗六分枳殼五分升麻三分黃芩酒洗黃連酒炒甘草各二分生蟬蛻一隻閏年加一隻去頭足大黃八分酒蒸生薑一片燈心五十寸同煎服毒盛元虛元虛神倦便清利毒盛迷悶熱灼人良工自有兩治法調元解毒服之靈釋初熱時若唇淡面青手足冷舌無苔精神困倦不思飲食二便清利脈沉細而遲緩乃虛症也若又大熱灼人心中迷悶則元氣虛而毒氣又盛若不急治恐元虧不能送毒三四日間須臾告變良可悲也宜急用調元解毒湯調元解毒湯方歌調元解毒參耆歸翹蒡芩連防風隨升麻前胡木通草川芎蟬蛻虛弱宜錄方黃耆一錢生當歸酒洗前胡各八分連翹去心防風牛蒡炒研川芎各七分木通六分黃芩五分酒炒升麻黃連酒炒人參甘草各三分生蟬蛻十二隻去頭足生薑一片同煎溫服推拿法已經發散難再汗又因怯弱慮表虛前賢留得推拿法松肌發竅藥弗如釋初發熱或為風寒所閉一時無表散之藥須用推拿法以松肌表其毒自出又或兒素怯弱復為風寒所束固不得不發又恐表虛用藥發表有傷元氣亦用推拿之法又或既服表藥依然身無微汗寒邪閉固其症不退欲復用表散之劑又恐過表以損元神蓋發散之藥多能耗氣推拿之法不過鬆肌發竅運動筋骸而已竅開則氣通筋運則血行氣血通暢而邪自出勿謂推拿之無益也取溫水一碗先用大指蘸水於小兒兩鼻孔洗擦而上推者二十四下謂之洗井灶再於印堂用兩手指分開擦二十四下謂之開天門又於小兒兩手食指擦下三十六下以瀉三開之火又於中指擦下三十六下以瀉心經與肝之邪又將小指數擺謂之烏龍擺尾再於脈門擦下三十六下復擦上十二下又於掌上順運八卦周旋擦一百二十下然後於虎口及手足凡接骨之處其穴有窩於各穴窩間用力俱捏一下臍下丹田各捏一下背上兩飯匙骨下及背脊每節骨間各捏一下任其啼叫令汗出而肌松痘毒亦從而出矣但推拿後宜令兒睡發汗不可冒風腠理既開恐風邪之復乘也初熱雜症治法嘔吐嘔吐順症何須慮止憂食積與胃寒食積平胃散為主胃寒和胃散可安釋發熱之初毒攻胃管故有吐症毒氣上逆而吐者其吐必酸刺而有聲吐訖反快精神不倦此毒逆上行之吐因吐而毒亦解所謂吐為順症者此也此不必治俟痘出而嘔吐自平然其症不一端有食積作吐者腹中作膨隱隱作痛其痛連綿不已多在臍以上面青唇白而手足冷升消平胃散主之有胃氣虛弱作吐者其人面青唇淡精神困倦不思飲食或食下即吐其吐多順快而無聲參砂和胃散主之升消平胃散方歌升消平胃樸陳芽白芷蘇芎藿附砂若遇內傷兼外感須加蒼朮草羌楂錄方附米一錢炒研麥芽八分炒紫蘇川芎各七分厚朴姜炒陳皮去白白芷各六分藿香五分砂仁五分炒研外感加楂肉七分羌活六分蒼朮五分甘草三分煨姜三片同煎熱服參砂和胃散方歌胃氣中虛嘔吐頻參砂和胃散猶靈陳皮白朮煨姜引藿半隨甘白茯苓錄方白朮一錢土炒茯苓八分砂仁七分炒研陳皮去白藿香各六分半夏五分薑製人參甘草各三分炙煨姜去皮三片同煎服吐黃水毒留脾胃中腹痛吐黃水治此無奇術清毒而已矣釋腹不痛則無事若大熱熏灼口中作臭唇皮硬舌有苔腹痛而吐黃水則毒留脾胃為禍不淺錄方陳皮厚朴山楂牛蒡石膏山慈菇石斛黃連木通白芷甘草吐清水嘔時吐清水肝盛而胃寒平肝兼暖胃臟腑自平安錄方砂仁藿香陳皮白朮茯苓白芍甘草煨姜引吐臭痰胃中毒火久難堪故令嘔時吐臭痰清胃解毒有妙藥痰中帶血用可參釋痰雖火結吐則內寬不必治也惟痰氣若臭乃胃中毒火難堪急宜清胃解毒痰中帶血亦然錄方生地花粉牛蒡山慈菇人中黃乾嘔初熱為何有乾嘔毒火內郁不得消治宜解毒利小便梔連二陳須早投釋初熱嘔吐是毒氣上攻總莫驟止恐閉毒也惟乾嘔之症乃毒火內郁不得外宣故時時張口似吐非吐最為危險初見即宜解毒兼利小便此方主之梔連二陳湯方歌痘疹乾嘔症正危毒火內郁利之宜連陳半梔茯苓粉瞿麥應與木通隨錄方茯苓七分陳皮瞿麥木通各五分花粉四分梔仁姜炒三分黃連姜炒三分半夏姜炒三分生薑一片同煎緩緩服嘔止即勿服泄瀉毒從瀉解瀉何妨熱甚脾虛始有傷脾虛須用術苓散熱甚加味四苓良釋初熱作瀉乃毒氣奔越從瀉而解痘出必輕故為順症不必施治俟痘出其瀉自止至由寒熱虛實而作者宜詳辨而分治之初熱時有脾氣虛弱飲食不化而泄瀉者其瀉滑利而色帶白且不變化如糟秕𥺀亦有餿餕氣瀉後精神疲倦面白唇淡宜以術苓調脾散主之若小便赤而不利其糞或黃或赤或黑其氣甚臭泄時有聲直射而遠者是熱瀉也用加味四苓散治之術苓調脾散方歌脾土中虛泄瀉作術苓調脾扁豆樸砂仁草附或加參神麯煨姜炒白芍錄方白朮一錢土炒茯苓去皮扁豆炒八分神麯炒八分香附七分炒研厚朴薑汁炒砂仁炒研白芍各六分炒人參三分甘草三分炙煨姜三片大棗一枚去核同煎服加味四苓散方歌熱甚作瀉覺難當小便紅黃毒氣猖加味四苓車術共芩連牛子一齊嘗錄方赤茯苓八分澤泄豬苓車前各七分炒黃芩酒炒牛蒡各五分炒研木通白朮各四分酒炒黃連二分燈心五十寸同煎食前服腹痛加木香後重加升麻食積加厚朴陳皮山楂神麯泄滯紅色加百草霜泄紅熱時何泄紅熱鬱腸胃中解毒連牛子慈菇人黃同錄方黃連牛蒡子山慈菇人中黃泄白欲知脾胃寒驗之泄時白但用術苓散溫補甚有益泄白則屬胃寒故宜溫補參苓白朮散方歌參苓砂草薏苡仁蓮肉山楂五神麯南術二陳訶蔻四其間白朮兩分明錄方人參茯苓砂仁炒研甘草炙苡仁炒蓮肉去心山楂去核神麯各五錢炒南木香二錢陳皮去白訶子肉煨去核肉豆蔻各四錢麵包煨熟包打去油淨白朮一兩炒共為細末每用二錢清米飲調食前溫服兒有不肯服者入稀粥內和服亦可泄黑糞及赤黑水此臟腑已敗不治吐瀉吐瀉交作神清爽腹不疼痛不須藥惟有感寒與停食升消平胃用之著釋發熱之初吐瀉交作腹不疼痛神氣不甚困倦吐必酸刺而有聲瀉必黃色而臭穢此毒氣由吐瀉而發泄所謂吐瀉為順候而不必止者惟此一症耳若吐瀉交作而胸腹痛甚吐則有餕餕之氣瀉則有淡白之色者此感寒而停食也宜用升消平胃散加羌活五六分立效升消平胃散見卷內嘔吐門閉結便閉雖原內熱甚只宜清解勿峻攻敗毒和中為主劑加減得宜便自通釋閉結者大小二便不通也初熱之時凡有此症俱是內熱小便不利乃熱蘊膀胱只可於清毒湯中加車前木通滑石小便自清長矣大便不通乃熱注大腸只可於解毒方中如枳殼以破其滯黃連以滌其熱大便自行矣即熱結之甚亦不過加酒製大黃少許以微利之切不可過用寒涼損傷脾胃無以為起脹行漿之基也敗毒和中散可加減用之敗毒和中散見卷內毒盛門寒熱並作身寒身熱何無定火動火鬱使之然發表宜用蘇解散加味升麻亦可煎釋火動則熱火鬱則寒痘欲出而不能出氣血與毒火相攻故乍寒乍熱也惟宣毒發表痘出而寒熱自定宜用蘇解散及加味升麻湯蘇解散方歌蘇解前羌白芷同荊防升葛紫翹功牛蒡山楂蟬蛻殼甘草淮通及撫芎錄方前胡一錢粉葛八分山楂八分去核羌活白芷荊芥防風木通川芎各七分桔梗升麻紫草連翹去心牛子各五分炒蟬蛻十二隻去頭足甘草三分生生薑三片同煎熱服加味升麻葛根湯見卷內初熱治法口渴初逢熱渴邪藏里切忌冰瓜兼冷水生津止渴是良圖小渴任之而已矣釋發熱作渴因痘毒內蒸銷其津液故口乾而渴微者頻以炒米湯與之切不可以冰瓜凍柿柑西瓜菱角之類食之反傷胃氣亦不可以椒湯飲之恐生瘡毒而有他變渴甚不止宜解毒葛根湯解毒葛根湯錄方升麻粉葛花粉麥冬去心生地黃芩甘草茅根汁水煎眾藥熟以茅根汁兌服煩躁臟毒炎炎似火煎幾回煩躁難安然調成解毒湯方就一服清涼盡日眠釋初熱毒火鼎沸五臟不寧常生煩躁然毒盛則煩躁亦甚以解毒湯治之解毒湯藥味與敗毒和中散俱同止少荊芥一味耳譫妄為甚語言多譫妄毒迷心竅故失常解毒湯須加朱粉定心散更可煎嘗釋初熱譫妄乃毒氣壅盛朦迷心竅故也宜解毒清心降火消痰則愈矣用解毒湯加硃砂花粉兼用定心散可也定心散錄方滑石六兩飛過甘草一兩牛蒡炒六錢木通六錢車前六錢神砂五錢先將神砂另乳再將諸藥研末後入神砂乳勻頭痛初熱頭疼毋過慮止因旦晚或傷風散寒解表痛自止起發之時治亦同釋初熱頭痛多因感冒風寒所致發表即愈痘起發時有此症治同錄方升麻川芎白芷防風藁本薄荷喉痛初熱喉痛毒郁甚敗毒和中加芩元腫塞吹用冰硼散飲須甘桔與利咽釋痘初發熱咽喉即痛是毒郁之甚其火上炎故也宜用敗毒和中散以解其毒倘咽喉腫塞不能呼吸飲食難入宜用加味甘桔湯及利咽解毒湯治之外用冰硼散及吹喉丹為末吹之加味甘桔湯方歌加味甘桔用元參射干牛子兩般平連翹麥冬炒梔子桔梗甘草共和勻錄方元參一錢麥冬一錢去心牛子炒八分桔梗八分連翹七分去心射干六分梔子六分炒甘草三分生水煎服利咽解毒湯方歌利咽解毒用防風山豆根與麥門冬牛蒡黑參苦桔梗甘草綠豆共煎濃錄方麥冬去心牛子炒研黑參各一錢防風桔梗各八分山豆根五分甘草三分生綠豆一撮生薑一片同煎食後緩緩溫服冰硼散即玉鎖匙錄方硼砂一錢冰片七分朴硝五分殭蠶三條共為細末以竹管吹入喉中吹喉丹錄方黃連青黛兒茶共為細末以竹管吹之挫喉毒盛逆咽喉飲食豈能投甘桔湯為主毒解自優遊釋挫喉者食則必惡飲則必嗆飲食不能下咽也初熱有此多凶蓋毒氣壅盛上逆咽喉故飲食難下急宜解毒利咽以加味甘桔為主加味甘桔湯方見上心胸痛毒氣填胸膈疼痛覺難當解毒湯加用應得保安康釋初熱心胸即痛且突起而高此毒填胸膈凝而不出其危甚矣急宜解毒寬胸用解毒湯倍桔梗陳皮加鬱金治之解毒湯見卷內煩躁門腰痛初熱腰疼症最危毒滯命門腎早虧急調扶腎湯與服外敷又必剖生雞釋痘毒發自命門初起腰痛是腎虛不能送毒或毒盛先敗腎經故腰痛也痘原於腎而腎已敗豈不危乎若連背髓骨尾而痛者尤危也急以扶腎逐毒湯與服又外用頂方將生雄雞剖開即敷腰上連用二三雞痘出痛止可救扶腎逐毒湯錄方人參黃耆懷地當歸牛蒡連翹故紙杜仲枸杞知母甘草腹痛腹痛剛逢發熱時毒攻於裡報君知大腸秘結須攻下莫待臨危悔已遲釋書云發熱腹中痛痘瘡毒內攻發多生不久發少更防癰可見痘疹腹痛即是毒氣內攻便當托裡化毒為上不可逡巡以生他變若飲食如常而腹痛者宜化毒湯如大便秘結煩躁作渴而腹痛者宜三黃解毒湯若泄瀉而腹痛者宜建中托裡湯化毒湯錄方粉葛白芍青皮木香枳殼山楂肉連翹甘草水煎熱服三黃解毒湯錄方黃芩黃連紫草紅花枳實淮木通檳榔大黃水煎熱服建中托裡湯錄方人參升麻粉葛茯苓枳殼苦桔梗川芎柴胡獨活甘草水煎姜引加竹瀝兌服遍身痛遍身何疼痛平素風寒傷祛風散寒積應得復其常手足痛毒氣滯筋骨手足自疼痛桂枝芍藥湯用之必有中釋初起凶蓋毒氣留滯筋骨氣血又不能活故也用桂枝芍藥湯與服失此不治日後必至風攣亦有素受風寒而痛者則以薑蔥灰面共搗爛用酒炒溫而敷擦痛處或加蒼朮更妙若止一二痛處肉中如有核者此疔結於內也用艾條灸之或燈火烙之即愈桂枝芍藥湯錄方桂枝赤芍柴胡獨活羌活川芎當歸鉤藤牛蒡白芷手足搖風生脾胃中手足搖不定縱有盧扁術難醫此死證手足冷渾身發熱四肢寒脾胃虛衰陰冷干益氣補中應令暖水如過膝急尋棺釋凡痘瘡渾身宜熱獨耳尻二處宜涼所以痘疹之症頭宜涼手足宜溫若反冷者此脾胃虛弱也四肢脾胃所司宜補中益氣扶其中氣斯可矣若服藥後仍前厥冷者不治補中益氣湯錄方人參黃耆白朮陳皮當歸青化桂甘草煨姜大棗引水煎服咳嗽初熱何為咳嗽頻風寒火毒是其因升麻湯可加減用清火消痰妙如神釋咳嗽之症非肺受風寒即肺留毒火治法必以清火消痰為主用升麻葛根湯風寒加陳皮蘇葉前胡桔梗枳殼毒火加牛蒡黃芩梔子自愈氣喘初熱氣喘症最危須別風火以治之風寒杏蘇飲為主痰火涼膈湯甚宜釋痘初氣喘有因風寒客肺而喘者必鼻塞噴嚏以杏蘇飲主之有食熱痰積上衝作喘者必面赤唇紅以涼膈白虎湯治之杏蘇飲錄方蘇葉枳殼桔梗葛根陳皮半夏姜炒杏仁茯苓甘草生薑引涼膈白虎湯錄方連翹石膏知母黃芩薄荷梔子大黃朴硝甘草粳米引水煎服聲啞啼叫失聲無害事風寒閉塞咳不停毒壅肺竅音亦啞均宜甘桔加味靈釋初起不治丹田肺氣預敗也然有啼叫而失聲者則無妨若風寒閉塞必咳嗽不止宜用甘草桔梗加防風荊芥以疏其風寒則音亮矣若熱毒壅遏肺竅必目赤便澀宜用甘草桔梗加射干牛蒡元參連翹麥冬梔子以清其毒熱則音開矣鼻衄血衄血稀疏毒隨解燥熱口渴火刑金犀角地黃清肺飲外治發灰散功深釋鼻衄之症毒氣上衝於肺以致鼻衄但血出稀疏則毒氣隨之而解故云順也若燥熱口渴而衄血不止則為毒火刑金須用犀角地黃湯及清肺飲治之外用發灰散吹入鼻血即止又衄不止者用線在小指甲邊著力重扎扎盡其指其衄立止但男左女右各有分別此奇方也犀角地黃湯方歌犀角地黃芍藥丹血升胃熱火邪干斑黃陽毒皆堪治或益柴芩總伐肝錄方犀角生地白芍丹皮水煎服清肺飲方歌毒氣熏蒸鼻流血休云毒因從血泄天麥丹皮知母芩當歸白芍花甘桔錄方麥冬錢半去心天冬去心當歸酒洗天花粉各一錢酒炒丹皮酒洗知母蜜炒黃芩酒炒白芍藥各七分生桔梗六分甘草三分生薑一片同煎入發灰一錢尤妙發灰散將無病婦人亂髮用肥皂煎水洗淨油垢氣又將溫湯洗淨肥皂氣焙乾用新瓦罐一個將發填入內令滿用淨瓦片蓋口鹽和泥封之又全封瓦罐曬乾用木灰火圍罐一半煅一炷香久取出候冷其灰成塊研令極細每用二錢童便七分酒三分調服立止口吐血痘疹吐血最堪愁神清氣爽猶可療若兼大小便均下從來此症死難饒釋初發熱時嘔血嘔血之後神清氣爽痘粒尖圓紅活此乃毒氣因吐血而去也此時不必用藥姑少待之若吐血不止神息昏沉或大小便並下血俱不可救但不忍坐視其斃以犀角地黃湯清之庶或僥倖於萬一耳犀角地黃湯見上衄血門眼出血此毒氣橫肆上攻暴烈於精華安可治乎耳出血耳為腎竅毒氣烈而腎以敗安可救乎大便血便血來何處毒注於大腸治此多妙劑對症有三方釋毒氣熾甚流注大腸故大便下血用加味四物湯或香連丸霜榆湯治之加味四物湯錄方當歸白芍生地川芎荊芥牡丹皮黃芩黃連地榆煎服香連丸錄方木香黃連霜榆湯錄方黃連牛蒡黃芩厚朴枳殼淮生地紅花木香地榆百草霜小便血毒注命門則膀胱溺血見此之症盧扁難醫目閉初起不治蓋精神已衰不能送毒也急用內托之劑痘若托出可救痘將出時為風寒所束而目閉者用升提達表之藥為之祛寒發痘或用推拿法以疏通寒邪再用頂方以生雞剖敷臍上痘出而目自開眼露白目為五臟精華所萃睛若上吊不能運動則元神將散又烏能送毒乎此最危之症治此總以內托扶為主惟痘前發搐如此搐後人醒而即定者則以風論痘出而症自平唇口毒火炎炎脾胃傷故令唇口改其常唇紫且裂口生穢解毒湯加石膏良釋五臟虛實形於唇口熱毒輕者唇不紫口不臭熱毒重者唇必紫黑或硬或裂口臭難聞此皆毒火內熾所致也宜用解毒湯加石膏以清脾胃之火又以牛子連翹石膏甘草煎水時搽唇上口臭者治亦同若滿口皆白而生口瘡者用清胃散敷之解毒湯見卷內煩躁門清胃散石膏寒水石各一兩俱用火煅先以黃芩黃柏黃連南星貝母藿香甘草諸藥煎熬至藥水一盞然後將二石火煅置藥水中取起曬乾又入藥水如是者數次乃取二石合為末加硼砂善治口瘡舌爛唇裂不食痘初不食常作飽暖胃之藥毋遽嘗脾虛始用參朮散毒盛還宜解毒湯釋發痘之初熱鬱於內必然作飽不思飲食此時不可驟用暖胃之藥以滯其毒故無泄瀉而痘紅活雖出齊之後不食亦自無妨惟痘色淡白泄瀉不食此脾氣虛弱也人參白朮散主之若大便秘結痘色紫黯不食此毒盛血熱也解毒湯治之人參白朮散錄方藿香白朮葛根木香人參白茯苓甘草用生薑引水煎服解毒湯見卷內煩躁門中風發熱之時中風邪口張舌吐症不差參蘇飲及消風散無藥推拿法孔嘉釋發熱之時或中風邪目直視口張舌吐不能言語是中風也宜用參蘇飲或消風散治之若一時無藥則以薑汁灌下且用推拿法汗出自愈參蘇飲方歌參蘇飲內用陳皮枳殼前胡半夏宜乾葛木香甘桔茯內傷外感此方推去枳殼木香加麻黃錄方陳皮半夏桔梗茯苓紫蘇粉乾葛前胡人參甘草麻黃消風散錄方羌活獨活殭蠶防風天麻天花粉白附蟬蛻柴胡川芎人參炙甘草生薑引中痰毒火上騰氣道壅喉中作聲是痰鳴攪涎先用鴨毛入二陳湯藥服之平釋發熱之時毒火薰蒸痰涎壅盛不能言語狀同中風但喉內痰鳴是中痰也急以生薑汁灌下若不能進藥須用鴨翅毛透入喉中攪出痰涎然後以加味二陳湯治之加味二陳湯錄方麥冬前胡陳皮半夏茯苓栝蔞仁枳殼桔梗杏仁黃芩甘草生薑引水煎服汗痘初微汗本為順但慮太過則亡陽毒不可閉毋驟止不復發表即無傷釋初熱之時身有微汗其毒乃出有汗則不宜發散然有自汗有盜汗自汗者不發而汗自來乃腠理不秘也盜汗者汗出不自知乃表虛也痘未出時縱有自汗盜汗皆不可驟止恐閉其毒氣也但不敢復發以傷其表耳寒戰咬牙初熱寒戰與咬牙或因毒火或風邪總宜清熱兼解表治用羌活湯不差釋初熱而寒戰咬牙或因素受風寒毒出而寒邪亦出故如此或因毒火留於經絡邪正相爭欲出不出所致總宜清熱透表不可誤投辛熱之劑以羌活湯主之羌活湯錄方羌活防風當歸各八分川芎七分薄荷六分膽草山梔各五分炒淡竹葉甘草各三分生生薑三片同煎服吐蛔蛔居脾胃本自安毒火薰蒸故上鑽吐少猶覺無妨事滾滾而出治之難釋蛔蟲在脾胃之間消化食物初熱毒火扇動蛔不能安故逆上胃口或因吐甚而觸動其蟲者但出少無妨若滾滾而上則火灼內傷脾胃已壞不能療矣痘後臟之寒涼蛔亦不安皆不可治故曰口吐蛔蟲者死
