body:
  text: 卷十事神儀節痘神尊顯固當敬以盡報事之禮但貢表陳詞必執器行唱便似僧道伎倆非吾儒氣象矣新書所載科儀未免近俗恐為大方家所笑也其所書神位殊屬拉雜甚覺無謂又痘神天姥娘娘乃慈悲觀世音菩薩化身菩薩持齋戒殺何用三牲酒醴乎茲故詳為裁定而附以迎神祈神送神表文每當祭告之時俱備香茶素果虔誠默叩焚表化財而已昌黎公登嶽詩曰潛心默禱若有應豈非正直自能通準此以事痘神誰曰不可起壇條規建壇須擇淨室起壇宜選吉期將寫神位先要盥手將鮮色紅紙排定行式然後用淨硯香墨新筆端正楷書安止停妥再將紅彩一匹張挂神位上神位下書童男童女姓名然後將香茶素果供奉神前率主人行叩首禮畢焚表化財虔誠毋忽寫神位款式藥王會上歷代神醫天姥娘娘慈仁聖母香位壇下投契男女童某姓某名痘府散花破厭解厄仙師起壇迎神表文維某年某月某日弟子某率某省某府某縣某鄉信士某等謹以香茶果品之儀虔誠頂禮稽首頓首拜獻於天姥娘娘慈仁聖母之香位前曰維大造之氤氳鑄群生而畢肖獨斯人之靈秀超庶類而常尊分陰分陽柔剛之用既廣成男成女乾坤之道日新稟清寧以誕育無災害而長生爾乃坎離交構火既伏于丹田因之毛里甫離毒且伏於內腑赤子無知呱呱而泣成人有覺皇皇靡寧天地能覆載之而不能保之於生後父母能鞠育之而不能出之死中籍非神助奚自安全伏惟聖母娘娘秉好生之德以保赤為心敕封於宋歷數代而共沐恩施效靈於今佐熙朝而廣事樂育洵稱衆人之母不枉少者之懷信士某等一介愚民叨生中土幸伉儷之諧宜其室家占寢與之夢從以孫子舐犢情深雖云寒暑克調護鴉念切猶期痘疹無恙爰懇禱於聖母用敬迓夫蓮輿暫離雲山俯臨蓬篳觀茲弱女童男三三五五祈共登諸仁壽種之珍花珠果朗朗疏疏俾各慶夫平康豈惟孩稚斂福抑且合室蒙麻庶仁恩於以廣播而報事目是無窮某等不勝誠惶誠恐稽首頓首謹具表以聞祈禱表文蓋聞勞苦倦極未嘗不呼天而天未聞即拯其厄疾痛惻怛未嘗不呼父母而父母豈能遽使之安況痘瘡更甚於勞苦而孩稚已遘此疾痛若不仰祈於聖母又將申禱於何神恭惟聖母娘娘好生之德固已克符於天保赤之心亦復何異乎母屈蓮輿於蓬篳此處即是功德場種嘉果於嬰孩何人不祈平安福敬獻香茶上稀寶鑑憐某等半生鞠育若子若孫止此遺雛數個沐神庥一念慈悲亦輕亦快各布珍珠數顆花圓潤而紅活具有日新之機漿濃厚而充盈佇看痂成之候凡此休徵固某等階屬望於今拜禱賴聖母之光被伏願深仁廣播厚澤宏施俾赤子安間而無勞苦人人各有二天使痘瘡圓成而無疾痛在在稱為衆母某等不勝歡欣鼓舞激切瞻仰之至謹具表以聞解壇送神表文蓋聞天造無私群稱覆載之廣斯人有憾常慨生成之偏在參贊歸之至聖而調變望諸明神恭惟聖母如天好生德與高厚媲美代天宣化功同發育無疆某等素沐握澤復迓新禧幸三尺稚弱之子胎脫換骨無殊父母重生俾一家老少之徒心定神間乃復寢食不廢叩恩匪淺仰報何時方期潔治頻繁表野人獻芹之意又懼塵生蓬篳貽簠簋不飾之羞愛奉金巵錢歸仙府馬前羅拜比盡是生全兒郎道旁奔馳誰非救活子女補造化而不言功紀不盡去思之碑博施濟而不知倦行且慰將來之望加惠靡已瞻依曷窮某等不勝感恩戴德之至謹具表以聞
